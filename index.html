<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F7F9">
<title>TaxMate UK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   TAXMATE UK v2 — warm, modern, close to people
   ════════════════════════════════════════════════════ */
:root{
  --bg:#F5F7F9;
  --card:#FFFFFF;
  --ink:#16202B;
  --muted:#6B7686;
  --line:#ECEFF3;
  --brand:#0AA968;          /* fresh green */
  --brand-deep:#067A4B;
  --brand-soft:#E6F7EF;
  --teal:#0D8C86;
  --coral:#E5484D;          /* expenses */
  --coral-soft:#FDEDEE;
  --blue:#3478F6;
  --blue-soft:#EAF1FE;
  --amber:#B47D12;
  --amber-soft:#FCF3DF;
  --r-lg:24px; --r-md:18px; --r-sm:12px;
  --shadow:0 1px 2px rgba(22,32,43,.05),0 10px 30px rgba(22,32,43,.07);
  --shadow-sm:0 1px 2px rgba(22,32,43,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Plus Jakarta Sans','Noto Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:16px;line-height:1.5;min-height:100vh}
[dir=rtl] body{font-family:'Noto Sans Arabic','Plus Jakarta Sans',system-ui,sans-serif}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
.num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em;direction:ltr;unicode-bidi:isolate}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid rgba(10,169,104,.45);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── header ── */
.top{padding:18px 20px 4px;display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto}
.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--teal));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:19px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(10,169,104,.3)}
.top .name{font-weight:800;font-size:19px;letter-spacing:-.4px}
.top .name span{color:var(--brand)}
.year-pill{margin-inline-start:auto;position:relative}
.year-pill select{appearance:none;-webkit-appearance:none;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 30px 8px 14px;box-shadow:var(--shadow-sm)}
[dir=rtl] .year-pill select{padding:8px 14px 8px 30px}
.year-pill::after{content:'▾';position:absolute;inset-inline-end:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);pointer-events:none}

main{padding:14px 20px 110px;max-width:640px;margin:0 auto}
.h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:8px 0 14px}
.h2{font-size:17px;font-weight:800;letter-spacing:-.3px;margin:22px 0 10px}
.sub{font-size:14px;color:var(--muted)}

/* ── hero (home) ── */
.hero{border-radius:var(--r-lg);padding:22px;color:#fff;margin-bottom:14px;
  background:linear-gradient(135deg,#0BAA6B 0%,#0A9573 55%,#0D8C86 100%);
  box-shadow:0 14px 34px rgba(10,150,110,.35);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.09);top:-110px;inset-inline-end:-60px}
.hero .hi{font-size:14px;font-weight:600;opacity:.9}
.hero .label{font-size:13px;font-weight:600;opacity:.85;margin-top:12px}
.hero .big{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin:2px 0 14px}
.hero .pills{display:flex;gap:10px;position:relative}
.hero .pill{flex:1;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);border-radius:16px;padding:10px 14px;cursor:pointer;border:0;text-align:start;color:#fff}
.hero .pill .pl{font-size:12px;font-weight:600;opacity:.85}
.hero .pill .pv{font-size:17px;font-weight:800;margin-top:1px}

/* ── cards ── */
.card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.card.flat{box-shadow:var(--shadow-sm)}
.row{display:flex;align-items:center;gap:13px}
.row+.row{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.ico{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.grow{flex:1;min-width:0}
.t{font-size:15px;font-weight:700}
.s{font-size:12.5px;color:var(--muted);margin-top:1px}
.v{font-weight:800;font-size:15px;white-space:nowrap}
.chev{color:#C2C9D2;font-size:18px;font-weight:700}
.pos{color:var(--brand-deep)} .neg{color:var(--coral)} .mut{color:var(--muted)}

/* figure rows */
.frow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px}
.frow:last-child{border-bottom:none;padding-bottom:0}
.frow:first-child{padding-top:0}
.frow .fl{color:var(--ink)}
.frow .fl small{display:block;font-size:12px;color:var(--muted);font-weight:500}
.frow .fv{font-weight:800;white-space:nowrap}
.frow.total .fl,.frow.total .fv{font-weight:800;font-size:16px}
.frow.total{border-top:2px solid var(--ink);border-bottom:0;margin-top:4px;padding-top:12px}

/* ── buttons ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 20px;border:0;cursor:pointer;
  border-radius:999px;font-size:16px;font-weight:800;color:#fff;background:var(--brand);
  box-shadow:0 6px 16px rgba(10,169,104,.32);transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn.ink{background:var(--ink);box-shadow:0 6px 16px rgba(22,32,43,.25)}
.btn.soft{background:var(--brand-soft);color:var(--brand-deep);box-shadow:none}
.btn.ghost{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.btn.coral{background:var(--coral);box-shadow:0 6px 16px rgba(229,72,77,.3)}
.link{background:none;border:0;color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;padding:4px}
.link.danger{color:var(--coral)}

.tagchip{display:inline-block;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.tagchip.blue{background:var(--blue-soft);color:var(--blue)}
.tagchip.grey{background:#F0F2F5;color:var(--muted)}
.tagchip.green{background:var(--brand-soft);color:var(--brand-deep)}

.notice{border-radius:var(--r-md);padding:13px 15px;font-size:14px;line-height:1.5;margin-bottom:14px}
.notice.green{background:var(--brand-soft);color:#065438}
.notice.amber{background:var(--amber-soft);color:#6b4a06}

/* ── chips ── */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:14px;font-weight:700;padding:8px 16px;cursor:pointer;border-radius:999px;
  background:var(--card);border:1px solid var(--line);color:var(--muted);box-shadow:var(--shadow-sm)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── entries ── */
.month{font-size:13px;font-weight:800;color:var(--muted);padding:16px 4px 8px;display:flex;justify-content:space-between;text-transform:capitalize}
.elist{background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden}
.entry{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;border:0;background:none;width:100%;text-align:start}
.entry+.entry{border-top:1px solid var(--line)}
.entry:active{background:#FAFBFC}
.edot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.entry .grow .t{font-size:14.5px}
.empty{padding:40px 22px;text-align:center;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.empty .big-emoji{font-size:40px;margin-bottom:10px}
.empty .t{font-size:16px;margin-bottom:4px}

/* ── forms ── */
.fg{margin-bottom:16px}
.fg>label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
.fg .fhint{font-size:12.5px;color:var(--muted);margin:-2px 0 8px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font-family:inherit;font-size:16px;padding:13px 15px;border:1.5px solid var(--line);
  border-radius:var(--r-sm);background:#FAFBFC;color:var(--ink);-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--brand);background:#fff}
input.err{border-color:var(--coral);background:var(--coral-soft)}
.ferr{font-size:13px;font-weight:700;color:var(--coral);margin-top:5px;display:none}
.ferr.show{display:block}
.amt{position:relative}
.amt .cur{position:absolute;inset-inline-start:15px;top:50%;transform:translateY(-50%);font-size:21px;font-weight:800;color:var(--muted)}
.amt input{padding-inline-start:38px;font-size:24px;font-weight:800}
.seg{display:flex;background:#EEF1F4;border-radius:999px;padding:4px}
.seg button{flex:1;border:0;background:none;border-radius:999px;padding:9px 6px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
.pctrow{display:flex;gap:8px;flex-wrap:wrap}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.catbtn{font-size:13.5px;font-weight:600;padding:11px 12px;border:1.5px solid var(--line);background:#fff;border-radius:var(--r-sm);
  cursor:pointer;display:flex;align-items:center;gap:8px;text-align:start;color:var(--ink)}
.catbtn.on{border-color:var(--brand);background:var(--brand-soft);font-weight:800}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── sheets ── */
.sb{display:none;position:fixed;inset:0;background:rgba(16,24,32,.45);z-index:200;align-items:flex-end;justify-content:center}
.sb.open{display:flex}
.sheet{background:var(--bg);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
  border-radius:28px 28px 0 0;padding:10px 20px calc(26px + env(safe-area-inset-bottom))}
.sheet .grab{width:44px;height:5px;background:#D6DBE2;border-radius:3px;margin:6px auto 16px}
.sheet .stitle{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-bottom:18px}
.sheet .sact{display:flex;gap:10px;margin-top:20px}
.sheet .sact .btn{flex:1}

/* ── tab bar ── */
nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;max-width:640px;margin:0 auto;padding:6px 6px calc(6px + env(safe-area-inset-bottom));
  border-radius:22px 22px 0 0}
nav button{flex:1;background:none;border:0;cursor:pointer;padding:7px 2px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:#97A1AE;font-size:10.5px;font-weight:700}
nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--brand-deep);background:var(--brand-soft)}
.small{font-size:12px;color:var(--muted);line-height:1.55;margin:16px 4px}
details.help{background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow-sm);margin-bottom:14px}
details.help summary{padding:14px 16px;font-size:14px;font-weight:700;color:var(--blue);cursor:pointer;list-style:none}
details.help .hb{padding:0 16px 14px;font-size:14px;color:var(--ink);line-height:1.6}
.avatar{width:44px;height:44px;border-radius:50%;color:#fff;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.receipt-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1.5px solid var(--line)}
.receipt-add{width:56px;height:56px;border-radius:10px;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;background:#FAFBFC;color:var(--muted)}
.receipt-add:active{background:var(--brand-soft)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lightbox img{max-width:96vw;max-height:80vh;border-radius:16px;object-fit:contain}
.lightbox-bar{display:flex;gap:16px}
.lightbox-bar button{background:rgba(255,255,255,.15);border:0;color:#fff;font-size:14px;font-weight:700;padding:10px 22px;border-radius:999px;cursor:pointer}
.lightbox-bar button.danger{background:rgba(229,72,77,.35)}
</style>
</head>
<body>

<div class="top">
  <div class="logo">£</div>
  <div class="name">Tax<span>Mate</span></div>
  <div class="year-pill"><select id="yearSel" onchange="setYear(this.value)"></select></div>
</div>

<main id="page"></main>
<nav id="nav"></nav>

<!-- entry sheet -->
<div class="sb" id="sb-entry"><div class="sheet">
  <div class="grab"></div>
  <div class="stitle" id="en-title"></div>
  <div class="fg">
    <label for="en-amount" data-i18n="f.amount"></label>
    <div class="amt"><span class="cur">£</span>
      <input type="number" id="en-amount" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div>
    <div class="ferr" id="en-amount-err" data-i18n="f.amountErr"></div>
  </div>
  <div class="fg"><label for="en-date" data-i18n="f.date"></label><input type="date" id="en-date"></div>
  <div class="fg" id="en-biz-group"><label for="en-biz" data-i18n="f.business"></label><select id="en-biz"></select></div>
  <div class="fg"><label data-i18n="f.category"></label><div class="catgrid" id="en-cats"></div></div>
  <div class="fg" id="en-folder-group" style="display:none">
    <label for="en-folder" data-i18n="fd.title"></label>
    <div style="display:flex;gap:8px">
      <select id="en-folder" style="flex:1" onchange="EN.folderId=this.value||null"></select>
      <button type="button" class="btn soft" style="width:auto;padding:0 18px" onclick="openFolderSheet()">＋</button>
    </div>
  </div>
  <div class="fg" id="en-pct-group">
    <label data-i18n="f.bizUse"></label>
    <div class="fhint" data-i18n="f.bizUseHint"></div>
    <div class="pctrow" id="en-pcts"></div>
  </div>
  <div class="fg" id="en-receipt-group">
    <label data-i18n="rc.add"></label>
    <div style="display:flex;gap:10px;align-items:center">
      <div id="en-receipt-thumb-wrap"></div>
      <input type="file" id="en-receipt-file" accept="image/*" capture="environment" style="display:none" onchange="onReceiptFile(event)">
    </div>
    <div class="s" id="en-receipt-status" style="margin-top:6px"></div>
  </div>
  <div class="fg">
    <label for="en-desc"><span data-i18n="f.note"></span> <span style="font-weight:500;color:var(--muted)" data-i18n="f.optional"></span></label>
    <input type="text" id="en-desc" maxlength="80">
  </div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('entry')" data-i18n="c.cancel"></button>
    <button class="btn" id="en-save" onclick="saveEntry()" data-i18n="c.save"></button>
  </div>
  <div style="margin-top:14px;text-align:center">
    <button class="link danger" id="en-delete" style="display:none" onclick="deleteEntry()" data-i18n="f.deleteEntry"></button>
  </div>
</div></div>

<!-- business sheet -->
<div class="sb" id="sb-biz"><div class="sheet">
  <div class="grab"></div>
  <div class="stitle" id="bz-title"></div>
  <div class="fg">
    <label for="bz-name" data-i18n="b.name"></label>
    <input type="text" id="bz-name" maxlength="40">
    <div class="ferr" id="bz-name-err" data-i18n="b.nameErr"></div>
  </div>
  <div class="fg">
    <label data-i18n="b.setup"></label>
    <div class="seg">
      <button type="button" onclick="setStruct('sole')" id="bz-s-sole" data-i18n="b.justMe"></button>
      <button type="button" onclick="setStruct('partnership')" id="bz-s-part" data-i18n="b.partnership"></button>
    </div>
    <div class="fhint" style="margin-top:8px" id="bz-struct-hint"></div>
  </div>
  <div class="fg" id="bz-share-group" style="display:none">
    <label for="bz-share" data-i18n="b.share"></label>
    <input type="number" id="bz-share" inputmode="numeric" min="1" max="100" value="50">
  </div>
  <div id="bz-sync" style="margin-bottom:4px"></div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('biz')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveBiz()" data-i18n="c.save"></button>
  </div>
  <div style="margin-top:14px;text-align:center">
    <button class="link danger" id="bz-delete" style="display:none" onclick="deleteBiz()" data-i18n="b.delete"></button>
  </div>
</div></div>

<!-- HMRC position sheet -->
<div class="sb" id="sb-adj"><div class="sheet">
  <div class="grab"></div>
  <div class="stitle" data-i18n="a.title"></div>
  <div class="sub" style="margin-bottom:18px" data-i18n="a.sub"></div>
  <div class="fg">
    <label for="adj-poa" data-i18n="a.poaLabel"></label>
    <div class="fhint" data-i18n="a.poaHint"></div>
    <div class="amt"><span class="cur">£</span>
      <input type="number" id="adj-poa" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div>
  </div>
  <div class="fg">
    <label for="adj-prior" data-i18n="a.priorLabel"></label>
    <div class="fhint" data-i18n="a.priorHint"></div>
    <div class="amt"><span class="cur">£</span>
      <input type="number" id="adj-prior" inputmode="decimal" step="0.01" placeholder="0.00"></div>
  </div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('adj')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveAdj()" data-i18n="c.save"></button>
  </div>
</div></div>

<!-- custom category sheet -->
<div class="sb" id="sb-cat"><div class="sheet">
  <div class="grab"></div>
  <div class="stitle" data-i18n="cc.add"></div>
  <div class="fg"><label for="cc-name" data-i18n="cc.name"></label><input type="text" id="cc-name" maxlength="24">
    <div class="ferr" id="cc-name-err" data-i18n="b.nameErr"></div></div>
  <div class="fg"><label for="cc-emoji" data-i18n="cc.emoji"></label><input type="text" id="cc-emoji" maxlength="4" placeholder="🏷️"></div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('cat')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveCat()" data-i18n="c.save"></button>
  </div>
</div></div>

<!-- folder sheet -->
<div class="sb" id="sb-folder"><div class="sheet">
  <div class="grab"></div>
  <div class="stitle" data-i18n="fd.add"></div>
  <div class="fg"><label for="fd-name" data-i18n="fd.name"></label><input type="text" id="fd-name" maxlength="30">
    <div class="ferr" id="fd-name-err" data-i18n="b.nameErr"></div></div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('folder')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveFolder()" data-i18n="c.save"></button>
  </div>
</div></div>

<!-- confirm sheet -->
<div class="sb" id="sb-confirm"><div class="sheet">
  <div class="grab"></div>
  <div class="stitle" id="cf-title"></div>
  <div class="sub" id="cf-msg" style="margin-bottom:8px"></div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('confirm')" data-i18n="c.cancel"></button>
    <button class="btn coral" id="cf-yes" data-i18n="c.yes"></button>
  </div>
</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script>
/* ═══════════ i18n ═══════════ */
const LOCALES = { en:'en-GB', zh:'zh-HK', pl:'pl-PL', ro:'ro-RO', es:'es-ES', ur:'ur-PK' };
const LANG_NAMES = { en:'English', zh:'繁體中文', pl:'Polski', ro:'Română', es:'Español', ur:'اردو' };

const I18N = {

function currentTaxYear(){
  const d = new Date(); const y = d.getFullYear();
  const after = (d.getMonth()>3)||(d.getMonth()===3&&d.getDate()>=6);
  const start = after ? y : y-1;
  return start+'-'+String((start+1)%100).padStart(2,'0');
}
function yearRange(yr){
  const s = parseInt(yr.slice(0,4),10);
  return {from:s+'-04-06', to:(s+1)+'-04-05'};
}
function inYear(dateISO, yr){ const r = yearRange(yr); return dateISO>=r.from && dateISO<=r.to; }
function yearOptions(){
  const set = new Set([currentTaxYear(), S.year]);
  const cy = parseInt(currentTaxYear().slice(0,4),10);
  set.add((cy-1)+'-'+String(cy%100).padStart(2,'0'));
  set.add((cy+1)+'-'+String((cy+2)%100).padStart(2,'0'));
  S.entries.forEach(e=>{
    const d = new Date(e.date+'T12:00:00'); if(isNaN(d)) return;
    let y = d.getFullYear();
    const after = (d.getMonth()>3)||(d.getMonth()===3&&d.getDate()>=6);
    if(!after) y-=1;
    set.add(y+'-'+String((y+1)%100).padStart(2,'0'));
  });
  return Array.from(set).sort();
}
function effExact(e){
  if(e.kind!=='expense') return e.amount;
  const p = (e.pct==null?100:e.pct);
  return e.amount*p/100;
}
function entriesFor(yr,bizId,kind){
  return S.entries.filter(e=> inYear(e.date,yr) && (bizId==null||e.bizId===bizId) && (kind==null||e.kind===kind));

/* ═══════════ tax engine (tested) ═══════════ */
function bizFigures(b,yr){
  const inc = entriesFor(yr,b.id,'income').reduce((s,e)=>s+e.amount,0);
  const exp = entriesFor(yr,b.id,'expense').reduce((s,e)=>s+effExact(e),0);
  return {income:inc, expenses:exp, profit:inc-exp};
}
function calcTax(yr){
  const cfg = cfgFor(yr);
  const d = S.yearData[yr] || {poaPaid:0,priorAdj:0,taMode:'auto'};
  let soleIncome=0, soleExpenses=0, partShareProfit=0;
  const perBiz = S.businesses.map(b=>{
    const f = bizFigures(b,yr);
    if(b.structure==='partnership') partShareProfit += f.profit*(b.share||50)/100;
    else { soleIncome+=f.income; soleExpenses+=f.expenses; }
    return Object.assign({biz:b},f);
  });
  const profitActual = soleIncome - soleExpenses;
  const profitAllowance = Math.max(0, soleIncome - Math.min(cfg.tradingAllowance, soleIncome));
  const allowanceAvailable = soleIncome>0;
  const allowanceBetter = allowanceAvailable && (profitAllowance < profitActual);
  let taMode = d.taMode||'auto', taUsed;
  if(taMode==='allowance') taUsed=true;
  else if(taMode==='expenses') taUsed=false;
  else taUsed = allowanceBetter;
  if(!allowanceAvailable) taUsed=false;
  const soleProfit = taUsed ? profitAllowance : profitActual;
  const myProfit = soleProfit + partShareProfit;
  const profitForNIC = Math.max(0,myProfit);
  let pa = cfg.pa;
  if(myProfit>cfg.paTaperFrom) pa = Math.max(0, cfg.pa - Math.floor((myProfit-cfg.paTaperFrom)/2));
  const taxable = Math.max(0, myProfit-pa);
  const higherLimit = Math.max(cfg.basicBand, cfg.addlFrom-pa);
  const basicAmt = Math.min(taxable,cfg.basicBand);
  const higherAmt = Math.min(Math.max(taxable-cfg.basicBand,0), higherLimit-cfg.basicBand);
  const addlAmt = Math.max(taxable-higherLimit,0);
  const incomeTax = basicAmt*cfg.basic + higherAmt*cfg.higher + addlAmt*cfg.addl;
  const c4 = Math.min(Math.max(profitForNIC-cfg.c4Low,0), cfg.c4High-cfg.c4Low)*cfg.c4Main
           + Math.max(profitForNIC-cfg.c4High,0)*cfg.c4Upper;
  const class2TreatedPaid = profitForNIC >= cfg.c2SmallProfits;
  const class2Voluntary = Math.round(cfg.c2Weekly*52*100)/100;
  const liability = incomeTax + c4;
  const priorAdj = Number(d.priorAdj)||0;
  const poaPaid = Number(d.poaPaid)||0;
  const balancing = liability + priorAdj - poaPaid;
  const poaRequired = liability > cfg.poaThreshold;
  const poaEach = poaRequired ? liability/2 : 0;
  const janTotal = balancing + poaEach;
  return {cfg,perBiz,soleIncome,soleExpenses,profitActual,profitAllowance,allowanceAvailable,allowanceBetter,
          taUsed,taMode,soleProfit,partShareProfit,myProfit,pa,taxable,basicAmt,higherAmt,addlAmt,
          incomeTax,class4:c4,class2TreatedPaid,class2Voluntary,liability,priorAdj,poaPaid,balancing,
          poaRequired,poaEach,janTotal};
}

/* ═══════════ TAX ═══════════ */
function pageTax(){
  const tx = calcTax(S.year);
  const cfg = tx.cfg;

  let taBlock='';
  if(tx.allowanceAvailable){
    const saving = Math.abs(tx.profitActual - tx.profitAllowance);
    taBlock = `
    <div class="card">
      <div class="t" style="margin-bottom:6px">${t('tax.taT')}</div>
      <div class="s" style="margin-bottom:12px">${t('tax.taHint')}</div>
      <div class="frow"><span class="fl">${t('tax.taActual')}</span><span class="fv num">${fmt(tx.profitActual)}</span></div>
      <div class="frow"><span class="fl">${t('tax.taAllow')}</span><span class="fv num">${fmt(tx.profitAllowance)}</span></div>
      <div class="frow"><span class="fl" style="font-weight:800">${t('tax.taBest')}</span>
        <span class="tagchip green">${tx.allowanceBetter ? t('tax.allowance') : t('tax.expensesOpt')}${saving>0.005?' · '+t('tax.taSave',{x:fmt0(saving)}):''}</span></div>
      <div style="margin-top:14px">
        <div class="seg">
          <button type="button" class="${tx.taMode==='auto'?'on':''}" onclick="setTaMode('auto')">${t('tax.auto')}</button>
          <button type="button" class="${tx.taMode==='allowance'?'on':''}" onclick="setTaMode('allowance')">${t('tax.allowance')}</button>
          <button type="button" class="${tx.taMode==='expenses'?'on':''}" onclick="setTaMode('expenses')">${t('tax.expensesOpt')}</button>
        </div>
        <div class="s" style="margin-top:8px">${t('tax.using',{x: tx.taUsed?t('tax.usingAllow'):t('tax.usingExp')})} · ${t('tax.autoNote')}</div>
      </div>
    </div>`;
  }

  const class2Row = tx.class2TreatedPaid
    ? `<div class="frow"><span class="fl">${t('tax.c2')} <small>${t('tax.c2Paid',{x:cfg.c2SmallProfits.toLocaleString()})}</small></span><span class="fv num">£0.00</span></div>`
    : `<div class="frow"><span class="fl">${t('tax.c2')} <small>${t('tax.c2Vol',{x:cfg.c2SmallProfits.toLocaleString(),v:tx.class2Voluntary.toFixed(2)})}</small></span><span class="fv mut">${t('tax.opt')}</span></div>`;

  return `
  <div class="hero" style="background:linear-gradient(135deg,#1B2B3C,#16202B)">
    <div class="label">${t('tax.bill',{y:S.year})}</div>
    <div class="big num">${fmt(Math.max(tx.liability,0))}</div>
    <div class="hi" style="opacity:.8">${t('tax.it')} ${fmt(tx.incomeTax)} · ${t('tax.c4')} ${fmt(tx.class4)}<br>${t('tax.fileBy',{d:cfg.fileDeadline})}</div>
  </div>

  ${taBlock}

  <div class="card">
    <div class="t" style="margin-bottom:10px">${t('tax.how')}</div>
    ${tx.perBiz.map(p=>`<div class="frow"><span class="fl">${esc(p.biz.name)}${p.biz.structure==='partnership'?` <small>${t('tag.your',{n:p.biz.share||50})} = ${fmt(p.profit*(p.biz.share||50)/100)}</small>`:''}</span><span class="fv num ${p.profit>=0?'pos':'neg'}">${fmt(p.profit)}</span></div>`).join('')}
    <div class="frow total"><span class="fl">${t('tax.taxableP')}</span><span class="fv num">${fmt(tx.myProfit)}</span></div>
  </div>

  <div class="card">
    <div class="frow"><span class="fl">${t('tax.pa')} <small>${tx.pa<cfg.pa?t('tax.paRed'):t('tax.paHint')}</small></span><span class="fv num">−${fmt(tx.pa).replace('−','')}</span></div>
    <div class="frow"><span class="fl">${t('tax.taxable')}</span><span class="fv num">${fmt(tx.taxable)}</span></div>
    ${tx.basicAmt>0?`<div class="frow"><span class="fl">${t('tax.basic')} · 20% ${t('tax.on')} ${fmt0(tx.basicAmt)}</span><span class="fv num">${fmt(tx.basicAmt*cfg.basic)}</span></div>`:''}
    ${tx.higherAmt>0?`<div class="frow"><span class="fl">${t('tax.higher')} · 40% ${t('tax.on')} ${fmt0(tx.higherAmt)}</span><span class="fv num">${fmt(tx.higherAmt*cfg.higher)}</span></div>`:''}
    ${tx.addlAmt>0?`<div class="frow"><span class="fl">${t('tax.addl')} · 45% ${t('tax.on')} ${fmt0(tx.addlAmt)}</span><span class="fv num">${fmt(tx.addlAmt*cfg.addl)}</span></div>`:''}
    <div class="frow"><span class="fl">${t('tax.c4')} <small>${t('tax.c4Hint')}</small></span><span class="fv num">${fmt(tx.class4)}</span></div>
    ${class2Row}
    <div class="frow total"><span class="fl">${t('tax.total')}</span><span class="fv num">${fmt(tx.liability)}</span></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="t">${t('tax.payT')}</div>
      <button class="link" onclick="openAdj()">${t('tax.editPos')}</button>
    </div>
    <div class="frow"><span class="fl">${t('tax.thisBill')}</span><span class="fv num">${fmt(tx.liability)}</span></div>
    <div class="frow"><span class="fl">${t('tax.priorAdj')} <small>${t('tax.priorAdjS')}</small></span><span class="fv num ${tx.priorAdj>0?'neg':(tx.priorAdj<0?'pos':'')}">${fmt(tx.priorAdj)}</span></div>
    <div class="frow"><span class="fl">${t('tax.poaPaid')}</span><span class="fv num pos">−${fmt(tx.poaPaid).replace('−','')}</span></div>
    <div class="frow total"><span class="fl">${t('tax.balancing')}</span><span class="fv num ${tx.balancing>0?'neg':'pos'}">${fmt(tx.balancing)}</span></div>
    ${tx.balancing<-0.005?`<div class="notice green" style="margin:12px 0 0">${t('tax.refund')}</div>`:''}
  </div>

  <div class="card">
    <div class="t" style="margin-bottom:10px">${t('tax.datesT')}</div>
    ${tx.poaRequired?`
      <div class="s" style="margin-bottom:10px">${t('tax.poaWhy')}</div>
      <div class="frow"><span class="fl"><b>31 Jan</b> <small>${t('tax.janS')}</small></span><span class="fv num neg">${fmt(tx.janTotal)}</span></div>
      <div class="frow"><span class="fl"><b>31 Jul</b> <small>${t('tax.julS')}</small></span><span class="fv num neg">${fmt(tx.poaEach)}</span></div>
      <div class="s" style="margin-top:10px">${t('tax.poaReduce')}</div>
    `:`
      <div class="frow"><span class="fl"><b>31 Jan</b> <small>${t('tax.noPoa')}</small></span><span class="fv num ${tx.balancing>0?'neg':''}">${fmt(Math.max(tx.balancing,0))}</span></div>
    `}
  </div>

  <details class="help"><summary>${t('tax.accT')}</summary><div class="hb">${t('tax.accB',{y:S.year})}</div></details>
  <p class="small">${t('tax.disc')}</p>`;
}
function setTaMode(m){ yd().taMode=m; save(); render(); }

/* ═══════════ MORE ═══════════ */
function pageMore(){
  const GOOGLE_SVG = `<svg width="17" height="17" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>`;

        <div class="grow">

          <div class="s">${esc(cloudUser().email||'')}</div>
          <div class="s pos" style="font-weight:700;margin-top:2px">${t('ac.cloudOn')} ✓</div>
        </div>
      </div>
      <button class="link danger" style="margin-top:14px;display:block" onclick="confirmAction(t('ac.signout'),t('ac.signoutM'),doSignOut)">${t('ac.signout')}</button>
    ` : `

      <button class="btn ghost" style="margin-bottom:10px;gap:10px" onclick="signIn('google')">${GOOGLE_SVG}${t('ac.google')}</button>
      <button class="btn ink" style="gap:8px" onclick="signIn('apple')"> ${t('ac.apple')}</button>

  const proCard = `<div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:18px">✨</div>
      <div class="t">${t('pro.title')}</div>
      ${S.settings.pro?`<span class="tagchip green" style="margin-inline-start:auto">${t('pro.on')}</span>`:''}
    </div>
    <div class="s" style="margin-bottom:12px">${t('pro.sub')}</div>
    <div class="frow"><span class="fl">🤝 ${t('pro.f1')}</span><span class="fv">${S.settings.pro?'✓':''}</span></div>
    <div class="frow"><span class="fl">📸 ${t('pro.f2')}</span><span class="tagchip grey">${t('pro.soon')}</span></div>
    <div class="frow"><span class="fl">🤖 ${t('pro.f3')}</span><span class="tagchip grey">${t('pro.soon')}</span></div>
    ${S.settings.pro?'':`<button class="btn ink" style="margin-top:14px" onclick="S.settings.pro=true;save();render()">${t('pro.preview')}</button>`}
  </div>`;

  const bizCard = `<div class="card">
    ${S.businesses.length? S.businesses.map(b=>`
      <div class="row">
        <div class="avatar" style="background:${bizColor(b)};width:38px;height:38px;font-size:15px">${esc((b.name||'?').trim().charAt(0).toUpperCase())}</div>
        <div class="grow">
          <div class="t" style="font-size:14.5px">${esc(b.name)}</div>
          <div class="s">${b.structure==='partnership'?t('tag.part')+' · '+t('tag.your',{n:b.share||50}):t('tag.sole')}${b.syncCode?' · <span style="color:var(--brand);font-weight:700">🔗 '+t('sy.synced')+'</span>':''}</div>
        </div>
        <button class="link" onclick="openBiz('${b.id}')">${t('c.edit')}</button>
      </div>`).join(''):''}
    <button class="btn soft" style="margin-top:${S.businesses.length?14:0}px" onclick="openBiz()">+ ${t('home.addBiz')}</button>

  const syncCard = `<div class="card">

    </div>

  const organiseSection = [

        <div class="frow"><span class="fl">📁 ${esc(f.name)}</span>
        <button class="link danger" onclick="confirmAction('${esc(f.name).replace(/'/g,"\\'")}',t('fd.deleteM'),()=>deleteFolder('${f.id}'))">✕</button></div>`).join('')}
    </div>`:`<button class="btn soft" onclick="openFolderSheet()">📁 + ${t('fd.add')}</button>`

  return `
  <div class="h1">${t('m.title')}</div>
  ${secHead('You')}
  ${accountCard}${proCard}

  ${bizCard}${syncCard}
  ${secHead('Organise')}

  ${secHead('Data')}
  <div class="card">
    <div class="t" style="margin-bottom:10px">🌐 ${t('m.lang')}</div>
    <div class="catgrid">${Object.keys(LANG_NAMES).map(l=>`<button class="catbtn ${S.settings.lang===l?'on':''}" onclick="setLang('${l}')">${LANG_NAMES[l]}</button>`).join('')}</div>
  </div>
  <div class="card">
    <div class="t" style="margin-bottom:6px">💾 ${t('m.backup')}</div>
    <div class="s" style="margin-bottom:14px">${t('m.backupHint')}</div>
    <button class="btn" style="margin-bottom:10px" onclick="exportJSON()">${t('m.export')}</button>
    <button class="btn ghost" style="margin-bottom:10px" onclick="exportCSV()">${t('m.csv')}</button>

    <button class="btn ghost" onclick="document.getElementById('importFile').click()">${t('m.restore')}</button>
  </div>
  <div class="card">
    <button class="link danger" onclick="confirmAction(t('m.resetT'),t('m.resetM'),resetAll)">${t('m.reset')}</button>
  </div>
  <p class="small">${t('m.foot')}</p>`;
}
function setLang(l){ S.settings.lang=l; save(); render(); }

/* ═══════════ entry sheet ═══════════ */
let EN = {id:null, kind:'expense', cat:null, pct:100};
function openEntry(kind, id){
  const e = id ? S.entries.find(x=>x.id===id) : null;
  EN = e ? {id:e.id, kind:e.kind, cat:e.cat, pct:(e.pct==null?100:e.pct), folderId:(e.folderId||null), receiptUrl:(e.receiptUrl||null), receiptPath:(e.receiptPath||null)}
         : {id:null, kind:kind||'expense', cat:null, pct:100, folderId:(kind==='expense'&&S.expFolder!=='all')?S.expFolder:null, receiptUrl:null, receiptPath:null};
  const isInc = EN.kind==='income';
  document.getElementById('en-title').textContent = e ? t(isInc?'f.editIncome':'f.editExpense') : t(isInc?'f.addIncome':'f.addExpense');
  document.getElementById('en-amount').value = e?e.amount:'';
  document.getElementById('en-amount').classList.remove('err');
  document.getElementById('en-amount-err').classList.remove('show');
  document.getElementById('en-date').value = e?e.date:todayISO();
  document.getElementById('en-desc').value = e?(e.desc||''):'';
  document.getElementById('en-delete').style.display = e?'inline':'none';
  const sel = document.getElementById('en-biz');
  sel.innerHTML = S.businesses.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');
  if(e) sel.value = e.bizId;
  else { const f = isInc?S.incFilter:S.expFilter; if(f!=='all'&&bizById(f)) sel.value=f; }
  document.getElementById('en-biz-group').style.display = S.businesses.length>1?'block':'none';
  paintEntry(); openSheet('entry');
}
function paintEntry(){
  const cats = allCats(EN.kind);
  if(!EN.cat || !cats.find(c=>c.id===EN.cat)) EN.cat = cats[0].id;
  document.getElementById('en-pct-group').style.display = EN.kind==='expense'?'block':'none';
  document.getElementById('en-cats').innerHTML = cats.map(c=>
    `<button type="button" class="catbtn ${EN.cat===c.id?'on':''}" onclick="setCat('${c.id}')"><span class="cdot" style="background:${c.dot}"></span>${esc(catName(c.id))}</button>`).join('')
    + `<button type="button" class="catbtn" style="border-style:dashed;color:var(--muted)" onclick="openCatSheet()">＋ ${t('cc.add')}</button>`;
  document.getElementById('en-pcts').innerHTML = PCT_OPTIONS.map(p=>
    `<button type="button" class="chip ${EN.pct===p?'on':''}" onclick="setPct(${p})">${p}%</button>`).join('');
  // 收據相簿
  const rg = document.getElementById('en-receipt-group');
  rg.style.display = EN.kind==='expense' ? 'block' : 'none';
  const rw = document.getElementById('en-receipt-thumb-wrap');
  if(EN.receiptUrl){
    rw.innerHTML = `<img class="receipt-thumb" src="${EN.receiptUrl}" onclick="openLightbox('${EN.receiptUrl}','${EN.receiptPath||''}')">`;
  } else {
    rw.innerHTML = S.settings.pro
      ? `<div class="receipt-add" onclick="document.getElementById('en-receipt-file').click()">📷</div>`
      : `<div class="receipt-add" onclick="alert(t('rc.proOnly'))" title="${t('rc.proOnly')}">🔒</div>`;
  }
  document.getElementById('en-receipt-status').textContent = '';
  const fg = document.getElementById('en-folder-group');
  fg.style.display = EN.kind==='expense' ? 'block' : 'none';
  const fsel = document.getElementById('en-folder');
  fsel.innerHTML = `<option value="">${t('fd.none')}</option>` +
    S.folders.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('');
  fsel.value = EN.folderId || '';
}
function openCatSheet(){
  document.getElementById('cc-name').value='';
  document.getElementById('cc-emoji').value='';
  document.getElementById('cc-name').classList.remove('err');
  document.getElementById('cc-name-err').classList.remove('show');
  openSheet('cat');
}
function saveCat(){
  const name = document.getElementById('cc-name').value.trim();
  if(!name){
    document.getElementById('cc-name').classList.add('err');
    document.getElementById('cc-name-err').classList.add('show');
    return;
  }
  const emoji = document.getElementById('cc-emoji').value.trim() || '🏷️';
  const c = {id:'c_'+uid(), name, e:emoji, dot:AVATAR_COLORS[(S.customCats[EN.kind].length+2)%AVATAR_COLORS.length], custom:true};
  S.customCats[EN.kind].push(c);
  EN.cat = c.id;
  save(); closeSheet('cat'); paintEntry();
}
function deleteCustomCat(id){
  S.customCats.expense = S.customCats.expense.filter(c=>c.id!==id);
  S.customCats.income = S.customCats.income.filter(c=>c.id!==id);
  save(); render();
}
function openFolderSheet(){
  document.getElementById('fd-name').value='';
  document.getElementById('fd-name').classList.remove('err');
  document.getElementById('fd-name-err').classList.remove('show');
  openSheet('folder');
}
function saveFolder(){
  const name = document.getElementById('fd-name').value.trim();
  if(!name){
    document.getElementById('fd-name').classList.add('err');
    document.getElementById('fd-name-err').classList.add('show');
    return;
  }
  const f = {id:'f_'+uid(), name};
  S.folders.push(f); save(); closeSheet('folder');
  if(document.getElementById('sb-entry').classList.contains('open')){ EN.folderId=f.id; paintEntry(); }
  else render();
}
function deleteFolder(id){
  S.folders = S.folders.filter(f=>f.id!==id);
  S.entries.forEach(e=>{ if(e.folderId===id) e.folderId=null; });
  if(S.expFolder===id) S.expFolder='all';
  save(); render();
}
function setCat(c){ EN.cat=c; paintEntry(); }
function setPct(p){ EN.pct=p; paintEntry(); }
function saveEntry(){
  const amt = parseFloat(document.getElementById('en-amount').value);
  if(!(amt>0)){
    document.getElementById('en-amount').classList.add('err');
    document.getElementById('en-amount-err').classList.add('show');
    return;
  }
  const rec = {
    id:EN.id||uid(),
    bizId:document.getElementById('en-biz').value||(S.businesses[0]&&S.businesses[0].id),
    kind:EN.kind,
    date:document.getElementById('en-date').value||todayISO(),
    amount:Math.round(amt*100)/100,
    cat:EN.cat,
    pct:EN.kind==='expense'?EN.pct:null,
    folderId:EN.kind==='expense'?(document.getElementById('en-folder').value||null):null,
    receiptUrl: EN.receiptUrl||null,
    receiptPath: EN.receiptPath||null,
    desc:document.getElementById('en-desc').value.trim()
  };
  if(EN.id){ const i=S.entries.findIndex(x=>x.id===EN.id); if(i>-1) S.entries[i]=rec; }
  else S.entries.push(rec);
  save(); pushEntryRemote(rec); closeSheet('entry'); render();
}
function deleteEntry(){
  confirmAction(t('d.entryT'), t('d.entryM'), ()=>{
    const e = S.entries.find(x=>x.id===EN.id);
    S.entries = S.entries.filter(x=>x.id!==EN.id);
    if(e) deleteEntryRemote(e.bizId, e.id);
    save(); closeSheet('entry'); render();
  });
}

/* ═══════════ business sheet ═══════════ */
let BZ = {id:null, structure:'sole'};
function openBiz(id){
  const b = id?bizById(id):null;
  BZ = b ? {id:b.id, structure:b.structure||'sole', pendingCode:null} : {id:null, structure:'sole', pendingCode:null};
  document.getElementById('bz-title').textContent = b?t('b.edit'):t('b.add');
  document.getElementById('bz-name').value = b?b.name:'';
  document.getElementById('bz-name').classList.remove('err');

function saveBiz(){
  const name = document.getElementById('bz-name').value.trim();
  if(!name){
    document.getElementById('bz-name').classList.add('err');
    document.getElementById('bz-name-err').classList.add('show');
    return;
  }
  let share = parseInt(document.getElementById('bz-share').value,10);
  if(!(share>=1&&share<=100)) share=50;
  let newId = null;
  if(BZ.id){
    const b = bizById(BZ.id);
    b.name=name; b.structure=BZ.structure; b.share=BZ.structure==='partnership'?share:100;
    pushBizRemote(b);
  } else {
    newId = uid();
    const newBiz = {id:newId, name, structure:BZ.structure, share:BZ.structure==='partnership'?share:100};
    // Partnership + Pro + Firebase: 一次過儲存並推上雲端
    if(BZ.structure==='partnership' && BZ.pendingCode && S.settings.pro && fbConfigured()){
      newBiz.syncCode = BZ.pendingCode;
    }
    S.businesses.push(newBiz);
  }
  save(); closeSheet('biz'); render();
  // 有 pendingCode → 直接啟用 sync，唔使重開 sheet
  if(newId && BZ.pendingCode && S.businesses[S.businesses.length-1].syncCode){
    const code = BZ.pendingCode;
    ensureAuth().then(u=>{
      if(!u) return;
      FB.db.collection('partnerships').doc(code).set({
        bizId: newId, name, structure:'partnership', createdBy: u.uid, createdAt: Date.now(), v:1
      }).then(()=>{
        const batch = FB.db.batch();
        S.entries.filter(e=>e.bizId===newId).forEach(e=>{
          batch.set(FB.db.collection('partnerships').doc(code).collection('entries').doc(e.id), e);
        });
        return batch.commit();
      }).then(()=>{
        subscribeSync(code, newId);
      }).catch(e=>console.warn('sync push failed', e));
    });
  } else if(newId && BZ.structure==='partnership'){
    // Pro 未開或無 Firebase:儲存後重開 sheet 讓用家見到 sync 掣
    setTimeout(()=>openBiz(newId), 260);
  }
}

let FB = { db:null, uid:null, ready:false, subs:{} };
function fbConfigured(){ return (typeof firebase!=='undefined') && !!FIREBASE_CONFIG.apiKey; }
async function ensureFB(){
  if(!fbConfigured()) return null;
  if(FB.ready) return FB.db;
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    FB.db = firebase.firestore();
    try{ await FB.db.enablePersistence({synchronizeTabs:true}); }catch(e){}
    FB.ready = true;
    watchAuth();
    return FB.db;
  }catch(e){ console.warn('Sync init failed', e); return null; }
}
async function ensureAuth(){
  const db = await ensureFB(); if(!db) return null;
  const cur = firebase.auth().currentUser;
  if(cur) return cur;
  try{ const cred = await firebase.auth().signInAnonymously(); FB.uid = cred.user.uid; return cred.user; }
  catch(e){ console.warn(e); return null; }
}
function genCode(){
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for(let i=0;i<6;i++) c += A[Math.floor(Math.random()*A.length)];
  return c;
}
async function enableSync(bizId){
  const b = bizById(bizId); if(!b) return;
  const db = await ensureFB();
  if(!db){ alert(t(fbConfigured()?'sy.needNet':'sy.setup')); return; }
  const u = await ensureAuth();
  if(!u){ alert(t('sy.needNet')); return; }
  const code = genCode();
  try{
    await db.collection('partnerships').doc(code).set({
      bizId: b.id, name: b.name, structure: 'partnership',
      createdBy: u.uid, createdAt: Date.now(), v: 1
    });
    const batch = db.batch();
    S.entries.filter(e=>e.bizId===b.id).forEach(e=>{
      batch.set(db.collection('partnerships').doc(code).collection('entries').doc(e.id), e);
    });
    await batch.commit();
    b.syncCode = code; save();
    subscribeSync(code, b.id);
    paintSync(); render();
  }catch(e){ console.warn(e); alert(t('sy.needNet')); }
}
function subscribeSync(code, bizId){
  if(FB.subs[code]) return;
  FB.subs[code] = true; // 鎖住避免重複訂閱
  ensureAuth().then(u=>{
    const db = FB.db;
    if(!u || !db){ delete FB.subs[code]; return; }
    const unsubs = [];
    unsubs.push(db.collection('partnerships').doc(code).onSnapshot(doc=>{
      const d = doc.data(); if(!d) return;
      const b = bizById(bizId);
      if(b && d.name && b.name !== d.name){ b.name = d.name; save(); render(); }
    }, ()=>{}));
    unsubs.push(db.collection('partnerships').doc(code).collection('entries').onSnapshot(snap=>{
      const remote = [];
      snap.forEach(x=>remote.push(x.data()));
      S.entries = S.entries.filter(e=>e.bizId!==bizId).concat(remote);
      save(); render();
    }, ()=>{}));
    FB.subs[code] = unsubs;
  });
}

/* ═══════════ Account & personal cloud sync ═══════════ */
let CLOUD = { metaUnsub:null, entUnsub:null, applying:false, pushTimer:null, lastPushed:'' };
function cloudUser(){
  try{
    if(typeof firebase==='undefined' || !firebase.apps || !firebase.apps.length) return null;
    const u = firebase.auth().currentUser;
    return (u && !u.isAnonymous) ? u : null;
  }catch(e){ return null; }
}
function watchAuth(){
  if(watchAuth.done) return; watchAuth.done = true;
  firebase.auth().onAuthStateChanged(u=>{
    if(u && !u.isAnonymous) startUserSync(u);
    else stopUserSync();
    render();
  });
}
async function signIn(kind){
  const db = await ensureFB();
  if(!db){ alert(t(fbConfigured()?'ac.needNet':'sy.setup')); return; }
  const provider = (kind==='apple') ? new firebase.auth.OAuthProvider('apple.com')
                                    : new firebase.auth.GoogleAuthProvider();
  try{
    const cur = firebase.auth().currentUser;
    if(cur && cur.isAnonymous){
      // 升級匿名帳戶 → 保留 uid,partnership membership 唔會斷
      try{ await cur.linkWithPopup(provider); }
      catch(e){
        if(e && e.code==='auth/credential-already-in-use' && e.credential){
          await firebase.auth().signInWithCredential(e.credential);
        } else throw e;
      }
    } else {
      await firebase.auth().signInWithPopup(provider);
    }
  }catch(e){
    if(e && e.code==='auth/popup-closed-by-user') return;
    console.warn(e); alert(t('ac.err'));
  }
}
function doSignOut(){
  stopUserSync();
  try{ firebase.auth().signOut(); }catch(e){}
  render();
}
function userRoot(uid){ return FB.db.collection('users').doc(uid); }

async function startUserSync(u){
  if(CLOUD.metaUnsub) return;
  const uid = u.uid;
  try{
    /* 1 ── 初次合併:雲端有嘅補入本地(以 id 去重) */
    const metaDoc = await userRoot(uid).collection('app').doc('meta').get();
    const entSnap = await userRoot(uid).collection('entries').get();
    if(metaDoc.exists){
      const m = metaDoc.data();
      (m.businesses||[]).forEach(rb=>{ if(!bizById(rb.id)) S.businesses.push(rb); });
      (m.folders||[]).forEach(rf=>{ if(!folderById(rf.id)) S.folders.push(rf); });
      ['income','expense'].forEach(k=>{
        ((m.customCats&&m.customCats[k])||[]).forEach(rc=>{
          if(!S.customCats[k].find(c=>c.id===rc.id)) S.customCats[k].push(rc);
        });
      });
      Object.keys(m.yearData||{}).forEach(y=>{ S.yearData[y] = Object.assign({}, S.yearData[y]||{}, m.yearData[y]); });
      if(m.settings && m.settings.pro) S.settings.pro = true;
    }
    const localIds = new Set(S.entries.map(e=>e.id));
    entSnap.forEach(d=>{ const re=d.data(); if(re && !localIds.has(re.id)) S.entries.push(re); });
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}

    /* 2 ── 推合併結果上雲 */
    await pushUserState(uid, true);

    /* 3 ── 實時訂閱(其他裝置改嘢即時反映) */
    CLOUD.metaUnsub = userRoot(uid).collection('app').doc('meta').onSnapshot(doc=>{
      const m = doc.data(); if(!m || CLOUD.applying) return;
      CLOUD.applying = true;
      if(Array.isArray(m.businesses)) S.businesses = m.businesses;
      if(Array.isArray(m.folders)) S.folders = m.folders;
      if(m.customCats) S.customCats = Object.assign({income:[],expense:[]}, m.customCats);
      if(m.yearData) S.yearData = m.yearData;
      if(m.settings && typeof m.settings.pro==='boolean') S.settings.pro = m.settings.pro;
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}
      CLOUD.applying = false;
      render();
      S.businesses.filter(b=>b.syncCode).forEach(b=>subscribeSync(b.syncCode, b.id));
    }, ()=>{});
    CLOUD.entUnsub = userRoot(uid).collection('entries').onSnapshot(snap=>{
      if(CLOUD.applying) return;
      CLOUD.applying = true;
      const remote = []; snap.forEach(d=>remote.push(d.data()));
      const partnerBiz = new Set(S.businesses.filter(b=>b.syncCode).map(b=>b.id));
      const partnerEntries = S.entries.filter(e=>partnerBiz.has(e.bizId));
      S.entries = remote.filter(e=>!partnerBiz.has(e.bizId)).concat(partnerEntries);
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}
      CLOUD.applying = false;
      render();
    }, ()=>{});

    S.businesses.filter(b=>b.syncCode).forEach(b=>subscribeSync(b.syncCode, b.id));
    render();
  }catch(e){ console.warn('user sync failed', e); }
}
function stopUserSync(){
  if(CLOUD.metaUnsub){ try{CLOUD.metaUnsub();}catch(e){} CLOUD.metaUnsub=null; }
  if(CLOUD.entUnsub){ try{CLOUD.entUnsub();}catch(e){} CLOUD.entUnsub=null; }
  CLOUD.lastPushed='';
}
async function pushUserState(uid, force){
  if(!FB.ready) return;
  if(!uid){ const cu = cloudUser(); if(!cu) return; uid = cu.uid; }
  const partnerBiz = new Set(S.businesses.filter(b=>b.syncCode).map(b=>b.id));
  const meta = { businesses:S.businesses, folders:S.folders, customCats:S.customCats,
                 yearData:S.yearData, settings:{pro:!!S.settings.pro}, updatedAt:Date.now() };
  const mine = S.entries.filter(e=>!partnerBiz.has(e.bizId));
  const payload = JSON.stringify([meta.businesses,meta.folders,meta.customCats,meta.yearData,meta.settings]) + '|' + JSON.stringify(mine);
  if(!force && payload === CLOUD.lastPushed) return;
  CLOUD.lastPushed = payload;
  try{
    await userRoot(uid).collection('app').doc('meta').set(meta);
    const entSnap = await userRoot(uid).collection('entries').get();
    const remoteIds = new Set(); entSnap.forEach(d=>remoteIds.add(d.id));
    const localIds = new Set(mine.map(e=>e.id));
    const batch = FB.db.batch();
    mine.forEach(e=>batch.set(userRoot(uid).collection('entries').doc(e.id), e));
    remoteIds.forEach(id=>{ if(!localIds.has(id)) batch.delete(userRoot(uid).collection('entries').doc(id)); });
    await batch.commit();
  }catch(e){ console.warn('cloud push failed', e); }
}
function scheduleCloudPush(){
  if(!cloudUser() || CLOUD.applying) return;
  clearTimeout(CLOUD.pushTimer);
  CLOUD.pushTimer = setTimeout(()=>pushUserState(), 1200);
}

    const stor = firebase.storage();
    const ref = stor.ref(path);
    await ref.put(compressed, {contentType:'image/jpeg'});
    const url = await ref.getDownloadURL();
    EN.receiptUrl = url;
    EN.receiptPath = path;
    st.textContent = '';
    paintEntry();
  }catch(e){ console.warn(e); st.textContent = t('rc.uploadErr'); }
}

function compressImage(file, maxW, quality){
  return new Promise((res,rej)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxW/Math.max(img.width,img.height));
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>b?res(b):rej(new Error('compress fail')),'image/jpeg',quality);
    };
    img.onerror = rej;
    img.src = url;
  });
}

async function deleteReceiptFromStorage(path){
  if(!path || !FB.ready) return;
  try{ await firebase.storage().ref(path).delete(); }catch(e){}
}

// deleteEntry: 連相片一齊刪
const _origDeleteEntry = deleteEntry;
deleteEntry = function(){
  confirmAction(t('d.entryT'), t('d.entryM'), ()=>{
    const e = S.entries.find(x=>x.id===EN.id);
    S.entries = S.entries.filter(x=>x.id!==EN.id);
    if(e){ deleteEntryRemote(e.bizId, e.id); if(e.receiptPath) deleteReceiptFromStorage(e.receiptPath); }
    save(); closeSheet('entry'); render();
  });
};

// Lightbox
let LB = {url:'', path:''};
function openLightbox(url, path){
  LB = {url, path};
  let lb = document.getElementById('taxmate-lightbox');
  if(!lb){
    lb = document.createElement('div');
    lb.id = 'taxmate-lightbox';
    lb.className = 'lightbox';
    lb.innerHTML = `<img id="lb-img" src=""><div class="lightbox-bar">
      <button onclick="closeLightbox()">✕ Close</button>
      <button class="danger" onclick="confirmDeleteReceipt()">${'🗑 '+t('rc.delete')}</button>
    </div>`;
    lb.addEventListener('click',e=>{ if(e.target===lb) closeLightbox(); });
    document.body.appendChild(lb);
  }
  document.getElementById('lb-img').src = url;
  lb.style.display = 'flex';
}
function closeLightbox(){ const lb=document.getElementById('taxmate-lightbox'); if(lb) lb.style.display='none'; }
function confirmDeleteReceipt(){
  closeLightbox();
  confirmAction(t('rc.deleteConfirm'), '', async()=>{
    if(LB.path) await deleteReceiptFromStorage(LB.path);
    // 更新 entry
    const e = S.entries.find(x=>x.receiptPath===LB.path||x.receiptUrl===LB.url);
    if(e){ e.receiptUrl=null; e.receiptPath=null; pushEntryRemote(e); }
    if(EN.receiptPath===LB.path){ EN.receiptUrl=null; EN.receiptPath=null; paintEntry(); }
    save(); render();
  });
}
