<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F7F9">
<title>TaxMate UK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   TAXMATE UK v2 — warm, modern, close to people
   ════════════════════════════════════════════════════ */
:root{
  --bg:#F5F7F9;
  --card:#FFFFFF;
  --ink:#16202B;
  --muted:#6B7686;
  --line:#ECEFF3;
  --brand:#0AA968;          /* fresh green */
  --brand-deep:#067A4B;
  --brand-soft:#E6F7EF;
  --teal:#0D8C86;
  --coral:#E5484D;          /* expenses */
  --coral-soft:#FDEDEE;
  --blue:#3478F6;
  --blue-soft:#EAF1FE;
  --amber:#B47D12;
  --amber-soft:#FCF3DF;
  --btn-dark:#16202B;
  --r-lg:24px; --r-md:18px; --r-sm:12px;
  --shadow:0 1px 2px rgba(22,32,43,.05),0 10px 30px rgba(22,32,43,.07);
  --shadow-sm:0 1px 2px rgba(22,32,43,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Plus Jakarta Sans','Noto Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:16px;line-height:1.5;min-height:100vh}
[dir=rtl] body{font-family:'Noto Sans Arabic','Plus Jakarta Sans',system-ui,sans-serif}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
.num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em;direction:ltr;unicode-bidi:isolate}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid rgba(10,169,104,.45);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── header ── */
.top{padding:18px 20px 4px;display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto}
.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--teal));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:19px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(10,169,104,.3)}
.top .name{font-weight:800;font-size:19px;letter-spacing:-.4px}
.top .name span{color:var(--brand)}
.year-pill{margin-inline-start:auto;position:relative}
.year-pill select{appearance:none;-webkit-appearance:none;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 30px 8px 14px;box-shadow:var(--shadow-sm)}
[dir=rtl] .year-pill select{padding:8px 14px 8px 30px}
.year-pill::after{content:'▾';position:absolute;inset-inline-end:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);pointer-events:none}

main{padding:14px 20px 110px;max-width:640px;margin:0 auto}
.h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:8px 0 14px;color:var(--ink)}
.h2{font-size:17px;font-weight:800;letter-spacing:-.3px;margin:22px 0 10px;color:var(--ink)}
.sub{font-size:14px;color:var(--muted)}

/* ── hero (home) ── */
.hero{border-radius:var(--r-lg);padding:22px;color:#fff;margin-bottom:14px;
  background:linear-gradient(135deg,#0BAA6B 0%,#0A9573 55%,#0D8C86 100%);
  box-shadow:0 14px 34px rgba(10,150,110,.35);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.09);top:-110px;inset-inline-end:-60px}
.hero .hi{font-size:14px;font-weight:600;opacity:.9}
.hero .label{font-size:13px;font-weight:600;opacity:.85;margin-top:12px}
.hero .big{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin:2px 0 14px}
.hero .pills{display:flex;gap:10px;position:relative}
.hero .pill{flex:1;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);border-radius:16px;padding:10px 14px;cursor:pointer;border:0;text-align:start;color:#fff}
.hero .pill .pl{font-size:12px;font-weight:600;opacity:.85}
.hero .pill .pv{font-size:17px;font-weight:800;margin-top:1px}

/* ── cards ── */
.card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.card.flat{box-shadow:var(--shadow-sm)}
.row{display:flex;align-items:center;gap:13px}
.row+.row{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.ico{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.grow{flex:1;min-width:0}
.t{font-size:15px;font-weight:700;color:var(--ink)}
.s{font-size:12.5px;color:var(--muted);margin-top:1px}
.v{font-weight:800;font-size:15px;white-space:nowrap;color:var(--ink)}
.chev{color:#C2C9D2;font-size:18px;font-weight:700}
.pos{color:var(--brand-deep)} .neg{color:var(--coral)} .mut{color:var(--muted)}

/* figure rows */
.frow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px}
.frow:last-child{border-bottom:none;padding-bottom:0}
.frow:first-child{padding-top:0}
.frow .fl{color:var(--ink)}
.frow .fl small{display:block;font-size:12px;color:var(--muted);font-weight:500}
.frow .fv{font-weight:800;white-space:nowrap;color:var(--ink)}
.frow.total .fl,.frow.total .fv{font-weight:800;font-size:16px}
.frow.total{border-top:2px solid var(--ink);border-bottom:0;margin-top:4px;padding-top:12px}

/* ── buttons ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 20px;border:0;cursor:pointer;
  border-radius:999px;font-size:16px;font-weight:800;color:#fff;background:var(--brand);
  box-shadow:0 6px 16px rgba(10,169,104,.32);transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn.ink{background:var(--btn-dark);color:#fff;box-shadow:0 6px 16px rgba(22,32,43,.25)}
.btn.soft{background:var(--brand-soft);color:var(--brand-deep);box-shadow:none}
.btn.ghost{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.btn.coral{background:var(--coral);box-shadow:0 6px 16px rgba(229,72,77,.3)}
.link{background:none;border:0;color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;padding:4px}
.link.danger{color:var(--coral)}

.tagchip{display:inline-block;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.tagchip.blue{background:var(--blue-soft);color:var(--blue)}
.tagchip.grey{background:#F0F2F5;color:var(--muted)}
.tagchip.green{background:var(--brand-soft);color:var(--brand-deep)}

.notice{border-radius:var(--r-md);padding:13px 15px;font-size:14px;line-height:1.5;margin-bottom:14px}
.notice.green{background:var(--brand-soft);color:#065438}
.notice.amber{background:var(--amber-soft);color:#6b4a06}

/* ── chips ── */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:14px;font-weight:700;padding:8px 16px;cursor:pointer;border-radius:999px;
  background:var(--card);border:1px solid var(--line);color:var(--muted);box-shadow:var(--shadow-sm)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── entries ── */
.month{font-size:13px;font-weight:800;color:var(--muted);padding:16px 4px 8px;display:flex;justify-content:space-between;text-transform:capitalize}
.elist{background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden}
.entry{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;border:0;background:none;width:100%;text-align:start}
.entry+.entry{border-top:1px solid var(--line)}
.entry:active{background:#FAFBFC}
.edot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.emojibtn{aspect-ratio:1;border-radius:12px;border:2px solid var(--line);background:var(--bg);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;padding:0}
.emojibtn.on{border-color:var(--brand);background:var(--brand-soft)}
.entry .grow .t{font-size:14.5px}
.empty{padding:40px 22px;text-align:center;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.empty .big-emoji{font-size:40px;margin-bottom:10px}
.empty .t{font-size:16px;margin-bottom:4px}

/* ── forms ── */
.fg{margin-bottom:16px}
.fg>label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
.fg .fhint{font-size:12.5px;color:var(--muted);margin:-2px 0 8px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font-family:inherit;font-size:16px;padding:13px 15px;border:1.5px solid var(--line);
  border-radius:var(--r-sm);background:#FAFBFC;color:var(--ink);-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--brand);background:#fff}
input.err{border-color:var(--coral);background:var(--coral-soft)}
.ferr{font-size:13px;font-weight:700;color:var(--coral);margin-top:5px;display:none}
.ferr.show{display:block}
.amt{position:relative}
.amt .cur{position:absolute;inset-inline-start:15px;top:50%;transform:translateY(-50%);font-size:21px;font-weight:800;color:var(--muted)}
.amt input{padding-inline-start:38px;font-size:24px;font-weight:800}
.seg{display:flex;background:#EEF1F4;border-radius:999px;padding:4px}
.seg button{flex:1;border:0;background:none;border-radius:999px;padding:9px 6px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
.pctrow{display:flex;gap:8px;flex-wrap:wrap}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.catbtn{font-size:13.5px;font-weight:600;padding:11px 12px;border:1.5px solid var(--line);background:#fff;border-radius:var(--r-sm);
  cursor:pointer;display:flex;align-items:center;gap:8px;text-align:start;color:var(--ink)}
.catbtn.on{border-color:var(--brand);background:var(--brand-soft);font-weight:800}
.cdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}

/* ── sheets ── */
.sb{display:none;position:fixed;inset:0;background:rgba(16,24,32,.45);z-index:200;align-items:flex-end;justify-content:center}
body.sheet-open{overflow:hidden}
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--ink);color:#fff;font-size:14px;font-weight:700;padding:11px 22px;border-radius:999px;
  z-index:400;box-shadow:0 8px 24px rgba(16,24,32,.25);transition:transform .3s cubic-bezier(.2,.9,.3,1.2);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.sb.open{display:flex}
.sheet{background:var(--bg);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
  border-radius:28px 28px 0 0;padding:10px 20px calc(26px + env(safe-area-inset-bottom))}
.sheet .grab{width:44px;height:5px;background:#D6DBE2;border-radius:3px;margin:6px auto 16px;cursor:grab;position:relative}
.grab::after{content:"";position:absolute;top:-12px;bottom:-12px;left:-40px;right:-40px}
.sheet .stitle{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-bottom:18px;color:var(--ink)}
.sheet .sact{display:flex;gap:10px;margin-top:20px}
.sheet .sact .btn{flex:1}

/* ── tab bar ── */
nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;max-width:640px;margin:0 auto;padding:6px 6px calc(6px + env(safe-area-inset-bottom));
  border-radius:22px 22px 0 0}
nav button{flex:1;background:none;border:0;cursor:pointer;padding:7px 2px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:#97A1AE;font-size:10.5px;font-weight:700}
nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--brand-deep);background:var(--brand-soft)}
.small{font-size:12px;color:var(--muted);line-height:1.55;margin:16px 4px}
details.help{background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow-sm);margin-bottom:14px}
details.help summary{padding:14px 16px;font-size:14px;font-weight:700;color:var(--blue);cursor:pointer;list-style:none}
details.help .hb{padding:0 16px 14px;font-size:14px;color:var(--ink);line-height:1.6}
.avatar{width:44px;height:44px;border-radius:50%;color:#fff;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.receipt-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1.5px solid var(--line)}
.receipt-add{width:56px;height:56px;border-radius:10px;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;background:#FAFBFC;color:var(--muted)}
.receipt-add:active{background:var(--brand-soft)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lightbox img{max-width:96vw;max-height:80vh;border-radius:16px;object-fit:contain}
.lightbox-bar{display:flex;gap:16px}
.lightbox-bar button{background:rgba(255,255,255,.15);border:0;color:#fff;font-size:14px;font-weight:700;padding:10px 22px;border-radius:999px;cursor:pointer}
.lightbox-bar button.danger{background:rgba(229,72,77,.35)}
.fab{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;
  border-radius:50%;background:var(--brand);color:#fff;font-size:30px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px rgba(10,169,104,.4);border:0;cursor:pointer;z-index:99;
  transition:transform .12s}
.fab:active{transform:scale(.88)}

/* ── Dark mode (manual toggle + system) ── */
:root[data-theme="dark"]{
  --bg:#0F1620; --card:#1A2533; --ink:#EDF2F7; --muted:#8493A5; --line:#293647;
  --brand:#15D982; --brand-deep:#3DE89B; --brand-soft:rgba(21,217,130,.16);
  --teal:#16CFC5; --coral:#FF6B73; --coral-soft:rgba(255,107,115,.16);
  --blue:#6BA8FF; --blue-soft:rgba(107,168,255,.16);
  --amber:#F5B43C; --amber-soft:rgba(245,180,60,.16);
  --shadow:0 2px 6px rgba(0,0,0,.5),0 12px 32px rgba(0,0,0,.45);
  --shadow-sm:0 1px 3px rgba(0,0,0,.45);
}
:root[data-theme="dark"] input[type=text],
:root[data-theme="dark"] input[type=number],
:root[data-theme="dark"] input[type=date],
:root[data-theme="dark"] select,
:root[data-theme="dark"] textarea{background:#0A0F16;color:var(--ink);border-color:var(--line)}
:root[data-theme="dark"] input:focus,
:root[data-theme="dark"] select:focus{background:#0A0F16;border-color:var(--brand)}
:root[data-theme="dark"] .seg{background:#0A0F16}
:root[data-theme="dark"] .seg button.on{background:#293647;color:var(--ink)}
:root[data-theme="dark"] .tagchip.grey{background:#293647;color:var(--muted)}
:root[data-theme="dark"] .entry:active{background:#222F3E}
:root[data-theme="dark"] .catbtn{background:#1A2533;color:var(--ink)}
:root[data-theme="dark"] .chip{background:#1A2533;color:var(--muted)}
:root[data-theme="dark"] .chip.on{background:var(--ink);color:#0F1620}
:root[data-theme="dark"] .sb{background:rgba(0,0,0,.72)}
:root[data-theme="dark"] .sheet{background:#0F1620}
:root[data-theme="dark"] .receipt-add{background:#1A2533}
:root[data-theme="dark"] .year-pill select{background:#1A2533;color:var(--ink)}
:root[data-theme="dark"] nav{background:rgba(15,22,32,.95)}
:root[data-theme="dark"] .hero::before{background:rgba(255,255,255,.06)}
:root[data-theme="dark"] .toast{background:#EDF2F7;color:#0F1620}
:root[data-theme="dark"] .btn.ghost{background:#1A2533;border-color:var(--line);color:var(--ink)}
:root[data-theme="dark"] .btn.soft{background:var(--brand-soft);color:var(--brand-deep)}
:root[data-theme="dark"]{--btn-dark:#2A3849}
:root[data-theme="dark"] details.help{background:var(--card)}
:root[data-theme="dark"] .sheet .grab{background:#3A4756}
:root[data-theme="dark"] .chev{color:#4A5568}
:root[data-theme="dark"] .grab{background:#3A4756}

/* System dark mode — only when no manual override */
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]):not([data-theme="dark"]){
    --bg:#0F1620; --card:#1A2533; --ink:#EDF2F7; --muted:#8493A5; --line:#293647;
    --brand:#15D982; --brand-deep:#3DE89B; --brand-soft:rgba(21,217,130,.16);
    --teal:#16CFC5; --coral:#FF6B73; --coral-soft:rgba(255,107,115,.16);
    --blue:#6BA8FF; --blue-soft:rgba(107,168,255,.16);
    --amber:#F5B43C; --amber-soft:rgba(245,180,60,.16);
    --shadow:0 2px 6px rgba(0,0,0,.5),0 12px 32px rgba(0,0,0,.45);
    --shadow-sm:0 1px 3px rgba(0,0,0,.45);
  }
  :root:not([data-theme="light"]):not([data-theme="dark"]) input,
  :root:not([data-theme="light"]):not([data-theme="dark"]) select,
  :root:not([data-theme="light"]):not([data-theme="dark"]) textarea{background:#0A0F16;color:#EDF2F7;border-color:#293647}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .seg{background:#0A0F16}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .catbtn{background:#1A2533;color:#EDF2F7}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .chip{background:#1A2533}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .sheet{background:#0F1620}
  :root:not([data-theme="light"]):not([data-theme="dark"]) nav{background:rgba(15,22,32,.95)}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .toast{background:#EDF2F7;color:#0F1620}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .btn.ghost{background:#1A2533;border-color:#293647;color:#EDF2F7}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .year-pill select{background:#1A2533;color:#EDF2F7}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .receipt-add{background:#1A2533}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .grab{background:#3A4756}
}
</style>
</head>
<body>

<div class="top">
  <div class="logo">£</div>
  <div class="name">Tax<span>Mate</span></div>
  <div class="year-pill"><select id="yearSel" onchange="setYear(this.value)"></select></div>
</div>

<main id="page"></main>
<nav id="nav"></nav>

<!-- entry sheet -->
<div class="sb" id="sb-entry"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div class="stitle" id="en-title"></div>
  <div class="fg">
    <label for="en-amount" data-i18n="f.amount"></label>
    <div class="amt"><span class="cur">£</span>
      <input type="number" id="en-amount" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div>
    <div class="ferr" id="en-amount-err" data-i18n="f.amountErr"></div>
  </div>
  <div class="fg"><label for="en-date" data-i18n="f.date"></label><input type="date" id="en-date" onchange="checkEntryDate(this.value)"><div class="fhint" id="en-date-hint" style="display:none;color:var(--amber);font-weight:600"></div></div>
  <div class="fg" id="en-biz-group"><label for="en-biz" data-i18n="f.business"></label><select id="en-biz"></select></div>
  <div class="fg"><label data-i18n="f.category"></label><div class="fhint" style="margin:-2px 0 8px" data-i18n="cc.longPress"></div><div class="catgrid" id="en-cats"></div></div>
  <div class="fg" id="en-folder-group" style="display:none">
    <label for="en-folder" data-i18n="fd.title"></label>
    <div style="display:flex;gap:8px">
      <select id="en-folder" style="flex:1" onchange="EN.folderId=this.value||null"></select>
      <button type="button" class="btn soft" style="width:auto;padding:0 18px" onclick="openFolderSheet()">＋</button>
    </div>
  </div>
  <div class="fg" id="en-pct-group">
    <label data-i18n="f.bizUse"></label>
    <div class="fhint" data-i18n="f.bizUseHint"></div>

let S = load();
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const s = JSON.parse(raw);
    const merged = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), s);
    merged.settings = Object.assign({lang:'en', pro:false}, s.settings||{});
    merged.customCats = Object.assign({income:[],expense:[]}, s.customCats||{});
    merged.catRenames = s.catRenames || {};
    // Migration: existing users (have entries) but no activeCats yet →
    // activate all built-in categories so nothing disappears for them.
    if(!s.activeCats){
      if((s.entries||[]).length > 0){
        merged.activeCats = {
          income: CATS.income.map(c=>c.id),
          expense: CATS.expense.map(c=>c.id)
        };
      } else {
        merged.activeCats = {income:[], expense:[]};
      }
    } else {
      merged.activeCats = Object.assign({income:[],expense:[]}, s.activeCats);
    }
    if(!Array.isArray(merged.folders)) merged.folders = [];
    return merged;
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

function currentTaxYear(){
  const d = new Date(); const y = d.getFullYear();
  const after = (d.getMonth()>3)||(d.getMonth()===3&&d.getDate()>=6);
  const start = after ? y : y-1;
  return start+'-'+String((start+1)%100).padStart(2,'0');
}
function yearRange(yr){
  const s = parseInt(yr.slice(0,4),10);
  return {from:s+'-04-06', to:(s+1)+'-04-05'};

function inYear(dateISO, yr){ const r = yearRange(yr); return dateISO>=r.from && dateISO<=r.to; }
function yearOptions(){

  const cy = parseInt(currentTaxYear().slice(0,4),10);
  set.add((cy-1)+'-'+String(cy%100).padStart(2,'0'));
  set.add((cy+1)+'-'+String((cy+2)%100).padStart(2,'0'));
  S.entries.forEach(e=>{
    const d = new Date(e.date+'T12:00:00'); if(isNaN(d)) return;
    let y = d.getFullYear();
    const after = (d.getMonth()>3)||(d.getMonth()===3&&d.getDate()>=6);
    if(!after) y-=1;
    set.add(y+'-'+String((y+1)%100).padStart(2,'0'));
  });
  return Array.from(set).sort();
}

/* ═══════════ tax engine (tested) ═══════════ */
function bizFigures(b,yr){
  const inc = entriesFor(yr,b.id,'income').reduce((s,e)=>s+e.amount,0);
  const exp = entriesFor(yr,b.id,'expense').reduce((s,e)=>s+effExact(e),0);
  return {income:inc, expenses:exp, profit:inc-exp};
}
function calcTax(yr){
  const cfg = cfgFor(yr);
  const d = S.yearData[yr] || {poaPaid:0,priorAdj:0,taMode:'auto'};
  let soleIncome=0, soleExpenses=0, partShareProfit=0;
  const perBiz = S.businesses.map(b=>{
    const f = bizFigures(b,yr);
    if(b.structure==='partnership') partShareProfit += f.profit*(b.share||50)/100;
    else { soleIncome+=Math.max(0,f.income); soleExpenses+=Math.max(0,f.expenses); }
    return Object.assign({biz:b},f);
  });
  const profitActual = soleIncome - soleExpenses;
  const profitAllowance = Math.max(0, soleIncome - Math.min(cfg.tradingAllowance, soleIncome));
  const allowanceAvailable = soleIncome>0;
  const allowanceBetter = allowanceAvailable && (profitAllowance < profitActual);
  let taMode = d.taMode||'auto', taUsed;
  if(taMode==='allowance') taUsed=true;
  else if(taMode==='expenses') taUsed=false;
  else taUsed = allowanceBetter;
  if(!allowanceAvailable) taUsed=false;
  const soleProfit = taUsed ? profitAllowance : profitActual;
  const myProfit = soleProfit + partShareProfit;
  const profitForNIC = Math.max(0,myProfit);
  let pa = cfg.pa;
  if(myProfit>cfg.paTaperFrom) pa = Math.max(0, cfg.pa - Math.floor((myProfit-cfg.paTaperFrom)/2));
  const taxable = Math.max(0, myProfit-pa);
  const higherLimit = Math.max(cfg.basicBand, cfg.addlFrom-pa);
  const basicAmt = Math.min(taxable,cfg.basicBand);
  const higherAmt = Math.min(Math.max(taxable-cfg.basicBand,0), higherLimit-cfg.basicBand);
  const addlAmt = Math.max(taxable-higherLimit,0);
  const incomeTax = basicAmt*cfg.basic + higherAmt*cfg.higher + addlAmt*cfg.addl;
  const c4 = Math.min(Math.max(profitForNIC-cfg.c4Low,0), cfg.c4High-cfg.c4Low)*cfg.c4Main
           + Math.max(profitForNIC-cfg.c4High,0)*cfg.c4Upper;
  const class2TreatedPaid = profitForNIC >= cfg.c2SmallProfits;
  const class2Voluntary = Math.round(cfg.c2Weekly*52*100)/100;
  const liability = incomeTax + c4;
  const priorAdj = Number(d.priorAdj)||0;
  const poaPaid = Number(d.poaPaid)||0;
  const balancing = liability + priorAdj - poaPaid;
  const poaRequired = liability > cfg.poaThreshold;
  const poaEach = poaRequired ? liability/2 : 0;
  const janTotal = balancing + poaEach;
  return {cfg,perBiz,soleIncome,soleExpenses,profitActual,profitAllowance,allowanceAvailable,allowanceBetter,
          taUsed,taMode,soleProfit,partShareProfit,myProfit,pa,taxable,basicAmt,higherAmt,addlAmt,
          incomeTax,class4:c4,class2TreatedPaid,class2Voluntary,liability,priorAdj,poaPaid,balancing,
          poaRequired,poaEach,janTotal};
}

function entryRow(e){
  const c = catById(e.cat);
  const b = bizById(e.bizId);
  const pctNote = (e.kind==='expense'&&e.pct!=null&&e.pct<100) ? ` · ${e.pct}%` : '';
  const d = new Date(e.date+'T12:00:00').toLocaleDateString(locale(),{day:'numeric',month:'short'});
  return `<button class="entry" onclick="openEntry('${e.kind}','${e.id}')">
    <div class="edot" style="background:${c.dot}1A">${c.e||'🏷️'}</div>
    <div class="grow">
      <div class="t">${esc(e.desc)||esc(catName(c.id))}</div>
      <div class="s">${d}${e.desc?' · '+esc(catName(c.id)):''}${b?' · '+esc(b.name):''}${pctNote}</div>
    </div>
    ${e.receiptUrl?`<img class="receipt-thumb" style="width:36px;height:36px;margin-inline-start:8px" src="${e.receiptUrl}" onclick="event.stopPropagation();openLightbox('${e.receiptUrl}','${e.receiptPath||''}')">`:``}
    <div class="v num ${e.kind==='income'?'pos':'neg'}" style="margin-inline-start:${e.receiptUrl?4:0}px">${e.kind==='income'?'+':'−'}${fmt(e.kind==='income'?e.amount:effExact(e)).replace('−','')}</div>
  </button>`;
}

function pageList(kind){
  const isInc = kind==='income';
  const fKey = isInc?'incFilter':'expFilter';
  const filt = S[fKey];

  const chips = S.businesses.length>1 ?
    `<div class="chips">
      <button class="chip ${filt==='all'?'on':''}" onclick="setFilter('${fKey}','all')">${t('flt.all')}</button>
      ${S.businesses.map(b=>`<button class="chip ${filt===b.id?'on':''}" onclick="setFilter('${fKey}','${b.id}')">${esc(b.name)}</button>`).join('')}
    </div>` : '';

  const fchips = (!isInc && S.folders.length) ?
    `<div class="chips">
      <button class="chip ${S.expFolder==='all'?'on':''}" onclick="setFilter('expFolder','all')">${t('fd.all')}</button>
      ${S.folders.map(f=>`<button class="chip ${S.expFolder===f.id?'on':''}" onclick="setFilter('expFolder','${f.id}')">📁 ${esc(f.name)}</button>`).join('')}
    </div>` : '';

  let list = entriesFor(S.year, filt==='all'?null:filt, kind).sort((a,b)=>b.date.localeCompare(a.date));
  if(!isInc && S.expFolder!=='all') list = list.filter(e=>e.folderId===S.expFolder);
  const total = list.reduce((s,e)=>s+(isInc?e.amount:effExact(e)),0);
  let body='';
  if(!list.length){
    body = `<div class="empty"><div class="big-emoji">${isInc?'🌱':'🧾'}</div>
      <div class="t">${t(isInc?'inc.empty':'exp.empty')}</div>
      <div class="s">${t(isInc?'inc.emptyS':'exp.emptyS')}</div></div>`;
  } else {
    const groups={};
    list.forEach(e=>{ const k=e.date.slice(0,7); (groups[k]=groups[k]||[]).push(e); });
    body = Object.keys(groups).sort((a,b)=>{
      const cur = todayISO().slice(0,7);
      const aFut = a>cur, bFut = b>cur;
      // Past/current months first (newest→oldest), future months last (oldest→newest)
      if(aFut && !bFut) return 1;
      if(!aFut && bFut) return -1;
      if(aFut && bFut) return a.localeCompare(b);
      return b.localeCompare(a);
    }).map(k=>{
      const lbl = new Date(k+'-15T12:00:00').toLocaleDateString(locale(),{month:'long',year:'numeric'});
      const sub = groups[k].reduce((s,e)=>s+(isInc?e.amount:effExact(e)),0);
      return `<div class="month"><span>${lbl}</span><span class="num ${isInc?'pos':'neg'}">${isInc?'+':'−'}${fmt(sub).replace('−','')}</span></div>
        <div class="elist">${groups[k].map(entryRow).join('')}</div>`;
    }).join('');
  }

  return `
  <div class="h1" style="display:flex;align-items:baseline;justify-content:space-between">
    <span>${t(isInc?'inc.title':'exp.title')}</span>
    <span class="num ${isInc?'pos':'neg'}" style="font-size:18px">${isInc?'+':'−'}${fmt(total).replace('−','')}</span>
  </div>
  ${chips}
  ${fchips}
  ${body}
  <button class="fab" onclick="openEntry('${kind}')" aria-label="Add">+</button>`;
}
function setFilter(key,v){ S[key]=v; save(); render(); }

function dateToTaxYear(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  const y = d.getFullYear();
  const apr6 = new Date(y,3,6);
  const startY = d >= apr6 ? y : y-1;
  return startY + '-' + String((startY+1)%100).padStart(2,'0');
}
function checkEntryDate(dateStr){
  const hint = document.getElementById('en-date-hint');
  if(!hint || !dateStr) return;
  const entryYr = dateToTaxYear(dateStr);
  if(entryYr !== S.year){
    hint.textContent = t('f.dateOtherYear',{y:entryYr});
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
}

function saveEntry(){
  const amt = parseFloat(document.getElementById('en-amount').value);
  if(!(amt>0)){
    document.getElementById('en-amount').classList.add('err');
    document.getElementById('en-amount-err').classList.add('show');
    document.getElementById('en-amount').focus();
    return;
  }
  if(!EN.cat){
    const catGrid = document.getElementById('en-cats');
    if(catGrid){
      catGrid.style.outline='2px solid var(--coral)';
      catGrid.style.outlineOffset='4px';
      catGrid.style.borderRadius='12px';
      if(catGrid.scrollIntoView) catGrid.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>{ catGrid.style.outline=''; },2200);
    }
    toast(t('f.catErr'));
    return;
  }
  const rec = {
    id:EN.id||uid(),
    bizId:document.getElementById('en-biz').value||(S.businesses[0]&&S.businesses[0].id),
    kind:EN.kind,
    date:document.getElementById('en-date').value||todayISO(),
    amount:Math.round(amt*100)/100,
    cat:EN.cat,
    pct:EN.kind==='expense'?EN.pct:null,
    folderId:EN.kind==='expense'?(document.getElementById('en-folder').value||null):null,
    receiptUrl: EN.receiptUrl||null,
    receiptPath: EN.receiptPath||null,
    desc:document.getElementById('en-desc').value.trim()
  };
  if(EN.id){
    const i=S.entries.findIndex(x=>x.id===EN.id); if(i>-1) S.entries[i]=rec;
    save(); pushEntryRemote(rec); closeSheet('entry'); render(); toast(t('toast.saved'));
  } else if(EN.repeat && EN.kind==='expense'){
    // Add for all 12 months of the current tax year
    const baseDay = new Date(rec.date+'T12:00:00').getDate();
    const yrStart = parseInt(S.year.slice(0,4));
    const pad = n => String(n).padStart(2,'0');
    let count=0;
    // Tax year runs April (month index 3) of yrStart through March of yrStart+1
    for(let m=0;m<12;m++){
      const monthIdx = (3+m) % 12;
      const realYear = (3+m) > 11 ? yrStart+1 : yrStart;
      const daysInMonth = new Date(realYear, monthIdx+1, 0).getDate();
      const day = Math.min(baseDay, daysInMonth);
      const dateStr = realYear+'-'+pad(monthIdx+1)+'-'+pad(day);
      const r = Object.assign({}, rec, {id:uid(), date:dateStr});
      S.entries.push(r); pushEntryRemote(r); count++;
    }
    save(); closeSheet('entry'); render(); toast(t('f.repeatAdded',{n:count}));
  } else {
    S.entries.push(rec);
    save(); pushEntryRemote(rec); closeSheet('entry'); render(); toast(t('toast.saved'));
  }
}

  confirmAction(t('d.entryT'), t('d.entryM'), ()=>{
    const e = S.entries.find(x=>x.id===EN.id);
    S.entries = S.entries.filter(x=>x.id!==EN.id);

function paintSync(){
  const el = document.getElementById('bz-sync');
  if(!el) return;
  el.innerHTML = '';
  if(BZ.structure!=='partnership') return;
  if(!BZ.id){ el.innerHTML = `<div class="s" style="margin-bottom:10px">💡 ${t('sy.saveFirst')}</div>`; return; }
  const b = bizById(BZ.id); if(!b) return;
  if(!S.settings.pro){ el.innerHTML = `<div class="notice amber">🔒 ${t('sy.needPro')}</div>`; return; }
  if(!fbConfigured()){ el.innerHTML = `<div class="notice amber">⚙️ ${t('sy.setup')}</div>`; return; }
  // 新生意:顯示 pendingCode，儲存時自動啟用
  if(!BZ.id && BZ.pendingCode){
    el.innerHTML = `
      <div class="notice green" style="text-align:center">
        <div style="font-size:12px;font-weight:700">🤝 ${t('sy.code')} · Ready to activate</div>
        <div class="num" style="font-size:34px;font-weight:800;letter-spacing:7px;margin:8px 0 6px">${BZ.pendingCode}</div>
        <div style="font-size:12px;opacity:.8">Share this code with your partner — it activates when you save.</div>
      </div>`;
    return;
  }
  if(b && b.syncCode){
    el.innerHTML = `
      <div class="notice green" style="text-align:center">
        <div style="font-size:12px;font-weight:700">${t('sy.code')} · ${t('sy.synced')} ✓</div>
        <div class="num" style="font-size:32px;font-weight:800;letter-spacing:7px;margin:6px 0 10px">${b.syncCode}</div>
        <button class="btn" onclick="invitePartner('${b.id}')">💌 ${t('sy.invite')}</button>
        <div style="margin-top:10px"><button class="link danger" onclick="leaveSync('${b.id}')">${t('sy.leave')}</button></div>
      </div>`;
  } else {
    el.innerHTML = `<button class="btn ink" style="margin-bottom:12px" onclick="enableSync('${BZ.id}')">🤝 ${t('sy.enable')}</button>`;
  }
}
function saveBiz(){
  const name = document.getElementById('bz-name').value.trim();
  if(!name){
    document.getElementById('bz-name').classList.add('err');
    document.getElementById('bz-name-err').classList.add('show');
    return;
  }
  let share = parseInt(document.getElementById('bz-share').value,10);
  if(!(share>=1&&share<=100)) share=50;
  let newId = null;
  if(BZ.id){
    const b = bizById(BZ.id);
    b.name=name; b.structure=BZ.structure; b.share=BZ.structure==='partnership'?share:100;
    pushBizRemote(b);
  } else {
    newId = uid();
    const newBiz = {id:newId, name, structure:BZ.structure, share:BZ.structure==='partnership'?share:100, trade:BZ.trade||null};
    // Partnership + Pro + Firebase: 一次過儲存並推上雲端
    if(BZ.structure==='partnership' && BZ.pendingCode && S.settings.pro && fbConfigured()){
      newBiz.syncCode = BZ.pendingCode;
    }
    S.businesses.push(newBiz);
  }
  save(); closeSheet('biz'); render(); toast(t('toast.saved'));
  // 新業務 + 揀咗有建議嘅 trade → 彈出建議分類
  if(newId && BZ.trade){
    const tr = TRADES.find(x=>x.id===BZ.trade);
    if(tr && tr.cats.length){ SUGGEST = {bizId:newId, picked:tr.cats.slice()}; setTimeout(openSuggestSheet, 280); return; }
  }
  // 有 pendingCode → 直接啟用 sync，唔使重開 sheet
  if(newId && BZ.pendingCode && S.businesses[S.businesses.length-1].syncCode){
    const code = BZ.pendingCode;
    ensureAuth().then(u=>{
      if(!u) return;
      FB.db.collection('partnerships').doc(code).set({
        bizId: newId, name, structure:'partnership', createdBy: u.uid, createdAt: Date.now(), v:1
      }).then(()=>{
        const batch = FB.db.batch();
        S.entries.filter(e=>e.bizId===newId).forEach(e=>{
          batch.set(FB.db.collection('partnerships').doc(code).collection('entries').doc(e.id), e);
        });
        return batch.commit();
      }).then(()=>{
        subscribeSync(code, newId);
      }).catch(e=>console.warn('sync push failed', e));
    });
  } else if(newId && BZ.structure==='partnership'){
    // Pro 未開或無 Firebase:儲存後重開 sheet 讓用家見到 sync 掣
    setTimeout(()=>openBiz(newId), 260);
  }
}
function deleteBiz(){
  confirmAction(t('d.bizT'), t('d.bizM'), ()=>{
    S.entries = S.entries.filter(e=>e.bizId!==BZ.id);
    S.businesses = S.businesses.filter(b=>b.id!==BZ.id);
    if(S.incFilter===BZ.id) S.incFilter='all';
    if(S.expFilter===BZ.id) S.expFilter='all';
    save(); closeSheet('biz'); render();
  });
}

function confirmAction(title,msg,fn){
  document.getElementById('cf-title').textContent = title;
  document.getElementById('cf-msg').textContent = msg;
  document.getElementById('cf-yes').onclick = ()=>{ closeSheet('confirm'); fn(); };
  openSheet('confirm');
}
function resetAll(){
  localStorage.removeItem(STORE_KEY);
  S = JSON.parse(JSON.stringify(DEFAULT_STATE));
  render();
}
function openSheet(id){ document.getElementById('sb-'+id).classList.add('open'); document.body.classList.add('sheet-open'); setTimeout(initSheetDrag,50); history.pushState({tm:'sheet'}, ''); }
function closeParentSheet(el){
  const sb = el.closest('.sb');
  if(sb){ sb.classList.remove('open'); document.body.classList.remove('sheet-open'); }
}
// Drag-to-dismiss on grab handles
function initSheetDrag(){
  document.querySelectorAll('.sheet').forEach(sheet=>{
    const grab = sheet.querySelector('.grab');
    if(!grab || grab.dataset.dragInit) return;
    grab.dataset.dragInit='1';
    let startY=0, curY=0, dragging=false;
    const onStart=e=>{ dragging=true; startY=(e.touches?e.touches[0].clientY:e.clientY); sheet.style.transition='none'; };
    const onMove=e=>{ if(!dragging)return; curY=(e.touches?e.touches[0].clientY:e.clientY); const dy=Math.max(0,curY-startY); sheet.style.transform='translateY('+dy+'px)'; };
    const onEnd=()=>{ if(!dragging)return; dragging=false; sheet.style.transition=''; const dy=curY-startY; if(dy>100){ const sb=sheet.closest('.sb'); if(sb){sb.classList.remove('open');document.body.classList.remove('sheet-open');} } sheet.style.transform=''; };
    grab.addEventListener('touchstart',onStart,{passive:true});
    grab.addEventListener('touchmove',onMove,{passive:true});
    grab.addEventListener('touchend',onEnd);
    grab.addEventListener('mousedown',onStart);
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onEnd);
  });
}
function closeSheet(id){ document.getElementById('sb-'+id).classList.remove('open'); document.body.classList.remove('sheet-open'); }

/* Toast feedback */
let _toastTimer=null;
function toast(msg){
  let el = document.getElementById('taxmate-toast');
  if(!el){
    el = document.createElement('div');
    el.id='taxmate-toast'; el.className='toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  requestAnimationFrame(()=>el.classList.add('show'));
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 2000);
}
document.querySelectorAll('.sb').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o){ o.classList.remove('open'); document.body.classList.remove('sheet-open'); } }));

/* ═══════════ Accountant Export ═══════════ */
function exportAccountant(){
  const yr = S.year;
  const tx = calcTax(yr);
  const Q = s => '"'+String(s||'').replace(/"/g,'""')+'"';
  const M = n => isNaN(n)?'':n.toFixed(2);
  const rows = [];
  const blank = () => rows.push([]);
  const head = (...c) => rows.push(c.map(v=>Q(v)));
  const row  = (...c) => rows.push(c.map((v,i)=>i>0&&typeof v==='number'?M(v):Q(v)));
  const sep  = label => { blank(); rows.push([Q('--- '+label+' ---')]); };

  // ── COVER ──
  head('TAXMATE UK - ACCOUNTANT REPORT');
  row('Tax year', yr);
  row('Generated', new Date().toLocaleDateString('en-GB'));
  row('Prepared by', t('acc.prepared'));
  blank();

  // ── BUSINESSES ──
  sep('BUSINESSES');
  head('Name','Structure','Share %');
  S.businesses.forEach(b=>{
    row(b.name, b.structure==='partnership'?'Partnership':'Sole trader',
        b.structure==='partnership'?b.share:100);
  });

  // ── SUMMARY ──
  sep('SUMMARY');
  head('Item','Amount (GBP)');
  row('Total income',              tx.soleIncome + tx.partShareProfit/((S.businesses.find(b=>b.structure==='partnership')?.share||50)/100));
  row('Total allowable expenses',  tx.soleExpenses);
  row('Trading allowance used',    tx.taUsed?'Yes':'No');
  row('Net profit (taxable)',       tx.myProfit);
  row('Estimated Income Tax',       tx.incomeTax);
  row('Estimated Class 4 NI',       tx.class4);
  row('Estimated total tax bill',   tx.liability);
  blank();

  // ── MONTHLY P&L ──
  sep('MONTHLY PROFIT & LOSS');
  head('Month','Income (GBP)','Expenses (GBP)','Net (GBP)');
  const months = {};
  entriesFor(yr,null,null).forEach(e=>{
    const m = e.date.slice(0,7);
    if(!months[m]) months[m]={inc:0,exp:0};
    if(e.kind==='income') months[m].inc+=e.amount;
    else months[m].exp+=effExact(e);
  });
  Object.keys(months).sort().forEach(m=>{
    const lbl = new Date(m+'-15T12:00:00').toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    row(lbl, months[m].inc, months[m].exp, months[m].inc-months[m].exp);
  });

  // ── INCOME BY CATEGORY ──
  sep('INCOME BY CATEGORY');
  head('Category','Amount (GBP)');
  const incCats={};
  entriesFor(yr,null,'income').forEach(e=>{ incCats[e.cat]=(incCats[e.cat]||0)+e.amount; });
  Object.entries(incCats).sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>row(catName(c),v));

  // ── EXPENSES BY CATEGORY (SA103 reference) ──
  sep('EXPENSES BY CATEGORY (SA103 BOX REFERENCE)');
  head('SA103 Box','Category','Gross (GBP)','Biz Use %','Claimable (GBP)');
  const BOX_LABEL={19:'Box 19 - Stock',22:'Box 22 - Premises',23:'Box 23 - Repairs',
    24:'Box 24 - Admin',25:'Box 25 - Motor',26:'Box 26 - Travel',
    27:'Box 27 - Marketing',33:'Box 33 - Professional fees',35:'Box 35 - Other'};
  const expByBox={};
  entriesFor(yr,null,'expense').forEach(e=>{
    const box=CAT_TO_BOX[e.cat]||35;
    if(!expByBox[box]) expByBox[box]={gross:0,claimable:0,cats:new Set()};
    expByBox[box].gross+=e.amount; expByBox[box].claimable+=effExact(e); expByBox[box].cats.add(catName(e.cat));
  });
  Object.keys(expByBox).sort((a,b)=>+a-+b).forEach(box=>{
    const d=expByBox[box];
    const pct=d.gross>0?Math.round(d.claimable/d.gross*100):0;
    row(BOX_LABEL[box]||'Box '+box, Array.from(d.cats).join(', '), d.gross, pct, d.claimable);
  });

  // ── ALL TRANSACTIONS ──
  sep('ALL TRANSACTIONS');
  head('Date','Business','Type','Category','SA103 Box','Description','Gross (GBP)','Biz Use %','Claimable (GBP)','Receipt');
  entriesFor(yr,null,null).sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    const b=bizById(e.bizId); const box=e.kind==='expense'?(CAT_TO_BOX[e.cat]||35):'-';
    const pct=e.kind==='expense'?(e.pct==null?100:e.pct):100;
    rows.push([Q(e.date),Q(b?b.name:'?'),Q(e.kind),Q(catName(e.cat)),Q(box),
      Q(e.desc),Q(M(e.amount)),Q(pct+'%'),Q(M(effExact(e))),Q(e.receiptUrl?'Yes':'No')]);
  });

  // ── EXPORT ──
  const csv = rows.map(r=>r.join(',')).join('\r\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'taxmate-accountant-'+yr+'-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
}

function exportCSV(){
  const head = 'Date,Business,Type,Category,Description,Amount,Business use %,Claimable amount\n';
  const q = s=>'"'+String(s||'').replace(/"/g,'""')+'"';
  const rows = S.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
    const b = bizById(e.bizId);
    return [e.date,q(b?b.name:''),e.kind,q(catName(e.cat)),q(e.desc),e.amount.toFixed(2),
            e.kind==='expense'?(e.pct==null?100:e.pct):'',
            (e.kind==='expense'?effExact(e):e.amount).toFixed(2)].join(',');
  }).join('\n');
  const blob = new Blob(['\ufeff'+head+rows],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'taxmate-entries-'+todayISO()+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
}
function importJSON(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data || !Array.isArray(data.businesses)){ alert(t('r.bad')); return; }
      confirmAction(t('r.title'), t('r.msg'), ()=>{
        S = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), data);
        S.settings = Object.assign({lang:'en'}, data.settings||{});
        save(); render(); toast(t('toast.restored'));
      });
    }catch(err){ alert(t('r.bad')); }
  };
  r.readAsText(f);
  ev.target.value='';
}

let FB = { db:null, uid:null, ready:false, subs:{} };
function fbConfigured(){ return (typeof firebase!=='undefined') && !!FIREBASE_CONFIG.apiKey; }
async function ensureFB(){
  if(!fbConfigured()) return null;
  if(FB.ready) return FB.db;
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    FB.db = firebase.firestore();
    try{ await FB.db.enablePersistence({synchronizeTabs:true}); }catch(e){}
    FB.ready = true;
    watchAuth();
    return FB.db;
  }catch(e){ console.warn('Sync init failed', e); return null; }
}
async function ensureAuth(){
  const db = await ensureFB(); if(!db) return null;
  const cur = firebase.auth().currentUser;
  if(cur) return cur;
  try{ const cred = await firebase.auth().signInAnonymously(); FB.uid = cred.user.uid; return cred.user; }
  catch(e){ console.warn(e); return null; }
}
function genCode(){
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for(let i=0;i<6;i++) c += A[Math.floor(Math.random()*A.length)];
  return c;
}
async function enableSync(bizId){
  const b = bizById(bizId); if(!b) return;
  const db = await ensureFB();
  if(!db){ alert(t(fbConfigured()?'sy.needNet':'sy.setup')); return; }
  const u = await ensureAuth();
  if(!u){ alert(t('sy.needNet')); return; }
  const code = genCode();
  try{
    await db.collection('partnerships').doc(code).set({
      bizId: b.id, name: b.name, structure: 'partnership',
      createdBy: u.uid, createdAt: Date.now(), v: 1
    });
    const batch = db.batch();
    S.entries.filter(e=>e.bizId===b.id).forEach(e=>{
      batch.set(db.collection('partnerships').doc(code).collection('entries').doc(e.id), e);
    });
    await batch.commit();
    b.syncCode = code; save();
    subscribeSync(code, b.id);
    paintSync(); render();
  }catch(e){ console.warn(e); alert(t('sy.needNet')); }
}
function subscribeSync(code, bizId){
  if(FB.subs[code]) return;
  FB.subs[code] = true; // 鎖住避免重複訂閱
  ensureAuth().then(u=>{
    const db = FB.db;
    if(!u || !db){ delete FB.subs[code]; return; }
    const unsubs = [];
    unsubs.push(db.collection('partnerships').doc(code).onSnapshot(doc=>{
      const d = doc.data(); if(!d) return;
      const b = bizById(bizId);
      if(b && d.name && b.name !== d.name){ b.name = d.name; save(); render(); }
    }, ()=>{}));
    unsubs.push(db.collection('partnerships').doc(code).collection('entries').onSnapshot(snap=>{
      const remote = [];
      snap.forEach(x=>remote.push(x.data()));
      S.entries = S.entries.filter(e=>e.bizId!==bizId).concat(remote);
      save(); render();
    }, ()=>{}));
    FB.subs[code] = unsubs;
  });
}
async function joinPartnership(){
  const input = document.getElementById('join-code');
  const msg = document.getElementById('join-msg');
  const code = (input && input.value || '').trim().toUpperCase();
  if(code.length !== 6){ if(msg) msg.textContent = t('sy.enterCode'); return; }
  if(!S.settings.pro){ if(msg) msg.textContent = t('sy.needPro'); return; }
  const db = await ensureFB();
  if(!db){ if(msg) msg.textContent = t(fbConfigured()?'sy.needNet':'sy.setup'); return; }
  const u = await ensureAuth();
  if(!u){ if(msg) msg.textContent = t('sy.needNet'); return; }
  try{
    const doc = await db.collection('partnerships').doc(code).get();
    if(!doc.exists){ if(msg) msg.textContent = t('sy.badCode'); return; }
    const d = doc.data();
    const existing = bizById(d.bizId);
    if(!existing) S.businesses.push({id:d.bizId, name:d.name, structure:'partnership', share:50, syncCode:code});
    else existing.syncCode = code;
    save();
    subscribeSync(code, d.bizId);
    go('home');
  }catch(e){ console.warn(e); if(msg) msg.textContent = t('sy.needNet'); }
}
function leaveSync(bizId){
  const b = bizById(bizId); if(!b || !b.syncCode) return;
  const subs = FB.subs[b.syncCode];
  if(Array.isArray(subs)) subs.forEach(u=>{ try{u();}catch(e){} });
  delete FB.subs[b.syncCode];
  delete b.syncCode;
  save(); paintSync(); render();
}
function invitePartner(bizId){
  const b = bizById(bizId); if(!b || !b.syncCode) return;
  const text = t('sy.inviteMsg',{n:b.name, c:b.syncCode}) + '\n' + location.href.split('#')[0];

  else if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>alert(t('sy.copied'))).catch(()=>prompt('', text)); }
  else prompt('', text);
}

function deleteEntryRemote(bizId, id){

/* ═══════════ Account & personal cloud sync ═══════════ */
let CLOUD = { metaUnsub:null, entUnsub:null, applying:false, pushTimer:null, lastPushed:'' };
function cloudUser(){
  try{
    if(typeof firebase==='undefined' || !firebase.apps || !firebase.apps.length) return null;
    const u = firebase.auth().currentUser;
    return (u && !u.isAnonymous) ? u : null;
  }catch(e){ return null; }
}
function watchAuth(){
  if(watchAuth.done) return; watchAuth.done = true;
  firebase.auth().onAuthStateChanged(u=>{
    if(u && !u.isAnonymous) startUserSync(u);
    else stopUserSync();
    render();
  });
}
async function signIn(kind){
  const db = await ensureFB();
  if(!db){ alert(t(fbConfigured()?'ac.needNet':'sy.setup')); return; }
  const provider = (kind==='apple') ? new firebase.auth.OAuthProvider('apple.com')
                                    : new firebase.auth.GoogleAuthProvider();
  try{
    const cur = firebase.auth().currentUser;
    if(cur && cur.isAnonymous){
      // 升級匿名帳戶 → 保留 uid,partnership membership 唔會斷
      try{ await cur.linkWithPopup(provider); }
      catch(e){
        if(e && e.code==='auth/credential-already-in-use' && e.credential){
          await firebase.auth().signInWithCredential(e.credential);
        } else throw e;
      }
    } else {
      await firebase.auth().signInWithPopup(provider);
    }
  }catch(e){
    if(e && e.code==='auth/popup-closed-by-user') return;
    console.warn(e); alert(t('ac.err'));
  }
}
function doSignOut(){
  stopUserSync();
  try{ firebase.auth().signOut(); }catch(e){}
  render();
}
function userRoot(uid){ return FB.db.collection('users').doc(uid); }

async function startUserSync(u){
  if(CLOUD.metaUnsub) return;
  const uid = u.uid;
  try{
    /* 1 ── 初次合併:雲端有嘅補入本地(以 id 去重) */
    const metaDoc = await userRoot(uid).collection('app').doc('meta').get();
    const entSnap = await userRoot(uid).collection('entries').get();
    if(metaDoc.exists){
      const m = metaDoc.data();
      (m.businesses||[]).forEach(rb=>{ if(!bizById(rb.id)) S.businesses.push(rb); });
      (m.folders||[]).forEach(rf=>{ if(!folderById(rf.id)) S.folders.push(rf); });
      ['income','expense'].forEach(k=>{
        ((m.customCats&&m.customCats[k])||[]).forEach(rc=>{
          if(!S.customCats[k].find(c=>c.id===rc.id)) S.customCats[k].push(rc);
        });
      });
      Object.keys(m.yearData||{}).forEach(y=>{ S.yearData[y] = Object.assign({}, S.yearData[y]||{}, m.yearData[y]); });
      if(m.settings && m.settings.pro) S.settings.pro = true;
    }
    const localIds = new Set(S.entries.map(e=>e.id));
    entSnap.forEach(d=>{ const re=d.data(); if(re && !localIds.has(re.id)) S.entries.push(re); });
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}

    /* 2 ── 推合併結果上雲 */
    await pushUserState(uid, true);

    /* 3 ── 實時訂閱(其他裝置改嘢即時反映) */
    CLOUD.metaUnsub = userRoot(uid).collection('app').doc('meta').onSnapshot(doc=>{
      const m = doc.data(); if(!m || CLOUD.applying) return;
      CLOUD.applying = true;
      if(Array.isArray(m.businesses)) S.businesses = m.businesses;
      if(Array.isArray(m.folders)) S.folders = m.folders;
      if(m.customCats) S.customCats = Object.assign({income:[],expense:[]}, m.customCats);
      if(m.yearData) S.yearData = m.yearData;
      if(m.settings && typeof m.settings.pro==='boolean') S.settings.pro = m.settings.pro;
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}
      CLOUD.applying = false;
      render();
      S.businesses.filter(b=>b.syncCode).forEach(b=>subscribeSync(b.syncCode, b.id));
    }, ()=>{});
    CLOUD.entUnsub = userRoot(uid).collection('entries').onSnapshot(snap=>{
      if(CLOUD.applying) return;
      CLOUD.applying = true;
      const remote = []; snap.forEach(d=>remote.push(d.data()));
      const partnerBiz = new Set(S.businesses.filter(b=>b.syncCode).map(b=>b.id));
      const partnerEntries = S.entries.filter(e=>partnerBiz.has(e.bizId));
      S.entries = remote.filter(e=>!partnerBiz.has(e.bizId)).concat(partnerEntries);
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}
      CLOUD.applying = false;
      render();
    }, ()=>{});

    S.businesses.filter(b=>b.syncCode).forEach(b=>subscribeSync(b.syncCode, b.id));
    render();
  }catch(e){ console.warn('user sync failed', e); }
}
function stopUserSync(){
  if(CLOUD.metaUnsub){ try{CLOUD.metaUnsub();}catch(e){} CLOUD.metaUnsub=null; }
  if(CLOUD.entUnsub){ try{CLOUD.entUnsub();}catch(e){} CLOUD.entUnsub=null; }
  CLOUD.lastPushed='';
}
async function pushUserState(uid, force){
  if(!FB.ready) return;
  if(!uid){ const cu = cloudUser(); if(!cu) return; uid = cu.uid; }
  const partnerBiz = new Set(S.businesses.filter(b=>b.syncCode).map(b=>b.id));
  const meta = { businesses:S.businesses, folders:S.folders, customCats:S.customCats,
                 yearData:S.yearData, settings:{pro:!!S.settings.pro}, updatedAt:Date.now() };
  const mine = S.entries.filter(e=>!partnerBiz.has(e.bizId));
  const payload = JSON.stringify([meta.businesses,meta.folders,meta.customCats,meta.yearData,meta.settings]) + '|' + JSON.stringify(mine);
  if(!force && payload === CLOUD.lastPushed) return;
  CLOUD.lastPushed = payload;
  try{
    await userRoot(uid).collection('app').doc('meta').set(meta);
    const entSnap = await userRoot(uid).collection('entries').get();
    const remoteIds = new Set(); entSnap.forEach(d=>remoteIds.add(d.id));
    const localIds = new Set(mine.map(e=>e.id));
    const batch = FB.db.batch();
    mine.forEach(e=>batch.set(userRoot(uid).collection('entries').doc(e.id), e));
    remoteIds.forEach(id=>{ if(!localIds.has(id)) batch.delete(userRoot(uid).collection('entries').doc(id)); });
    await batch.commit();
  }catch(e){ console.warn('cloud push failed', e); }
}
function scheduleCloudPush(){
  if(!cloudUser() || CLOUD.applying) return;
  clearTimeout(CLOUD.pushTimer);
  CLOUD.pushTimer = setTimeout(()=>pushUserState(), 1200);
}

/* ═══════════ Cloud tax rates (免重新上架嘅年度更新) ═══════════ */
const RATES_CACHE_KEY = 'taxmateuk_rates_v1';
function applyCachedRates(){
  try{
    const c = localStorage.getItem(RATES_CACHE_KEY);
    if(c) Object.assign(TAXCFG, JSON.parse(c));
  }catch(e){}
}
async function loadCloudRates(){
  const db = await ensureFB(); if(!db) return;
  try{
    const doc = await db.collection('appConfig').doc('taxRates').get();
    if(doc.exists){
      const years = (doc.data()||{}).years || {};
      if(Object.keys(years).length){
        Object.assign(TAXCFG, years);
        try{ localStorage.setItem(RATES_CACHE_KEY, JSON.stringify(years)); }catch(e){}
        render();
      }
    }
  }catch(e){ console.warn('rates fetch failed', e); }
}

/* ═══════════ Mileage vs Actual Expenses ═══════════ */
function calcMileage(yr){
  const miles = Number(yd().mileage)||0;
  const milesClaim = Math.min(miles,10000)*0.45 + Math.max(miles-10000,0)*0.25;
  // 只計 sole trader 嘅 vehicle + travel 開支
  const soleBizIds = S.businesses.filter(b=>b.structure==='sole').map(b=>b.id);
  const vehicleExp = entriesFor(yr,null,'expense')
    .filter(e=>soleBizIds.includes(e.bizId) && (e.cat==='vehicle'||e.cat==='travel'))
    .reduce((s,e)=>s+effExact(e),0);
  const diff = milesClaim - vehicleExp;
  const better = Math.abs(diff)<0.5 ? 'equal' : diff>0 ? 'mileage' : 'actual';
  return {miles, milesClaim, vehicleExp, diff:Math.abs(diff), better};
}

/* ═══════════ SA103 / SA104 Form Reference ═══════════ */
const CAT_TO_BOX = {
  stock:19, home:22, insure:22, repair:23, office:24,
  vehicle:25, travel:26, market:27, fees:33,
  phone:35, equip:35, other:35
};

function saBoxRow(box, desc, val, isTick, isExp){
  // HMRC SA: 整數英鎊 — 收入向下取整，開支向上取整
  function saRound(n){ return isExp ? Math.ceil(Math.abs(n)) : Math.floor(Math.abs(n)); }
  const rounded = typeof val==='number' ? (val<0?-1:1)*saRound(val) : val;
  const dispNum = typeof rounded==='number'
    ? (rounded<0?'−':'')+'£'+Math.abs(rounded).toLocaleString('en-GB')
    : String(rounded);
  const disp = isTick ? (val?'✓ Tick this box':'Leave unticked') : dispNum;
  const copyVal = isTick ? '' : (typeof rounded==='number' ? String(Math.abs(rounded)) : String(rounded));
  const copyBtn = !isTick && copyVal
    ? '<button data-v="'+copyVal+'" onclick="saCopy(this)" style="background:var(--brand-soft);color:var(--brand-deep);border:0;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">'+t('sa.copy')+'</button>'
    : '';
  return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">'
    +'<div style="width:38px;flex-shrink:0;font-size:11px;font-weight:800;color:var(--muted);background:var(--bg);border-radius:6px;padding:3px 5px;text-align:center">'+t('sa.box')+' '+box+'</div>'
    +'<div style="flex:1;min-width:0"><div style="font-size:13px;color:var(--ink)">'+desc+'</div></div>'
    +'<div style="font-size:13px;font-weight:800;white-space:nowrap;color:'+(isTick?(val?'var(--brand-deep)':'var(--muted)'):'var(--ink)')+'">'+disp+'</div>'
    +copyBtn+'</div>';
}

function saCopy(btn){
  const val=btn.getAttribute('data-v')||'';
  navigator.clipboard && navigator.clipboard.writeText(val).then(()=>{
    const orig = btn.textContent;
    btn.textContent = t('sa.copied');
    btn.style.background = 'var(--brand-soft)';
    setTimeout(()=>{ btn.textContent=orig; },1500);
  }).catch(()=>{});
}

function bizFiguresRaw(b,yr){
  const inc = entriesFor(yr,b.id,'income').reduce((s,e)=>s+Math.max(0,e.amount),0);
  const exp = entriesFor(yr,b.id,'expense').reduce((s,e)=>s+Math.max(0,effExact(e)),0);
  return {income:inc, expenses:exp, profit:inc-exp};
}

function catExpenses(bizId, yr, cats){
  return entriesFor(yr,bizId,'expense')
    .filter(e=>cats.includes(e.cat))
    .reduce((s,e)=>s+Math.max(0,effExact(e)),0);
}

// UK tax quarters
const QUARTERS = [
  {id:'Q1', from:[3,6],  to:[6,5]},  // Apr 6 – Jul 5
  {id:'Q2', from:[6,6],  to:[9,5]},  // Jul 6 – Oct 5
  {id:'Q3', from:[9,6],  to:[0,5]},  // Oct 6 – Jan 5 (month 0 = Jan next year)
  {id:'Q4', from:[0,6],  to:[3,5]},  // Jan 6 – Apr 5
];
function quarterRange(qIdx, yr){
  const y = parseInt(yr.slice(0,4));
  const q = QUARTERS[qIdx];
  const fromY = q.from[0]<3 ? y+1 : y;
  const toY   = q.to[0]<3   ? y+1 : y;
  const pad = n => String(n).padStart(2,'0');
  return {
    from: fromY+'-'+pad(q.from[0]+1)+'-'+pad(q.from[1]),
    to:   toY  +'-'+pad(q.to[0]+1)  +'-'+pad(q.to[1]),
    label: t('qt.'+q.id.toLowerCase()),
    id: q.id
  };
}
function currentQuarterIdx(yr){
  const today = new Date().toISOString().slice(0,10);
  for(let i=0;i<4;i++){
    const r = quarterRange(i,yr);
    if(today>=r.from && today<=r.to) return i;
  }
  return -1;
}

  const yr = S.year;

  const rows = [0,1,2,3].map(i=>{

    const inc = entries.filter(e=>e.kind==='income').reduce((s,e)=>s+Math.max(0,e.amount),0);
    const exp = entries.filter(e=>e.kind==='expense').reduce((s,e)=>s+Math.max(0,effExact(e)),0);

          +'<span style="font-size:12px;color:var(--muted)">'+t('qt.expenses')+' <b class="num" style="color:var(--ink)">'+fmt(exp)+'</b></span></div>'

  }).join('');
  return '<div class="card"><div class="t" style="margin-bottom:2px">📊 '+t('qt.title')+'</div>'
    +'<div class="s" style="margin-bottom:10px">'+yr+'</div>'+rows+'</div>';
}

// Deadline banner (shown on Home + Tax pages if within 7 days)
function deadlineBanner(){
  const today = new Date();
  const yr = S.year;
  const y = parseInt(yr.slice(0,4))+1; // filing year = tax year end +1
  const deadlines = [
    {date: new Date(y,0,31), keyToday:'nb.today_jan', key:'nb.jan'},
    {date: new Date(y,6,31), keyToday:'nb.today_jul', key:'nb.jul'},
  ];
  for(const d of deadlines){
    const diff = Math.round((d.date-today)/(1000*60*60*24));
    if(diff<0 || diff>7) continue;
    if(diff===0) return '<div class="notice" style="background:#FDEDEE;color:var(--coral);font-weight:700;margin-bottom:14px">⏰ '+t(d.keyToday)+'</div>';
    const s = diff===1?t('nb.day'):t('nb.days');
    return '<div class="notice amber" style="margin-bottom:14px;font-weight:700">⏰ '+t(d.key,{n:diff,s:''})+'</div>';
  }
  return '';
}

// .ics calendar export
function exportCalendar(){
  const yr = S.year;
  const y = parseInt(yr.slice(0,4))+1;
  const tx = calcTax(yr);
  const NL = '\r\n';
  function icsDate(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0'); return ''+y+m+dy; }
  const alarm = desc => ['BEGIN:VALARM','TRIGGER:-P7D','ACTION:DISPLAY','DESCRIPTION:'+desc+' in 7 days','END:VALARM'].join(NL);
  const event = (uid,date,summary,desc) => {
    const d = new Date(date); const d2 = new Date(d); d2.setDate(d2.getDate()+1);
    return ['BEGIN:VEVENT','UID:'+uid+'-taxmate@uk','DTSTART;VALUE=DATE:'+icsDate(d),'DTEND;VALUE=DATE:'+icsDate(d2),'SUMMARY:'+summary,'DESCRIPTION:'+desc,alarm(summary),'END:VEVENT'].join(NL);
  }
  const events = [
    event('jan-'+yr, new Date(y,0,31), 'Self Assessment deadline '+yr,
      'File return + pay balancing payment. TaxMate estimate: '+fmt(tx.balancing)),
    tx.poaRequired ? event('jul-'+yr, new Date(y,6,31), 'Payment on account due '+yr,
      '2nd payment on account. TaxMate estimate: '+fmt(tx.poaEach)) : null,
    event('yearend-'+yr, new Date(parseInt(yr.slice(0,4))+1,3,5), 'Tax year end '+yr,
      'UK tax year ends. Complete your records for '+yr+'.'),
  ].filter(Boolean);
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//TaxMate UK//EN','CALSCALE:GREGORIAN'].concat(events).concat(['END:VCALENDAR']);
  const ics = lines.join(NL);
  const blob = new Blob([ics],{type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'taxmate-'+yr+'.ics';
  a.click(); URL.revokeObjectURL(a.href); toast(t('toast.calAdded'));
}

/* ═══════════ PDF Report Engine ═══════════ */
function generatePDF(){
  if(typeof window.jspdf === 'undefined' && typeof jspdf === 'undefined'){
    alert('PDF library loading — try again in a moment.'); return;
  }
  const { jsPDF } = window.jspdf || jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const yr = S.year;
  const tx = calcTax(yr);
  const cfg = tx.cfg;
  const W = 210, M = 14, CW = W - M*2;

  // ── colour palette ──
  const GREEN  = [10, 169, 104];
  const INK    = [22,  32,  43];
  const MUTED  = [107,118,134];
  const LINE   = [236,239,243];
  const WHITE  = [255,255,255];
  const AMBER  = [252,243,223];
  const AMBERT = [107, 80, 20];

  function pdfFmt(n){ return (n<0?'-':'')+'£'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function setFont(size, weight, colour){
    doc.setFontSize(size);
    doc.setFont('helvetica', weight==='bold'?'bold':'normal');
    doc.setTextColor(...(colour||INK));
  }
  function hline(y, colour){ doc.setDrawColor(...(colour||LINE)); doc.setLineWidth(.3); doc.line(M,y,W-M,y); }
  function fillRect(x,y,w,h,colour){ doc.setFillColor(...colour); doc.rect(x,y,w,h,'F'); }

  let y = 0;

  // ══ COVER PAGE ══
  const user = cloudUser();
  const userName = user ? (user.displayName || user.email || '') : '';
  const bizNames = S.businesses.map(b=>b.name).join(', ');
  const periodFrom = '6 Apr ' + yr.slice(0,4);
  const periodTo   = '5 Apr ' + yr.slice(5,7).replace(/^0/,'20');

  // full green background
  fillRect(0, 0, W, 297, [10,140,90]);
  // white card area
  fillRect(M, 60, CW, 140, WHITE);

  // logo text
  setFont(26,'bold',WHITE); doc.text('TaxMate', M+8, 46);
  setFont(12,'normal',[200,240,220]); doc.text('UK', M+72, 46);

  // card content
  setFont(9,'normal',[107,118,134]); doc.text(t('pdf.title').toUpperCase(), M+10, 78);
  setFont(20,'bold',INK); doc.text(yr, M+10, 92);
  if(userName){ setFont(11,'normal',INK); doc.text(userName, M+10, 104); }
  setFont(10,'normal',MUTED); doc.text(bizNames, M+10, userName?114:104);
  setFont(9,'normal',MUTED);
  doc.text(periodFrom + '  –  ' + periodTo, M+10, userName?126:116);
  doc.text(t('pdf.generated') + ': ' + new Date().toLocaleDateString(locale()), M+10, userName?134:124);

  // disclaimer at bottom of cover
  setFont(7,'normal',[200,240,220]);
  doc.text(t('pdf.disclaimer'), M+8, 268, {maxWidth:CW-16});

  // new page for content
  doc.addPage();
  y = 14;

  // ── HEADER BAND (content pages) ──
  fillRect(0, 0, W, 18, GREEN);
  setFont(9,'bold',WHITE); doc.text('TaxMate UK  ·  '+yr, M, 12);
  setFont(8,'normal',[200,240,220]);
  doc.text(bizNames, W-M, 12, {align:'right'});
  y = 26;



  // ── SUMMARY CARDS (2×2 grid) ──
  const cards = [
    {label:t('pdf.income'),  val:pdfFmt(tx.soleIncome),             bg:[230,247,240], fg:GREEN},
    {label:t('pdf.expenses'),val:pdfFmt(tx.soleExpenses),           bg:[253,237,238], fg:[200,50,55]},
    {label:t('pdf.profit'),  val:pdfFmt(tx.myProfit),               bg:[234,241,254], fg:[30,90,200]},
    {label:t('pdf.estTax'),  val:pdfFmt(Math.max(tx.liability,0)),  bg:AMBER,         fg:AMBERT},
  ];
  const cw = (CW-4)/2, ch = 16;
  cards.forEach((c,i)=>{
    const cx = M + (i%2)*(cw+4), cy = y + Math.floor(i/2)*(ch+3);
    fillRect(cx, cy, cw, ch, c.bg);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED);
    doc.text(c.label, cx+4, cy+5);
    doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(...c.fg);
    doc.text(c.val, cx+4, cy+12);
  });
  y += 2*ch + 3*3 + 8;
  hline(y, LINE); y += 8;

  // ── INCOME TABLE ──
  const incEntries = entriesFor(yr, null, 'income').sort((a,b)=>a.date.localeCompare(b.date));
  setFont(11, 'bold', INK); doc.text(t('pdf.incomeDetail'), M, y); y += 5;
  if(incEntries.length){
    doc.autoTable({
      startY: y,
      margin:{left:M, right:M},
      headStyles:{fillColor:GREEN, textColor:WHITE, fontSize:8, fontStyle:'bold'},
      bodyStyles:{fontSize:8, textColor:INK},
      alternateRowStyles:{fillColor:[248,250,252]},
      columnStyles:{3:{halign:'right'}},
      head:[[t('pdf.date'), t('pdf.category'), t('pdf.description'), t('pdf.amount')]],
      body: incEntries.map(e=>[
        e.date,
        catName(e.cat),
        e.desc||'—',
        pdfFmt(e.amount)
      ]),
    });
    y = doc.lastAutoTable.finalY + 8;
  } else {
    setFont(8,'normal',MUTED); doc.text(t('pdf.noEntries'), M, y); y += 8;
  }

  // ── EXPENSE TABLE ──
  const expEntries = entriesFor(yr, null, 'expense').sort((a,b)=>a.date.localeCompare(b.date));
  if(y > 240){ doc.addPage(); y = 14; }
  setFont(11,'bold',INK); doc.text(t('pdf.expenseDetail'), M, y); y += 5;
  if(expEntries.length){
    doc.autoTable({
      startY: y,
      margin:{left:M, right:M},
      headStyles:{fillColor:[22,32,43], textColor:WHITE, fontSize:8, fontStyle:'bold'},
      bodyStyles:{fontSize:8, textColor:INK},
      alternateRowStyles:{fillColor:[248,250,252]},
      columnStyles:{3:{halign:'right'},4:{halign:'center'},5:{halign:'right'}},
      head:[[t('pdf.date'), t('pdf.category'), t('pdf.description'), t('pdf.amount'), t('pdf.bizPct'), t('pdf.claimable')]],
      body: expEntries.map(e=>[
        e.date,
        catName(e.cat),
        e.desc||'—',
        pdfFmt(e.amount),
        (e.pct==null?100:e.pct)+'%',
        pdfFmt(effExact(e))
      ]),
    });
    y = doc.lastAutoTable.finalY + 8;
  } else {
    setFont(8,'normal',MUTED); doc.text(t('pdf.noEntries'), M, y); y += 8;
  }

  // ── TAX CALCULATION ──
  if(y > 220){ doc.addPage(); y = 14; }
  setFont(11,'bold',INK); doc.text(t('pdf.taxCalc'), M, y); y += 5;
  const taxRows = [
    [t('pdf.income'),   pdfFmt(tx.soleIncome)],
    [t('pdf.expenses'), '-'+pdfFmt(tx.soleExpenses).replace('-','')],
    [t('pdf.profit'),   pdfFmt(tx.myProfit)],
    [t('pdf.pa'),       '-'+pdfFmt(tx.pa).replace('-','')],
    [t('pdf.taxable'),  pdfFmt(tx.taxable)],
    [t('pdf.incomeTax'),pdfFmt(tx.incomeTax)],
    [t('pdf.class4'),   pdfFmt(tx.class4)],
    [t('pdf.total'),    pdfFmt(tx.liability)],
  ];
  doc.autoTable({
    startY: y,
    margin:{left:M, right:M},
    headStyles:{fillColor:[22,32,43], textColor:WHITE, fontSize:8, fontStyle:'bold'},
    bodyStyles:{fontSize:8, textColor:INK},
    alternateRowStyles:{fillColor:[248,250,252]},
    columnStyles:{1:{halign:'right', fontStyle:'bold'}},
    head:[[t('pdf.taxCalc'), yr]],
    body: taxRows,
    didParseCell(data){
      if(data.row.index===taxRows.length-1 && data.section==='body'){
        data.cell.styles.fillColor = [230,247,240];
        data.cell.styles.fontStyle = 'bold';
        data.cell.styles.textColor = [6,122,75];
      }
    }
  });
  y = doc.lastAutoTable.finalY + 8;

  // ── FOOTER DISCLAIMER ──
  if(y > 270){ doc.addPage(); y = 14; }
  hline(y, LINE); y += 5;
  setFont(7,'normal',MUTED);
  doc.text(t('pdf.disclaimer'), M, y, {maxWidth:CW});

  // ── SAVE ──
  const fname = 'taxmate-'+yr+'-'+new Date().toISOString().slice(0,10)+'.pdf';
  doc.save(fname);
}

/* ═══════════ Receipt photo engine ═══════════ */
function storageBucket(){
  try{ return fbConfigured() && FB.ready ? firebase.storage() : null; }catch(e){ return null; }
}
function receiptPath(entryId){ return `receipts/${firebase.auth().currentUser.uid}/${entryId}.jpg`; }

async function onReceiptFile(ev){
  const file = ev.target.files[0]; if(!file) return;
  ev.target.value='';
  if(!S.settings.pro){ alert(t('rc.proOnly')); return; }
  const st = document.getElementById('en-receipt-status');
  st.textContent = t('rc.uploading');
  try{
    // 壓縮到 ~200KB
    const compressed = await compressImage(file, 1200, 0.82);
    const db = await ensureFB(); if(!db){ st.textContent = t('rc.uploadErr'); return; }
    const u = firebase.auth().currentUser; if(!u){ st.textContent = t('rc.uploadErr'); return; }
    const entId = EN.id || uid();
    if(!EN.id) EN.id = entId;
    const path = `receipts/${u.uid}/${entId}.jpg`;
    const stor = firebase.storage();
    const ref = stor.ref(path);
    await ref.put(compressed, {contentType:'image/jpeg'});
    const url = await ref.getDownloadURL();
    EN.receiptUrl = url;
    EN.receiptPath = path;
    st.textContent = '';
    paintEntry();
  }catch(e){ console.warn(e); st.textContent = t('rc.uploadErr'); }
}

function compressImage(file, maxW, quality){
  return new Promise((res,rej)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxW/Math.max(img.width,img.height));
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>b?res(b):rej(new Error('compress fail')),'image/jpeg',quality);
    };
    img.onerror = rej;
    img.src = url;
  });
}

async function deleteReceiptFromStorage(path){
  if(!path || !FB.ready) return;
  try{ await firebase.storage().ref(path).delete(); }catch(e){}
}

// deleteEntry: 連相片一齊刪
const _origDeleteEntry = deleteEntry;
deleteEntry = function(){
  confirmAction(t('d.entryT'), t('d.entryM'), ()=>{
    const e = S.entries.find(x=>x.id===EN.id);
    S.entries = S.entries.filter(x=>x.id!==EN.id);
    if(e){ deleteEntryRemote(e.bizId, e.id); if(e.receiptPath) deleteReceiptFromStorage(e.receiptPath); }
    save(); closeSheet('entry'); render(); toast(t('toast.deleted'));
  });
};

// Lightbox
let LB = {url:'', path:''};
function openLightbox(url, path){
  LB = {url, path};
  let lb = document.getElementById('taxmate-lightbox');
  if(!lb){
    lb = document.createElement('div');
    lb.id = 'taxmate-lightbox';
    lb.className = 'lightbox';
    lb.innerHTML = `<img id="lb-img" src=""><div class="lightbox-bar">
      <button onclick="closeLightbox()">✕ Close</button>
      <button class="danger" onclick="confirmDeleteReceipt()">${'🗑 '+t('rc.delete')}</button>
    </div>`;
    lb.addEventListener('click',e=>{ if(e.target===lb) closeLightbox(); });
    document.body.appendChild(lb);
  }
  document.getElementById('lb-img').src = url;
  lb.style.display = 'flex';
}
function closeLightbox(){ const lb=document.getElementById('taxmate-lightbox'); if(lb) lb.style.display='none'; }
function confirmDeleteReceipt(){
  closeLightbox();
  confirmAction(t('rc.deleteConfirm'), '', async()=>{
    if(LB.path) await deleteReceiptFromStorage(LB.path);
    // 更新 entry
    const e = S.entries.find(x=>x.receiptPath===LB.path||x.receiptUrl===LB.url);
    if(e){ e.receiptUrl=null; e.receiptPath=null; pushEntryRemote(e); }
    if(EN.receiptPath===LB.path){ EN.receiptUrl=null; EN.receiptPath=null; paintEntry(); }
    save(); render();
  });
}

/* ═══════════ Back button handling ═══════════ */
function anySheetOpen(){
  return Array.from(document.querySelectorAll('.sb')).some(o=>o.classList.contains('open'));
}
function closeAllSheets(){
  document.querySelectorAll('.sb.open').forEach(o=>o.classList.remove('open'));
  document.body.classList.remove('sheet-open');
}
function setupBackButton(){
  // Seed two states: one base + one buffer the back button consumes first.
  history.pushState({tm:'base'}, '');
  history.pushState({tm:'buffer'}, '');
  window.addEventListener('popstate', (e)=>{
    // A sheet is open → close it, keep user in app
    if(anySheetOpen()){
      closeAllSheets();
      history.pushState({tm:'buffer'}, '');
      return;
    }
    // Not on Home → navigate Home, keep user in app
    if(S.tab !== 'home'){
      S.tab = 'home'; save(); render(); window.scrollTo(0,0);
      history.pushState({tm:'buffer'}, '');
      return;
    }
    // On Home, nothing open → let this back press fall through (exit/leave).
    // Do not re-push, so the browser/OS handles it naturally.
  });
}
