<style>
/* ════════════════════════════════════════════════════
   TAXMATE UK v2 — warm, modern, close to people
   ════════════════════════════════════════════════════ */
html{ touch-action:pan-x pan-y; }
:root{
  --bg:#F5F7F9;
  --card:#FFFFFF;
  --ink:#16202B;
  --muted:#6B7686;
  --line:#ECEFF3;
  --brand:#0AA968;          /* fresh green */
  --brand-deep:#067A4B;
  --brand-soft:#E6F7EF;
  --teal:#0D8C86;
  --coral:#E5484D;          /* expenses */
  --coral-soft:#FDEDEE;
  --blue:#3478F6;
  --blue-soft:#EAF1FE;
  --amber:#B47D12;
  --amber-soft:#FCF3DF;
  --btn-dark:#16202B;
  --r-lg:24px; --r-md:18px; --r-sm:12px;
  --shadow:0 1px 2px rgba(22,32,43,.05),0 10px 30px rgba(22,32,43,.07);
  --shadow-sm:0 1px 2px rgba(22,32,43,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* iOS：手指掂到/拖過 UI 唔好自動反白文字（除咗真正輸入嘅地方）*/
button,.card,.hero,.pill,.entry,.row,.chip,.ob-tile,.cxr-card,.cxr-inner,nav,summary,label,.link,.btn{
  -webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text}
html{-webkit-text-size-adjust:100%}
body{font-family:'Plus Jakarta Sans','Noto Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:16px;line-height:1.5;min-height:100vh}
[dir=rtl] body{font-family:'Noto Sans Arabic','Plus Jakarta Sans',system-ui,sans-serif}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
.num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em;direction:ltr;unicode-bidi:isolate}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid rgba(10,169,104,.45);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── header ── */
.top{padding:18px 20px 4px;display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto}
.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--teal));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:19px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(10,169,104,.3)}
.top .name{font-weight:800;font-size:19px;letter-spacing:-.4px}
.beta-badge{font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--brand-deep);background:var(--brand-soft);border:1px solid var(--brand);padding:2px 5px;border-radius:6px;margin-left:6px;vertical-align:super;text-transform:uppercase}
.top .name span{color:var(--brand)}
.year-pill{margin-inline-start:auto;position:relative}
.year-pill select{appearance:none;-webkit-appearance:none;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 30px 8px 14px;box-shadow:var(--shadow-sm)}
[dir=rtl] .year-pill select{padding:8px 14px 8px 30px}
.year-pill::after{content:'▾';position:absolute;inset-inline-end:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);pointer-events:none}

main{padding:14px 20px 110px;max-width:640px;margin:0 auto}
.h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:8px 0 14px;color:var(--ink)}
.h2{font-size:17px;font-weight:800;letter-spacing:-.3px;margin:22px 0 10px;color:var(--ink)}
.sub{font-size:14px;color:var(--muted)}

/* ── hero (home) ── */
.hero{border-radius:var(--r-lg);padding:22px;color:#fff;margin-bottom:14px;
  background:linear-gradient(135deg,#0BAA6B 0%,#0A9573 55%,#0D8C86 100%);
  box-shadow:0 14px 34px rgba(10,150,110,.35);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.09);top:-110px;inset-inline-end:-60px}
.hero .hi{font-size:14px;font-weight:600;opacity:.9}
.hero .label{font-size:13px;font-weight:600;opacity:.85;margin-top:12px}
.hero .big{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin:2px 0 14px}
.hero .hero-owe{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.14);border-radius:12px;padding:10px 14px;margin-bottom:14px;cursor:pointer}
.hero .hero-owe .ho-label{font-size:13px;font-weight:700;opacity:.95}
.hero .hero-owe .ho-val{font-size:15px;font-weight:800}
.hero .pills{display:flex;gap:10px;position:relative}
.hero .pill{flex:1;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);border-radius:16px;padding:10px 14px;cursor:pointer;border:0;text-align:start;color:#fff}
.hero .pill .pl{font-size:12px;font-weight:600;opacity:.85}
.hero .pill .pv{font-size:17px;font-weight:800;margin-top:1px}

/* ── cards ── */
.card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.card.flat{box-shadow:var(--shadow-sm)}
.row{display:flex;align-items:center;gap:13px}
.row+.row{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.ico{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.grow{flex:1;min-width:0}
.t{font-size:15px;font-weight:700;color:var(--ink)}
.s{font-size:12.5px;color:var(--muted);margin-top:1px}
.v{font-weight:800;font-size:15px;white-space:nowrap;color:var(--ink)}
.chev{color:#C2C9D2;font-size:18px;font-weight:700}
.pos{color:var(--brand-deep)} .neg{color:var(--coral)} .mut{color:var(--muted)}

/* figure rows */
.frow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px}
.frow:last-child{border-bottom:none;padding-bottom:0}
.frow:first-child{padding-top:0}
.frow .fl{color:var(--ink)}
.frow .fl small{display:block;font-size:12px;color:var(--muted);font-weight:500}
.frow .fv{font-weight:800;white-space:nowrap;color:var(--ink)}
.frow.total .fl,.frow.total .fv{font-weight:800;font-size:16px}
.frow.total{border-top:2px solid var(--ink);border-bottom:0;margin-top:4px;padding-top:12px}

/* ── buttons ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 20px;border:0;cursor:pointer;
  border-radius:999px;font-size:16px;font-weight:800;color:#fff;background:var(--brand);
  box-shadow:0 6px 16px rgba(10,169,104,.32);transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn.ink{background:var(--btn-dark);color:#fff;box-shadow:0 6px 16px rgba(22,32,43,.25)}
.btn.soft{background:var(--brand-soft);color:var(--brand-deep);box-shadow:none}
.btn.danger-soft{background:var(--coral-soft);color:var(--coral);box-shadow:none}
:root[data-theme="dark"] .btn.danger-soft{background:rgba(229,72,77,.16);color:#FF8A8E}
.btn.ghost{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.btn.coral{background:var(--coral);box-shadow:0 6px 16px rgba(229,72,77,.3)}
.link{background:none;border:0;color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;padding:4px}
.link.danger{color:var(--coral)}

.tagchip{display:inline-block;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px}
.tagchip.blue{background:var(--blue-soft);color:var(--blue)}
.tagchip.grey{background:#F0F2F5;color:var(--muted)}
.tagchip.green{background:var(--brand-soft);color:var(--brand-deep)}

.notice{border-radius:var(--r-md);padding:13px 15px;font-size:14px;line-height:1.5;margin-bottom:14px}
.notice.green{background:var(--brand-soft);color:#065438}
.notice.amber{background:var(--amber-soft);color:#6b4a06}

/* ── home promo carousel (manual scroll-snap, no autoplay) ── */
.cxr-wrap{margin-bottom:14px}
.cxr-track{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.cxr-track::-webkit-scrollbar{display:none}
.cxr-card{position:relative;flex:0 0 100%;scroll-snap-align:center;border-radius:16px;padding:14px 16px;min-height:74px;box-sizing:border-box}
.cxr-inner{display:flex;align-items:center;gap:12px;cursor:pointer;padding-right:20px}
.cxr-emoji{font-size:26px;flex-shrink:0;line-height:1}
.cxr-txt{flex:1;min-width:0}
.cxr-title{font-size:15px;font-weight:800;line-height:1.25}
.cxr-body{font-size:12.5px;opacity:.92;line-height:1.35;margin-top:2px}
.cxr-cta{font-size:13px;font-weight:800;margin-top:7px}
.cxr-x{position:absolute;top:8px;inset-inline-end:8px;background:rgba(0,0,0,.14);border:none;width:24px;height:24px;border-radius:50%;font-size:14px;font-weight:800;cursor:pointer;line-height:1;padding:0;z-index:2}
.cxr-dots{display:flex;justify-content:center;gap:6px;margin-top:8px}
.cxr-dot{width:6px;height:6px;border-radius:50%;background:var(--line);transition:background .2s,width .2s}
.cxr-dot.on{background:var(--muted);width:18px;border-radius:3px}

/* ── chips ── */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:14px;font-weight:700;padding:8px 16px;cursor:pointer;border-radius:999px;
  background:var(--card);border:1px solid var(--line);color:var(--muted);box-shadow:var(--shadow-sm)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── entries ── */
.month{font-size:13px;font-weight:800;color:var(--muted);padding:16px 4px 8px;display:flex;justify-content:space-between;text-transform:capitalize}
.elist{background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;border:0;background:none;width:100%;text-align:start}
.entry+.entry{border-top:1px solid var(--line)}
.entry:active{background:#FAFBFC}
.edot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.emojibtn{aspect-ratio:1;border-radius:12px;border:2px solid var(--line);background:var(--bg);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;padding:0}
.emojibtn.on{border-color:var(--brand);background:var(--brand-soft)}
.planbadge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.5px;padding:3px 9px;border-radius:6px;vertical-align:middle}
.planbadge.pro{background:linear-gradient(135deg,#FFB347,#FF9500);color:#3D2800}
.planbadge.max{background:linear-gradient(135deg,#A78BFA,#7C5CE6);color:#fff}
.feat-lock-badge{font-size:9px;font-weight:800;letter-spacing:.4px;padding:2px 6px;border-radius:5px;margin-inline-start:6px;vertical-align:middle}
.feat-lock-badge.pro{background:linear-gradient(135deg,#FFB347,#FF9500);color:#3D2800}
.feat-lock-badge.max{background:linear-gradient(135deg,#A78BFA,#7C5CE6);color:#fff}
.entry .grow .t{font-size:14.5px}
.empty{padding:40px 22px;text-align:center;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.empty .big-emoji{font-size:40px;margin-bottom:10px}
.empty .t{font-size:16px;margin-bottom:4px}

/* ── forms ── */
.fg{margin-bottom:16px}
.fg>label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
.fg .fhint{font-size:12.5px;color:var(--muted);margin:-2px 0 8px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font-family:inherit;font-size:16px;padding:13px 15px;border:1.5px solid var(--line);
  border-radius:var(--r-sm);background:#FAFBFC;color:var(--ink);-webkit-appearance:none;appearance:none}
/* 剷走 number input 個原生上下 spinner(桌面版先見到,撳落個掣就有加減箭嘴)——全部數字欄都唔需要 */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input:focus,select:focus{border-color:var(--brand);background:#fff}
input.err{border-color:var(--coral);background:var(--coral-soft)}
.ferr{font-size:13px;font-weight:700;color:var(--coral);margin-top:5px;display:none}
.ferr.show{display:block}
.amt{position:relative}
.amt .cur{position:absolute;inset-inline-start:15px;top:50%;transform:translateY(-50%);font-size:21px;font-weight:800;color:var(--muted)}
.amt input{padding-inline-start:38px;font-size:24px;font-weight:800}
.seg{display:flex;background:#EEF1F4;border-radius:999px;padding:4px}
.seg button{flex:1;border:0;background:none;border-radius:999px;padding:9px 6px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
.rmgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
.rmgrid button{border:1.5px solid var(--line);background:var(--bg);border-radius:10px;padding:9px 4px;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .12s}
.rmgrid button.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-deep)}
.pctrow{display:flex;gap:8px;flex-wrap:wrap}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.catbtn{font-size:13.5px;font-weight:600;padding:11px 12px;border:1.5px solid var(--line);background:#fff;border-radius:var(--r-sm);
  cursor:pointer;display:flex;align-items:center;gap:8px;text-align:start;color:var(--ink)}
.catbtn.on{border-color:var(--brand);background:var(--brand-soft);font-weight:800}
.cdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}

/* ── sheets ── */
.sb{display:none;position:fixed;inset:0;background:rgba(16,24,32,.45);z-index:200;align-items:flex-end;justify-content:center}
/* 美化 scrollbar */
.sheet::-webkit-scrollbar{width:4px}
.sheet::-webkit-scrollbar-track{background:transparent}
.sheet::-webkit-scrollbar-thumb{background:var(--border,#2d4a3a);border-radius:4px}
.sheet{scrollbar-width:thin;scrollbar-color:var(--border,#2d4a3a) transparent}
body.sheet-open{overflow:hidden}
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--ink);color:#fff;font-size:14px;font-weight:700;padding:11px 22px;border-radius:999px;
  z-index:400;box-shadow:0 8px 24px rgba(16,24,32,.25);transition:transform .3s cubic-bezier(.2,.9,.3,1.2);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.sb.open{display:flex}
.sheet{background:var(--bg);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
  border-radius:28px 28px 0 0;padding:10px 20px calc(26px + env(safe-area-inset-bottom))}
.sheet .grab{width:44px;height:5px;background:#D6DBE2;border-radius:3px;margin:6px auto 16px;cursor:grab;position:relative}
.grab::after{content:"";position:absolute;top:-12px;bottom:-12px;left:-40px;right:-40px}
.sheet .stitle{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-bottom:18px;color:var(--ink)}
.sheet .sact{display:flex;gap:10px;margin-top:20px}
.sheet .sact .btn{flex:1}

/* ── collapsible settings section ── */
details.sec{margin:10px 0;border-radius:var(--r,16px);overflow:hidden;background:var(--card);border:1px solid var(--line)}
details.sec>summary{list-style:none;cursor:pointer;padding:16px 18px;font-size:15px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:10px;user-select:none}
details.sec>summary::-webkit-details-marker{display:none}
details.sec>summary::after{content:"▾";margin-inline-start:auto;font-size:13px;color:var(--muted);transition:transform .2s}
details.sec[open]>summary::after{transform:rotate(180deg)}
details.sec>summary .sec-emoji{font-size:18px}
details.sec .sec-body{padding:0 14px 14px}
details.sec .sec-body .card{margin-top:10px}

/* ── tab bar ── */
nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;max-width:640px;margin:0 auto;padding:6px 6px calc(6px + env(safe-area-inset-bottom));
  border-radius:22px 22px 0 0}
nav button{flex:1;background:none;border:0;cursor:pointer;padding:7px 2px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:#97A1AE;font-size:10.5px;font-weight:700}
nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--brand-deep);background:var(--brand-soft)}
.small{font-size:12px;color:var(--muted);line-height:1.55;margin:16px 4px}
details.help{background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow-sm);margin-bottom:14px}
details.help summary{padding:14px 16px;font-size:14px;font-weight:700;color:var(--blue);cursor:pointer;list-style:none}
details.help .hb{padding:0 16px 14px;font-size:14px;color:var(--ink);line-height:1.6}
.avatar{width:44px;height:44px;border-radius:50%;color:#fff;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.receipt-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1.5px solid var(--line)}
.receipt-add{width:56px;height:56px;border-radius:10px;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;background:#FAFBFC;color:var(--muted)}
.receipt-add:active{background:var(--brand-soft)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lightbox img{max-width:96vw;max-height:80vh;border-radius:16px;object-fit:contain}
.lightbox-bar{display:flex;gap:16px}
.lightbox-bar button{background:rgba(255,255,255,.15);border:0;color:#fff;font-size:14px;font-weight:700;padding:10px 22px;border-radius:999px;cursor:pointer}
.lightbox-bar button.danger{background:rgba(229,72,77,.35)}
.fab{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;
  border-radius:50%;background:var(--brand);color:#fff;font-size:30px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px rgba(10,169,104,.4);border:0;cursor:pointer;z-index:99;
  transition:transform .12s}
.fab:active{transform:scale(.88)}

/* ── Dark mode (manual toggle + system) ── */
:root[data-theme="dark"]{
  --bg:#0F1620; --card:#1A2533; --ink:#EDF2F7; --muted:#8493A5; --line:#293647;
  --brand:#15D982; --brand-deep:#3DE89B; --brand-soft:rgba(21,217,130,.16);
  --teal:#16CFC5; --coral:#FF6B73; --coral-soft:rgba(255,107,115,.16);
  --blue:#6BA8FF; --blue-soft:rgba(107,168,255,.16);
  --amber:#F5B43C; --amber-soft:rgba(245,180,60,.16);
  --shadow:0 2px 6px rgba(0,0,0,.5),0 12px 32px rgba(0,0,0,.45);
  --shadow-sm:0 1px 3px rgba(0,0,0,.45);
}
:root[data-theme="dark"] .notice.amber{ color:#F5C45E; }
:root[data-theme="dark"] .notice.green{ color:#5FE0A0; }
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .notice.amber{ color:#F5C45E; }
  :root:not([data-theme="light"]) .notice.green{ color:#5FE0A0; }
}
:root[data-theme="dark"] input[type=text],
:root[data-theme="dark"] input[type=number],
:root[data-theme="dark"] input[type=date],
:root[data-theme="dark"] select,
:root[data-theme="dark"] textarea{background:#0A0F16;color:var(--ink);border-color:var(--line)}
:root[data-theme="dark"] input:focus,
:root[data-theme="dark"] select:focus{background:#0A0F16;border-color:var(--brand)}
:root[data-theme="dark"] .seg{background:#0A0F16}
:root[data-theme="dark"] .seg button.on{background:#293647;color:var(--ink)}
:root[data-theme="dark"] .tagchip.grey{background:#293647;color:var(--muted)}
:root[data-theme="dark"] .entry:active{background:#222F3E}
:root[data-theme="dark"] .catbtn{background:#1A2533;color:var(--ink)}
:root[data-theme="dark"] .chip{background:#1A2533;color:var(--muted)}
:root[data-theme="dark"] .chip.on{background:var(--ink);color:#0F1620}
:root[data-theme="dark"] .sb{background:rgba(0,0,0,.72)}
:root[data-theme="dark"] .sheet{background:#0F1620}
:root[data-theme="dark"] .receipt-add{background:#1A2533}
:root[data-theme="dark"] .year-pill select{background:#1A2533;color:var(--ink)}
:root[data-theme="dark"] nav{background:rgba(15,22,32,.95)}
:root[data-theme="dark"] .hero::before{background:rgba(255,255,255,.06)}
:root[data-theme="dark"] .toast{background:#EDF2F7;color:#0F1620}
:root[data-theme="dark"] .btn.ghost{background:#1A2533;border-color:var(--line);color:var(--ink)}
:root[data-theme="dark"] .btn.soft{background:var(--brand-soft);color:var(--brand-deep)}
:root[data-theme="dark"]{--btn-dark:#2A3849}
:root[data-theme="dark"] details.help{background:var(--card)}
:root[data-theme="dark"] .sheet .grab{background:#3A4756}
:root[data-theme="dark"] .chev{color:#4A5568}
:root[data-theme="dark"] .grab{background:#3A4756}

/* System dark mode — only when no manual override */
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]):not([data-theme="dark"]){
    --bg:#0F1620; --card:#1A2533; --ink:#EDF2F7; --muted:#8493A5; --line:#293647;
    --brand:#15D982; --brand-deep:#3DE89B; --brand-soft:rgba(21,217,130,.16);
    --teal:#16CFC5; --coral:#FF6B73; --coral-soft:rgba(255,107,115,.16);
    --blue:#6BA8FF; --blue-soft:rgba(107,168,255,.16);
    --amber:#F5B43C; --amber-soft:rgba(245,180,60,.16);
    --shadow:0 2px 6px rgba(0,0,0,.5),0 12px 32px rgba(0,0,0,.45);
    --shadow-sm:0 1px 3px rgba(0,0,0,.45);
  }
  :root:not([data-theme="light"]):not([data-theme="dark"]) input,
  :root:not([data-theme="light"]):not([data-theme="dark"]) select,
  :root:not([data-theme="light"]):not([data-theme="dark"]) textarea{background:#0A0F16;color:#EDF2F7;border-color:#293647}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .seg{background:#0A0F16}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .seg button.on{background:#293647;color:#EDF2F7}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .catbtn{background:#1A2533;color:#EDF2F7}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .chip{background:#1A2533}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .sheet{background:#0F1620}
  :root:not([data-theme="light"]):not([data-theme="dark"]) nav{background:rgba(15,22,32,.95)}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .toast{background:#EDF2F7;color:#0F1620}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .btn.ghost{background:#1A2533;border-color:#293647;color:#EDF2F7}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .year-pill select{background:#1A2533;color:#EDF2F7}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .receipt-add{background:#1A2533}
  :root:not([data-theme="light"]):not([data-theme="dark"]) .grab{background:#3A4756}
}
</style>
</head>
<body>

<div class="top">
  <div class="logo">£</div>
  <div class="name">Tax<span>Mate</span></div>
  <div class="year-pill"><select id="yearSel" onchange="setYear(this.value)"></select></div>
</div>

<main id="page"></main>
<nav id="nav"></nav>

<!-- entry sheet -->
<div class="sb" id="sb-entry"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div class="stitle" id="en-title"></div>
  <div class="fg"><label for="en-date" data-i18n="f.date"></label><input type="date" id="en-date" onchange="checkEntryDate(this.value)"><div class="fhint" id="en-date-hint" style="display:none;color:var(--amber);font-weight:600"></div></div>
  <div class="fg">
    <label for="en-desc"><span data-i18n="f.note"></span> <span style="font-weight:500;color:var(--muted)" data-i18n="f.optional"></span></label>
    <input type="text" id="en-desc" maxlength="80">
  </div>
  <div class="fg">
    <label for="en-amount"><span data-i18n="f.amount"></span><span style="color:var(--coral);font-weight:800"> *</span></label>
    <div class="amt"><span class="cur">£</span>
      <input type="number" id="en-amount" inputmode="decimal" step="0.01" min="0" max="10000000" placeholder="0.00"></div>
    <div class="ferr" id="en-amount-err" data-i18n="f.amountErr"></div>
  </div>
  <div class="fg" id="en-biz-group"><label for="en-biz" data-i18n="f.business"></label><select id="en-biz" onchange="paintEntry()"></select></div>
  <div class="fg"><label data-i18n="f.category"></label><div class="fhint" style="margin:-2px 0 8px" data-i18n="cc.longPress"></div><div class="catgrid" id="en-cats"></div></div>
  <div class="fg" id="en-folder-group" style="display:none">
    <label for="en-folder" data-i18n="fd.title"></label>
    <div style="display:flex;gap:8px">
      <select id="en-folder" style="flex:1" onchange="EN.folderId=this.value||null"></select>
      <button type="button" class="btn soft" style="width:auto;padding:0 18px" onclick="openFolderSheet()">＋</button>
    </div>
  </div>
  <div class="fg" id="en-pct-group">
    <label data-i18n="f.bizUse"></label>
    <div id="en-pct-collapsed">
      <button type="button" class="chip on" style="pointer-events:none">100%</button>
      <button type="button" class="link" style="margin-inline-start:10px;font-weight:700" onclick="expandPct()" data-i18n="f.bizUsePartial"></button>
    </div>
    <div id="en-pct-expanded" style="display:none">
      <div class="fhint" data-i18n="f.bizUseHint"></div>
      <div class="pctrow" id="en-pcts"></div>
    </div>
  </div>
  <div class="fg" id="en-receipt-group">
    <label data-i18n="rc.add"></label>
    <div style="display:flex;gap:10px;align-items:center">
      <div id="en-receipt-thumb-wrap"></div>
      <input type="file" id="en-receipt-file" accept="image/*" capture="environment" style="display:none" onchange="onReceiptFile(event)">
    </div>
    <div class="s" id="en-receipt-status" style="margin-top:6px"></div>
  </div>
  <div class="fg" id="en-repeat-group">
    <label data-i18n="f.repeat"></label>
    <div class="seg">
      <button type="button" id="en-repeat-off" class="on" onclick="setRepeat(false)" data-i18n="f.repeatOff"></button>
      <button type="button" id="en-repeat-on" onclick="setRepeat(true)" data-i18n="f.repeatOn"></button>
    </div>
    <div class="fhint" id="en-repeat-hint" style="display:none;margin-top:8px" data-i18n="f.repeatHint"></div>
    <div id="en-repeat-from" style="display:none;margin-top:10px">
      <label style="font-size:13px" data-i18n="f.repeatPick"></label>
      <div id="en-repeat-months" class="rmgrid"></div>
    </div>
  </div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('entry')" data-i18n="c.cancel"></button>
    <button class="btn" id="en-save" onclick="saveEntry()" data-i18n="c.save"></button>
  </div>
  <div style="margin-top:14px;text-align:center">
    <button class="link danger" id="en-delete" style="display:none" onclick="deleteEntry()" data-i18n="f.deleteEntry"></button>
  </div>
</div></div>

<!-- business sheet -->
<div class="sb" id="sb-biz"><div class="sheet">
  <div class="grab" onclick="if(document.activeElement&&document.activeElement.closest&&document.activeElement.closest('#sb-biz'))return;closeParentSheet(this)"></div>
  <div class="stitle" id="bz-title"></div>
  <div class="fg">
    <label for="bz-name" data-i18n="b.name"></label>
    <input type="text" id="bz-name" maxlength="40">
    <div class="ferr" id="bz-name-err" data-i18n="b.nameErr"></div>
  </div>
  <div class="fg">
    <label data-i18n="b.setup"></label>
    <div class="seg">
      <button type="button" onclick="setStruct('sole')" id="bz-s-sole" data-i18n="b.justMe"></button>
      <button type="button" onclick="setStruct('partnership')" id="bz-s-part" data-i18n="b.partnership"></button>
    </div>
    <div class="fhint" style="margin-top:8px" id="bz-struct-hint"></div>
  </div>
  <div class="fg" id="bz-share-group" style="display:none">
    <label for="bz-share" data-i18n="b.share"></label>
    <input type="number" id="bz-share" inputmode="numeric" min="1" max="100" value="50" onclick="event.stopPropagation()" onfocus="event.stopPropagation()">
  </div>
  <div id="bz-sync" style="margin-bottom:4px"></div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('biz')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveBiz()" data-i18n="c.save"></button>
  </div>
  <div style="margin-top:14px;text-align:center">
    <button class="link danger" id="bz-delete" style="display:none" onclick="deleteBiz()" data-i18n="b.delete"></button>
  </div>
</div></div>

<!-- HMRC position sheet -->

<!-- category action sheet (rename/delete) -->
<div class="sb" id="sb-catact"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div class="stitle" id="cat-action-name"></div>
  <div class="fhint" style="margin:-8px 0 16px" data-i18n="cc.action"></div>
  <!-- inline rename (hidden by default) -->
  <div id="cat-rename-row" style="display:none;margin-bottom:14px">
    <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center">
      <input type="text" id="cat-rename-emoji" style="text-align:center;font-size:28px;padding:10px;border-radius:12px;width:64px;flex-shrink:0;background:var(--card);border:1.5px solid var(--border);color:var(--text)" oninput="onCatRenameEmoji(this.value)">
      <input type="text" id="cat-rename-input" class="finput" style="font-size:16px;padding:12px 14px;border-radius:12px;flex:1;box-sizing:border-box" placeholder="Category name" onkeydown="if(event.key==='Enter')catConfirmRename()">
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn ghost" style="flex:1" onclick="catCancelRename()" data-i18n="c.cancel"></button>
      <button class="btn" style="flex:1" onclick="catConfirmRename()" data-i18n="c.save"></button>
    </div>
  </div>
  <!-- action buttons (hidden when renaming) -->
  <div id="cat-action-btns">
    <button class="btn" style="margin-bottom:10px" onclick="catStartRename()" data-i18n="cc.doRename"></button>
    <button class="btn ghost" style="margin-bottom:10px;color:var(--coral)" onclick="catDoDelete()" data-i18n="cc.doDelete"></button>
    <button class="btn ghost" onclick="closeSheet('catact')" data-i18n="c.cancel"></button>
  </div>
</div></div>

<!-- upgrade lock sheet -->
<div class="sb" id="sb-lock"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div style="text-align:center;padding:8px 0 4px">
    <div style="font-size:40px;margin-bottom:8px">🔒</div>
    <span id="lock-badge" class="planbadge pro">PRO</span>
    <div class="stitle" id="lock-title" style="margin-top:12px;text-align:center"></div>
    <div class="s" id="lock-body" style="margin:8px 16px 20px;text-align:center"></div>
  </div>
  <button class="btn ink" style="margin-bottom:10px" onclick="lockSeeplans()" data-i18n="lock.upgrade"></button>
  <button class="btn ghost" onclick="closeSheet('lock')" data-i18n="c.cancel"></button>
</div></div>

<!-- iOS / manual install instructions sheet -->
<div class="sb" id="sb-iosinstall"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div style="text-align:center;padding:4px 0 2px">
    <div style="font-size:38px;margin-bottom:6px">📲</div>
    <div class="stitle" style="text-align:center" data-i18n="pwa.iosTitle"></div>
    <div class="s" style="margin:6px 16px 16px;text-align:center" data-i18n="pwa.iosBody"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;margin:0 4px 16px">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px">1</div>
      <div class="s" style="margin:0;padding-top:2px"><span data-i18n="pwa.iosStep1"></span> <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1.5px solid var(--ink);border-radius:5px;vertical-align:middle;font-size:13px">⬆️</span></div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px">2</div>
      <div class="s" style="margin:0;padding-top:2px" data-i18n="pwa.iosStep2"></div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px">3</div>
      <div class="s" style="margin:0;padding-top:2px" data-i18n="pwa.iosStep3"></div>
    </div>
  </div>
  <div class="notice amber" style="margin:0 4px 16px;font-size:13px" data-i18n="pwa.iosNote"></div>
  <button class="btn ghost" onclick="closeSheet('iosinstall')" data-i18n="c.cancel"></button>
</div></div>

<!-- Android manual install instructions sheet -->
<div class="sb" id="sb-andinstall"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div style="text-align:center;padding:4px 0 2px">
    <div style="font-size:38px;margin-bottom:6px">📲</div>
    <div class="stitle" style="text-align:center" data-i18n="pwa.andTitle"></div>
    <div class="s" style="margin:6px 16px 16px;text-align:center" data-i18n="pwa.andBody"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;margin:0 4px 16px">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px">1</div>
      <div class="s" style="margin:0;padding-top:2px" data-i18n="pwa.andStep1"></div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px">2</div>
      <div class="s" style="margin:0;padding-top:2px" data-i18n="pwa.andStep2"></div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px">3</div>
      <div class="s" style="margin:0;padding-top:2px" data-i18n="pwa.andStep3"></div>
    </div>
  </div>
  <div class="notice amber" style="margin:0 4px 16px;font-size:13px" data-i18n="pwa.andTip"></div>
  <button class="btn ghost" onclick="closeSheet('andinstall')" data-i18n="c.cancel"></button>
</div></div>

<!-- Legal sheet: privacy policy + terms -->
<div class="sb" id="sb-legal"><div class="sheet" style="max-height:90vh;overflow-y:auto">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div id="legal-content" style="padding:0 4px 20px"></div>
  <button class="btn ghost" onclick="closeSheet('legal')" data-i18n="c.cancel"></button>
</div></div>

<div class="sb" id="sb-adj"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div class="stitle" data-i18n="a.title"></div>
  <div class="sub" style="margin-bottom:18px" data-i18n="a.sub"></div>
  <div class="fg">
    <label for="adj-poa" data-i18n="a.poaLabel"></label>
    <div class="fhint" data-i18n="a.poaHint"></div>
    <div class="amt"><span class="cur">£</span>
      <input type="number" id="adj-poa" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div>
  </div>
  <div class="fg">
    <label for="adj-prior" data-i18n="a.priorLabel"></label>
    <div class="fhint" data-i18n="a.priorHint"></div>
    <div class="amt"><span class="cur">£</span>
      <input type="number" id="adj-prior" inputmode="decimal" step="0.01" placeholder="0.00"></div>
  </div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('adj')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveAdj()" data-i18n="c.save"></button>
  </div>
</div></div>

<!-- custom category sheet -->
<div class="sb" id="sb-cat"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div class="stitle" data-i18n="cc.add"></div>
  <div class="fg"><label for="cc-name" data-i18n="cc.name"></label><input type="text" id="cc-name" maxlength="24">
    <div class="ferr" id="cc-name-err" data-i18n="b.nameErr"></div></div>
  <div class="fg"><label data-i18n="cc.emoji"></label>
    <div class="fhint" style="margin:-2px 0 8px" data-i18n="cc.emojiHint"></div>
    <input type="text" id="cc-emoji-input" style="text-align:center;font-size:32px;padding:14px" oninput="onEmojiInput(this.value)">
    <div class="ferr" id="cc-emoji-err" data-i18n="cc.emojiErr"></div></div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('cat')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveCat()" data-i18n="c.save"></button>
  </div>
</div></div>

<!-- folder sheet -->
<div class="sb" id="sb-folder"><div class="sheet">
  <div class="grab" onclick="closeParentSheet(this)"></div>
  <div class="stitle" data-i18n="fd.add"></div>
  <div class="fg"><label for="fd-name" data-i18n="fd.name"></label><input type="text" id="fd-name" maxlength="30">
    <div class="ferr" id="fd-name-err" data-i18n="b.nameErr"></div></div>
  <div class="sact">
    <button class="btn ghost" onclick="closeSheet('folder')" data-i18n="c.cancel"></button>
    <button class="btn" onclick="saveFolder()" data-i18n="c.save"></button>

}

}
// Strip characters jsPDF's core fonts can't render (CJK/Arabic/etc) → keep Latin
function pdfSafe(str){
  if(str==null) return '';
  return String(str).replace(/[^\x00-\x7F£€]/g, '').trim() || '(non-Latin text)';
}

function bizCustom(bizId, kind){
  if(!S.customCats[bizId]) S.customCats[bizId] = {income:[],expense:[]};
  if(!S.customCats[bizId][kind]) S.customCats[bizId][kind] = [];
  return S.customCats[bizId][kind];
}
function bizActive(bizId, kind){
  if(!S.activeCats[bizId]) S.activeCats[bizId] = {income:[],expense:[]};
  if(!S.activeCats[bizId][kind]) S.activeCats[bizId][kind] = [];
  return S.activeCats[bizId][kind];
}
function allCats(kind, bizId){
  // categories for ONE business only
  const ac = bizId ? bizActive(bizId, kind) : [];
  const cc = bizId ? bizCustom(bizId, kind) : [];
  // Built-in cats shown only if activated for this biz OR has entries (this biz) using them
  const usedIds = new Set(S.entries.filter(e=>e.kind===kind && (!bizId||e.bizId===bizId)).map(e=>e.cat));
  const builtin = CATS[kind].filter(c=> ac.includes(c.id) || usedIds.has(c.id));
  // 'other' is always available as a fallback
  const other = CATS[kind].find(c=>c.id==='other'||c.id==='otherin');
  let result = builtin.concat(cc);
  if(other && !result.find(c=>c.id===other.id)) result.push(other);
  return result;
}
function catById(id){
  // search built-ins + every business's custom cats
  let custom = [];
  Object.keys(S.customCats||{}).forEach(bid=>{
    const bc = S.customCats[bid]||{};
    custom = custom.concat(bc.income||[], bc.expense||[]);
  });
  const all = CATS.expense.concat(CATS.income, custom);
  return all.find(c=>c.id===id) || {id:'other',e:'🧾',dot:'#B1B4B6'};
}

/* ═══════════ Trial Logic ═══════════ */
const TRIAL_LAUNCH_END   = '2027-01-05'; // Fixed end for launch users
const TRIAL_LAUNCH_CUT   = '2026-08-01'; // Sign-up before this → fixed end date
const TRIAL_MONTHS       = 6;
const TRIAL_KEY          = 'tmTrialStart';

function trialStatus(){
  const start = localStorage.getItem(TRIAL_KEY);
  if(!start) return {active:false, daysLeft:0, phase:'none'};
  const today   = new Date();
  const endDate = start < TRIAL_LAUNCH_CUT
    ? new Date(TRIAL_LAUNCH_END)
    : (()=>{ const d=new Date(start); d.setMonth(d.getMonth()+TRIAL_MONTHS); return d; })();
  const daysLeft = Math.ceil((endDate - today)/(1000*60*60*24));
  const active   = daysLeft > 0;
  const phase    = !active ? 'expired' : daysLeft<=30 ? 'warn2' : daysLeft<=90 ? 'warn1' : 'active';
  return {active, daysLeft, endDate, phase, start};
}

function initTrial(){
  if(localStorage.getItem(TRIAL_KEY)) return; // already set
  const start = new Date().toISOString().slice(0,10);
  localStorage.setItem(TRIAL_KEY, start);
  // persist to Firestore so other devices pick it up
  const u = cloudUser();
  if(u && FB.db){
    try{ userRoot(u.uid).collection('app').doc('trial').set({trialStart:start},{merge:true}); }catch(e){}
  }
}

async function loadTrialFromCloud(uid){
  try{
    const doc = await userRoot(uid).collection('app').doc('trial').get();
    if(doc.exists){
      const d = doc.data()||{};
      if(d.trialStart && !localStorage.getItem(TRIAL_KEY)) localStorage.setItem(TRIAL_KEY, d.trialStart);
      if(d.trialActivated && !(S.settings && S.settings.trialActivated)){
        S.settings.trialActivated = true; S.settings.pro = true; save();
      }
    }
    if(!localStorage.getItem(TRIAL_KEY)) initTrial();
  }catch(e){ if(!localStorage.getItem(TRIAL_KEY)) initTrial(); }
}

function currentTier(){
  // Opt-in trial: user must activate the limited-time free Pro themselves
  const trial = trialStatus();
  if(S.settings && S.settings.trialActivated && trial.active) return 'pro';
  // Otherwise → use stored tier (everyone starts Free)
  const ti = (S.settings && S.settings.tier) || 'free';
  // legacy: old pro flag maps to 'pro'
  if((!S.settings.tier || S.settings.tier==='free') && S.settings.pro) return 'pro';
  return ti;
}
function hasFeature(key){
  const need = FEATURE_TIER[key];
  if(!need) return true; // ungated = free
  return TIER_RANK[currentTier()] >= TIER_RANK[need];
}
function tierFeatureList(tier){

  const plus = ['feat.mileageCompare','feat.multiBiz','feat.receiptPhoto','feat.pdfReport','feat.sa103Pdf'];
  const pro  = ['feat.partnerSync','feat.sa104','feat.receiptPack','feat.mtdReady'];
  if(tier==='free') return free;
  if(tier==='plus') return plus;
  return pro;
}

// Shared estimate used by both the main app path and onboarding — same maths, dynamic cfg.
function estimateIncomeAndNIC(profit, cfg){
  const myProfit = Math.max(0, profit);
  let pa = cfg.pa;
  if(myProfit>cfg.paTaperFrom) pa = Math.max(0, cfg.pa - Math.floor((myProfit-cfg.paTaperFrom)/2));
  const taxable = Math.max(0, myProfit-pa);
  const higherLimit = Math.max(cfg.basicBand, cfg.addlFrom-pa);
  const basicAmt = Math.min(taxable,cfg.basicBand);
  const higherAmt = Math.min(Math.max(taxable-cfg.basicBand,0), higherLimit-cfg.basicBand);
  const addlAmt = Math.max(taxable-higherLimit,0);
  const incomeTax = basicAmt*cfg.basic + higherAmt*cfg.higher + addlAmt*cfg.addl;
  const c4 = Math.min(Math.max(myProfit-cfg.c4Low,0), cfg.c4High-cfg.c4Low)*cfg.c4Main
           + Math.max(myProfit-cfg.c4High,0)*cfg.c4Upper;
  return incomeTax + c4;
}

const STORE_KEY = 'taxmateuk_v1';
const DEFAULT_STATE = {
  v:3, tab:'home', year:currentTaxYear(), incFilter:'all', expFilter:'all', incCat:'all', expCat:'all',
  businesses:[], entries:[], yearData:{}, customCats:{}, folders:[], expFolder:'all', catRenames:{}, activeCats:{}, settings:{lang:'en', pro:false, tier:'free', theme:'auto'}
};
let S = load();
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const s = JSON.parse(raw);
    const merged = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), s);
    merged.settings = Object.assign({lang:'en', pro:false}, s.settings||{});
    merged.catRenames = s.catRenames || {};
    merged.customCats = s.customCats || {};
    merged.activeCats = s.activeCats || {};
    if(!Array.isArray(merged.folders)) merged.folders = [];

    // ── Migration v2 → v3: global categories → per-business ──
    // Old shape: customCats/activeCats = {income:[], expense:[]} (global)
    // New shape: customCats/activeCats = { [bizId]: {income:[], expense:[]} }
    const isOldShape = obj => obj && (Array.isArray(obj.income) || Array.isArray(obj.expense));
    if(isOldShape(merged.customCats) || isOldShape(merged.activeCats)){
      const oldCustom = isOldShape(merged.customCats) ? merged.customCats : {income:[],expense:[]};
      const oldActive = isOldShape(merged.activeCats) ? merged.activeCats : {income:[],expense:[]};
      // For existing users with entries but no activeCats, activate all built-ins (legacy behaviour)
      const legacyActive = (!s.activeCats && (s.entries||[]).length>0)
        ? {income:CATS.income.map(c=>c.id), expense:CATS.expense.map(c=>c.id)}
        : oldActive;
      const newCustom = {}, newActive = {};
      (merged.businesses||[]).forEach(b=>{
        // give every existing business a COPY of the old global cats (so nothing disappears)
        newCustom[b.id] = {
          income:  JSON.parse(JSON.stringify(oldCustom.income||[])),
          expense: JSON.parse(JSON.stringify(oldCustom.expense||[]))
        };
        newActive[b.id] = {
          income:  (legacyActive.income||[]).slice(),
          expense: (legacyActive.expense||[]).slice()
        };
      });
      merged.customCats = newCustom;
      merged.activeCats = newActive;
    }
    merged.v = 3; // mark migrated
    return merged;
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

  const start = after ? y : y-1;

    if(!after) y-=1;
    set.add(y+'-'+String((y+1)%100).padStart(2,'0'));
  });
  return Array.from(set).sort();
}

/* ═══════════ tax engine (tested) ═══════════ */
function bizFigures(b,yr){
  const inc = entriesFor(yr,b.id,'income').reduce((s,e)=>s+e.amount,0);
  const exp = entriesFor(yr,b.id,'expense').reduce((s,e)=>s+effExact(e),0);
  return {income:inc, expenses:exp, profit:inc-exp};
}
function calcTax(yr){
  const cfg = cfgFor(yr);
  const d = S.yearData[yr] || {poaPaid:0,priorAdj:0,taMode:'auto'};
  let soleIncome=0, soleExpenses=0, partShareProfit=0;
  const perBiz = S.businesses.map(b=>{
    const f = bizFigures(b,yr);
    if(b.structure==='partnership') partShareProfit += f.profit*(b.share||50)/100;
    else { soleIncome+=Math.max(0,f.income); soleExpenses+=Math.max(0,f.expenses); }
    return Object.assign({biz:b},f);
  });
  const profitActual = soleIncome - soleExpenses;
  const profitAllowance = Math.max(0, soleIncome - Math.min(cfg.tradingAllowance, soleIncome));
  const allowanceAvailable = soleIncome>0;
  const allowanceBetter = allowanceAvailable && (profitAllowance < profitActual);
  let taMode = d.taMode||'auto', taUsed;
  if(taMode==='allowance') taUsed=true;
  else if(taMode==='expenses') taUsed=false;
  else taUsed = allowanceBetter;
  if(!allowanceAvailable) taUsed=false;
  const soleProfit = taUsed ? profitAllowance : profitActual;
  const myProfit = soleProfit + partShareProfit;
  const profitForNIC = Math.max(0,myProfit);
  let pa = cfg.pa;
  if(myProfit>cfg.paTaperFrom) pa = Math.max(0, cfg.pa - Math.floor((myProfit-cfg.paTaperFrom)/2));
  const taxable = Math.max(0, myProfit-pa);
  const higherLimit = Math.max(cfg.basicBand, cfg.addlFrom-pa);
  const basicAmt = Math.min(taxable,cfg.basicBand);
  const higherAmt = Math.min(Math.max(taxable-cfg.basicBand,0), higherLimit-cfg.basicBand);
  const addlAmt = Math.max(taxable-higherLimit,0);
  const incomeTax = basicAmt*cfg.basic + higherAmt*cfg.higher + addlAmt*cfg.addl;
  const c4 = Math.min(Math.max(profitForNIC-cfg.c4Low,0), cfg.c4High-cfg.c4Low)*cfg.c4Main
           + Math.max(profitForNIC-cfg.c4High,0)*cfg.c4Upper;
  const class2TreatedPaid = profitForNIC >= cfg.c2SmallProfits;
  const class2Voluntary = Math.round(cfg.c2Weekly*52*100)/100;
  const liability = incomeTax + c4;
  const priorAdj = Number(d.priorAdj)||0;
  const poaPaid = Number(d.poaPaid)||0;
  const balancing = liability + priorAdj - poaPaid;
  const poaRequired = liability > cfg.poaThreshold;
  const poaEach = poaRequired ? liability/2 : 0;
  const janTotal = balancing + poaEach;
  return {cfg,perBiz,soleIncome,soleExpenses,profitActual,profitAllowance,allowanceAvailable,allowanceBetter,
          taUsed,taMode,soleProfit,partShareProfit,myProfit,pa,taxable,basicAmt,higherAmt,addlAmt,
          incomeTax,class4:c4,class2TreatedPaid,class2Voluntary,liability,priorAdj,poaPaid,balancing,
          poaRequired,poaEach,janTotal};
}

  return `<div class="cxr-wrap">
    <div class="cxr-track" id="cxr-track" onscroll="cxrOnScroll(this)">${slides}</div>
    ${dots}
  </div>`;
}
function cxrOnScroll(el){
  // 更新指示點（純顯示，唔影響任何資料）
  const dots = el.parentElement.querySelectorAll('.cxr-dot');
  if(!dots.length) return;
  const i = Math.round(el.scrollLeft / el.clientWidth);
  dots.forEach((d,idx)=>d.classList.toggle('on', idx===i));
}

  return `<button class="entry" onclick="openEntry('${e.kind}','${e.id}')">
    <div class="edot" style="background:${c.dot}1A">${c.e||'🏷️'}</div>
    <div class="grow">
      <div class="t">${esc(e.desc)||esc(catName(c.id))}</div>
      <div class="s">${d}${e.desc?' · '+esc(catName(c.id)):''}${b?' · '+esc(b.name):''}${pctNote}</div>
    </div>
    ${e.receiptUrl?`<img class="receipt-thumb" style="width:36px;height:36px;margin-inline-start:8px" src="${e.receiptUrl}" onclick="event.stopPropagation();openLightbox('${e.receiptUrl}','${e.receiptPath||''}')">`:``}

function pageList(kind){
  const isInc = kind==='income';
  const fKey = isInc?'incFilter':'expFilter';
  const filt = S[fKey];

  const chips = S.businesses.length>1 ?
    `<div class="chips">
      <button class="chip ${filt==='all'?'on':''}" onclick="setFilter('${fKey}','all')">${t('flt.all')}</button>
      ${S.businesses.map(b=>`<button class="chip ${filt===b.id?'on':''}" onclick="setFilter('${fKey}','${b.id}')">${esc(b.name)}</button>`).join('')}
    </div>` : '';

  const fchips = (!isInc && S.folders.length) ?
    `<div class="chips">
      <button class="chip ${S.expFolder==='all'?'on':''}" onclick="setFilter('expFolder','all')">${t('fd.all')}</button>
      ${S.folders.map(f=>`<button class="chip ${S.expFolder===f.id?'on':''}" onclick="setFilter('expFolder','${f.id}')">📁 ${esc(f.name)}</button>`).join('')}
    </div>` : '';

  // category filter — e.g. tap "⛽ Fuel" to see only fuel entries
  const cKey = isInc?'incCat':'expCat';
  const baseList = entriesFor(S.year, filt==='all'?null:filt, kind);
  const seenCat = new Set();
  const usedCats = [...new Set(baseList.map(e=>e.cat))].map(catById)
    .filter(c=>{ if(seenCat.has(c.id)) return false; seenCat.add(c.id); return true; })
    .sort((a,b)=>catName(a.id).localeCompare(catName(b.id)));
  const selCat = usedCats.some(c=>c.id===S[cKey]) ? S[cKey] : 'all';
  const cchips = usedCats.length>1 ?
    `<div class="chips">
      <button class="chip ${selCat==='all'?'on':''}" onclick="setFilter('${cKey}','all')">${t('flt.all')}</button>
      ${usedCats.map(c=>`<button class="chip ${selCat===c.id?'on':''}" onclick="setFilter('${cKey}','${c.id}')">${c.e||'🏷️'} ${esc(catName(c.id))}</button>`).join('')}
    </div>` : '';

  let list = baseList.sort((a,b)=>b.date.localeCompare(a.date));
  if(!isInc && S.expFolder!=='all') list = list.filter(e=>e.folderId===S.expFolder);
  if(selCat!=='all') list = list.filter(e=>e.cat===selCat);
  const total = list.reduce((s,e)=>s+(isInc?e.amount:effExact(e)),0);
  let body='';
  if(!list.length){
    body = `<div class="empty"><div class="big-emoji">${isInc?'🌱':'🧾'}</div>
      <div class="t">${t(isInc?'inc.empty':'exp.empty')}</div>
      <div class="s">${t(isInc?'inc.emptyS':'exp.emptyS')}</div></div>`;
  } else {
    const groups={};
    list.forEach(e=>{ const k=e.date.slice(0,7); (groups[k]=groups[k]||[]).push(e); });
    body = Object.keys(groups).sort((a,b)=>{
      const cur = todayISO().slice(0,7);
      const aFut = a>cur, bFut = b>cur;
      // Past/current months first (newest→oldest), future months last (oldest→newest)
      if(aFut && !bFut) return 1;
      if(!aFut && bFut) return -1;
      if(aFut && bFut) return a.localeCompare(b);
      return b.localeCompare(a);
    }).map(k=>{
      const lbl = new Date(k+'-15T12:00:00').toLocaleDateString(locale(),{month:'long',year:'numeric'});
      const sub = groups[k].reduce((s,e)=>s+(isInc?e.amount:effExact(e)),0);
      return `<div class="month"><span>${lbl}</span><span class="num ${isInc?'pos':'neg'}">${isInc?'+':'−'}${fmt(sub).replace('−','')}</span></div>
        <div class="elist">${groups[k].map(entryRow).join('')}</div>`;
    }).join('');
  }

  return `
  <div class="h1" style="display:flex;align-items:baseline;justify-content:space-between">
    <span>${t(isInc?'inc.title':'exp.title')}</span>
    <span class="num ${isInc?'pos':'neg'}" style="font-size:18px">${isInc?'+':'−'}${fmt(total).replace('−','')}</span>
  </div>
  ${chips}
  ${cchips}
  ${fchips}
  ${body}
  <button class="fab" onclick="openEntry('${kind}')" aria-label="Add">+</button>`;
}

  // 分類選項（由「未補相」嗰堆開支本身抽出，唔會列出無關分類）

  // 月份選項（同樣由未補相開支抽出）
  const monthsSet = [...new Set(missing.map(e=>e.date.slice(0,7)))].sort().reverse();
  const monthLabel = ym => { const [y,m]=ym.split('-'); return new Date(+y,+m-1,1).toLocaleDateString(locale(),{month:'long',year:'numeric'}); };
  const monthOpts = monthsSet.map(ym=>`<option value="${ym}" ${RCB.month===ym?'selected':''}>${monthLabel(ym)}</option>`).join('');

  // 套用篩選
  let list = missing.slice();
  if(RCB.cat!=='all') list = list.filter(e=>e.cat===RCB.cat);
  if(RCB.month!=='all') list = list.filter(e=>e.date.slice(0,7)===RCB.month);
  list.sort((a,b)=>b.date.localeCompare(a.date));

  const controls = `<div class="card" style="padding:14px">
    <div class="s" style="margin-bottom:12px">${t('rcb.intro')}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:140px">
        <label style="display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:4px">${t('rcb.cat')}</label>
        <select onchange="rcbSetCat(this.value)">
          <option value="all" ${RCB.cat==='all'?'selected':''}>${t('flt.all')}</option>
          ${catOpts}
        </select>
      </div>
      <div style="flex:1;min-width:140px">
        <label style="display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:4px">${t('rcb.month')}</label>
        <select onchange="rcbSetMonth(this.value)">
          <option value="all" ${RCB.month==='all'?'selected':''}>${t('rcb.allMonths')}</option>
          ${monthOpts}
        </select>
      </div>
    </div>
  </div>`;

  // 一疊都補晒 → 恭喜；未揀到嘢 → 提示
  let body;
  if(!missing.length){
    body = `<div class="card" style="text-align:center;padding:24px"><div style="font-size:32px;margin-bottom:6px">🎉</div><div class="s">${t('rcb.allDone')}</div></div>`;
  } else if(!list.length){
    body = `<div class="card" style="text-align:center;padding:24px"><div class="s">${t('rcb.noMissing')}</div></div>`;
  } else {
    const rows = list.map(e=>{
      const c = catById(e.cat);
      const b = bizById(e.bizId);
      const d = e.dateTBC ? t('f.tbc') : new Date(e.date+'T12:00:00').toLocaleDateString(locale(),{day:'numeric',month:'short'});
      return `<div class="frow" style="align-items:center;padding:10px 0">
        <div class="edot" style="background:${c.dot}1A;flex-shrink:0">${c.e||'🏷️'}</div>
        <div class="grow" style="min-width:0;margin-inline-start:10px">
          <div class="t" style="font-size:14px">${esc(e.desc)||esc(catName(c.id))}</div>
          <div class="s">${d}${b?' · '+esc(b.name):''} · ${fmt(effExact(e)).replace('−','')}</div>
        </div>
        <label class="btn soft" style="width:auto;padding:8px 14px;flex-shrink:0;cursor:pointer;margin:0" id="rcb-btn-${e.id}">
          <span id="rcb-label-${e.id}">${t('rcb.add')}</span>
          <input type="file" accept="image/*" capture="environment" style="display:none" onchange="onBatchReceiptFile('${e.id}', this)">
        </label>
      </div>`;
    }).join('');
    const remain = list.length;
    body = `<div class="card">
      <div class="row" style="margin-bottom:6px">
        <div class="grow"><div class="t" style="font-size:14px">${t('rcb.remaining',{n:remain})}</div></div>
      </div>
      ${rows}
      <div class="s" style="margin-top:12px;opacity:.8">💡 ${t('rcb.tip')}</div>
    </div>`;
  }

  return `${backBtn}
  <div class="h1">${t('rcb.title')}</div>
  ${controls}
  ${body}`;
}

async function onBatchReceiptFile(entryId, inputEl){
  const file = inputEl.files[0]; if(!file) return;
  inputEl.value='';
  if(!hasFeature('receiptPhoto')){ lockGuard('receiptPhoto'); return; }
  const e = S.entries.find(x=>x.id===entryId);
  if(!e) return;
  const labelEl = document.getElementById('rcb-label-'+entryId);
  const btnEl = document.getElementById('rcb-btn-'+entryId);
  if(labelEl) labelEl.textContent = '⏳ '+t('rcb.uploading');
  if(btnEl) btnEl.style.opacity = '0.6';
  try{
    const compressed = await compressImage(file, 1200, 0.82);
    const db = await ensureFB(); if(!db) throw new Error('no-db');
    const u = await ensureAuth(); if(!u) throw new Error('no-auth');
    try{ await u.getIdToken(); }catch(_){}
    const path = `receipts/${u.uid}/${entryId}.jpg`;   // 同單筆上載完全一致嘅路徑規則
    const ref = firebase.storage().ref(path);
    await ref.put(compressed, {contentType:'image/jpeg'});
    const url = await ref.getDownloadURL();
    e.receiptUrl = url;
    e.receiptPath = path;
    pushEntryRemote(e);  // partnership sync（如有）
    save();              // 個人雲端 sync 由 save() 自動觸發
    render();            // 補完該筆會由未補清單消失
    toast(t('rcb.done'));
  }catch(err){
    console.warn(err);
    if(labelEl) labelEl.textContent = t('rcb.add');
    if(btnEl) btnEl.style.opacity = '';
    toast(t('rc.uploadErr')||'Upload failed');
  }
}

// 攞字串入面「最後一個」grapheme（正確處理 variation selector、ZWJ sequences 等）
// 用途：emoji 輸入框永遠只保留一個 emoji — 新揀嘅自動取代舊嘅
function lastGrapheme(v){
  const s = (v||'').trim();
  if(!s) return '';
  try{
    const segs = [...new Intl.Segmenter('en',{granularity:'grapheme'}).segment(s)];
    return segs.length ? segs[segs.length-1].segment : '';
  }catch(e){
    const arr = [...s];
    return arr[arr.length-1] || '';
  }
}
function onEmojiInput(v){
  CC_EMOJI = lastGrapheme(v);
  const ei=document.getElementById('cc-emoji-input');

function dateToTaxYear(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  const y = d.getFullYear();
  const apr6 = new Date(y,3,6);
  const startY = d >= apr6 ? y : y-1;
  return startY + '-' + String((startY+1)%100).padStart(2,'0');
}
function taxYearRange(y){ const a=parseInt(String(y).slice(0,4)); return {min:a+'-04-06', max:(a+1)+'-04-05'}; }
function checkEntryDate(dateStr){
  const hint = document.getElementById('en-date-hint');
  if(!hint || !dateStr) return;
  const entryYr = dateToTaxYear(dateStr);
  if(entryYr !== S.year){
    hint.textContent = t('f.dateOtherYear',{y:entryYr});
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
}

function paintRepeatMonths(){
  const wrap = document.getElementById('en-repeat-months'); if(!wrap) return;
  const yrS = parseInt(S.year.slice(0,4));
  if(!EN.repeatMonths){
    // default: from the entry's month through end of the tax year
    let start = 0;
    const dv = document.getElementById('en-date').value;
    const src = (dv && dateToTaxYear(dv)===S.year) ? dv : (dateToTaxYear(todayISO())===S.year ? todayISO() : null);
    if(src){ start = (parseInt(src.slice(5,7)) - 4 + 12) % 12; }
    EN.repeatMonths = new Set(); for(let m=start;m<12;m++) EN.repeatMonths.add(m);
  }
  let html='';
  for(let m=0;m<12;m++){
    const mi = (3+m)%12 + 1;
    html += `<button type="button" class="${EN.repeatMonths.has(m)?'on':''}" onclick="toggleRepeatMonth(${m})">${obMonShort(mi)}</button>`;
  }
  wrap.innerHTML = html;
}
function toggleRepeatMonth(m){
  if(!EN.repeatMonths) EN.repeatMonths=new Set();
  if(EN.repeatMonths.has(m)) EN.repeatMonths.delete(m); else EN.repeatMonths.add(m);
  paintRepeatMonths();

function recAsk(fn){

  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px';

    <div style="font-weight:800;margin-bottom:14px">${t('f.recQ')}</div>
    <button type="button" class="btn" style="width:100%;margin-bottom:8px" id="rec-one">${t('f.recThis')}</button>
    <button type="button" class="btn" style="width:100%;margin-bottom:8px" id="rec-fut">${t('f.recFuture')}</button>
    <button type="button" class="btn ghost" style="width:100%" id="rec-cxl">${t('c.cancel')}</button></div>`;
  document.body.appendChild(ov);
  const done = v => { ov.remove(); if(v) fn(v); };
  ov.querySelector('#rec-one').onclick = ()=>done('one');
  ov.querySelector('#rec-fut').onclick = ()=>done('future');
  ov.querySelector('#rec-cxl').onclick = ()=>done(null);
}
function saveEntry(){
  // 收據仲上載緊 → 唔好即刻儲存，等上載完會自動幫你 save
  if(EN.uploading){
    EN._pendingSave = true;
    const st = document.getElementById('en-receipt-status');
    if(st){ st.textContent = '⏳ ' + t('rc.uploading'); st.style.color='var(--coral)'; st.style.fontWeight='700'; }
    return;
  }
  const amt = parseFloat(document.getElementById('en-amount').value);
  if(!(amt>0) || amt>10000000){
    document.getElementById('en-amount').classList.add('err');
    document.getElementById('en-amount-err').classList.add('show');
    document.getElementById('en-amount').focus();
    return;
  }
  const _de = document.getElementById('en-date');
  let _dv = _de.value;
  if(!_dv){ const _td = todayISO(); _dv = (_de.min && _td<_de.min) ? _de.min : ((_de.max && _td>_de.max) ? _de.max : _td); }
  if((_de.min && _dv<_de.min) || (_de.max && _dv>_de.max)){
    const _h = document.getElementById('en-date-hint');
    if(_h){ _h.textContent = t('f.dateLocked',{y: dateToTaxYear(_de.min)}); _h.style.color='var(--coral)'; _h.style.display='block'; }
    _de.focus();
    return;
  }
  if(!EN.cat){
    const catGrid = document.getElementById('en-cats');
    if(catGrid){
      catGrid.style.outline='2px solid var(--coral)';
      catGrid.style.outlineOffset='4px';
      catGrid.style.borderRadius='12px';
      if(catGrid.scrollIntoView) catGrid.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>{ catGrid.style.outline=''; },2200);
    }
    toast(t('f.catErr'));
    return;
  }
  const rec = {
    id:EN.id||uid(),
    bizId:document.getElementById('en-biz').value||(S.businesses[0]&&S.businesses[0].id),
    kind:EN.kind,
    date:_dv,
    amount:Math.round(amt*100)/100,
    cat:EN.cat,
    pct:EN.kind==='expense'?EN.pct:null,
    folderId:EN.kind==='expense'?(document.getElementById('en-folder').value||null):null,
    receiptUrl: EN.receiptUrl||null,
    receiptPath: EN.receiptPath||null,
    desc:document.getElementById('en-desc').value.trim()
  };
  if(EN.id){
    const i=S.entries.findIndex(x=>x.id===EN.id);
    if(i>-1){
      const orig = S.entries[i];
      if(orig.rgid) rec.rgid = orig.rgid;   // keep the monthly-group link
      const commit = (mode)=>{
        S.entries[i]=rec; pushEntryRemote(rec);
        if(mode==='future' && rec.rgid){
          S.entries.forEach(x=>{
            if(x.rgid===rec.rgid && x.id!==rec.id && x.date>orig.date){
              x.amount=rec.amount; x.cat=rec.cat; x.desc=rec.desc; x.pct=rec.pct; x.folderId=rec.folderId;
              pushEntryRemote(x);
            }
          });
        }
        save(); closeSheet('entry'); render(); toast(t('toast.saved'));
      };
      if(orig.rgid){ recAsk(commit); } else { commit('one'); }
    } else {
      // EN.id 係由 onReceiptFile 生成嘅，唔係 existing entry → 當新 entry 處理
      S.entries.push(rec);
      save(); pushEntryRemote(rec); closeSheet('entry'); render(); toast(t('toast.saved'));
    }
  } else if(EN.repeat && EN.kind==='expense'){
    // Add for all 12 months of the current tax year
    const baseDay = new Date(rec.date+'T12:00:00').getDate();
    const yrStart = parseInt(S.year.slice(0,4));
    const pad = n => String(n).padStart(2,'0');
    let count=0;
    const _range = taxYearRange(S.year);
    const _rgid = uid();
    const months = (EN.repeatMonths && EN.repeatMonths.size) ? [...EN.repeatMonths].sort((a,b)=>a-b) : [];
    // each selected offset maps to a real calendar month within the tax year
    months.forEach(m=>{
      const monthIdx = (3+m) % 12;
      const realYear = (3+m) > 11 ? yrStart+1 : yrStart;
      const daysInMonth = new Date(realYear, monthIdx+1, 0).getDate();
      const day = Math.min(baseDay, daysInMonth);
      const dateStr = realYear+'-'+pad(monthIdx+1)+'-'+pad(day);
      if(dateStr < _range.min || dateStr > _range.max) return;
      const r = Object.assign({}, rec, {id:uid(), date:dateStr, rgid:_rgid});
      S.entries.push(r); pushEntryRemote(r); count++;
    });
    if(!count){ S.entries.push(rec); pushEntryRemote(rec); count=1; } // safety: nothing picked => single entry
    save(); closeSheet('entry'); render(); toast(t('f.repeatAdded',{n:count}));
  } else {
    S.entries.push(rec);
    save(); pushEntryRemote(rec); closeSheet('entry'); render(); toast(t('toast.saved'));
  }
}
function deleteEntry(){
  const e = S.entries.find(x=>x.id===EN.id);
  const wipe = (mode)=>{
    const doomed = (mode==='future' && e && e.rgid)
      ? S.entries.filter(x=>x.rgid===e.rgid && x.date>=e.date)
      : (e ? [e] : []);
    doomed.forEach(x=>deleteEntryRemote(x.bizId, x.id));
    const ids = new Set(doomed.map(x=>x.id));
    S.entries = S.entries.filter(x=>!ids.has(x.id));
    save(); closeSheet('entry'); render();
  };
  if(e && e.rgid){ recAsk(wipe); }
  else confirmAction(t('d.entryT'), t('d.entryM'), ()=>wipe('one'));
}

function saveBiz(){
  const name = document.getElementById('bz-name').value.trim();
  if(!name){
    document.getElementById('bz-name').classList.add('err');
    document.getElementById('bz-name-err').classList.add('show');
    return;
  }
  let share = parseInt(document.getElementById('bz-share').value,10);
  if(!(share>=1&&share<=100)) share=50;
  let newId = null;
  if(BZ.id){
    const b = bizById(BZ.id);
    b.name=name; b.structure=BZ.structure; b.share=BZ.structure==='partnership'?share:100;
    pushBizRemote(b);
  } else {
    newId = uid();
    const newBiz = {id:newId, name, structure:BZ.structure, share:BZ.structure==='partnership'?share:100};
    // Partnership + Pro + Firebase: 一次過儲存並推上雲端
    if(BZ.structure==='partnership' && BZ.pendingCode && hasFeature('partnerSync') && fbConfigured()){
      newBiz.syncCode = BZ.pendingCode;
    }
    // New business: seed a few universal defaults so the entry screen isn't blank.
    // These are built-in categories (not custom) — user can remove or add freely.
    S.customCats[newId] = {income:[],expense:[]};
    S.activeCats[newId] = {income:['sales'], expense:['vehicle','phone','home','other']};
    S.businesses.push(newBiz);
  }
  save(); closeSheet('biz'); render(); toast(t('toast.saved'));
  // 有 pendingCode → 直接啟用 sync，唔使重開 sheet
  if(newId && BZ.pendingCode && S.businesses[S.businesses.length-1].syncCode){
    const code = BZ.pendingCode;
    ensureAuth().then(u=>{
      if(!u) return;
      FB.db.collection('partnerships').doc(code).set({
        bizId: newId, name, structure:'partnership', createdBy: u.uid, createdAt: Date.now(), v:1
      }).then(()=>{
        const batch = FB.db.batch();
        S.entries.filter(e=>e.bizId===newId).forEach(e=>{
          batch.set(FB.db.collection('partnerships').doc(code).collection('entries').doc(e.id), e);
        });
        return batch.commit();
      }).then(()=>{
        subscribeSync(code, newId);
      }).catch(e=>console.warn('sync push failed', e));
    });
  } else if(newId && BZ.structure==='partnership'){
    // Pro 未開或無 Firebase:儲存後重開 sheet 讓用家見到 sync 掣
    setTimeout(()=>openBiz(newId), 260);
  }
}

async function deleteCloudData(){
  // GDPR erasure: wipe this user's cloud data (Firestore meta + entries, Storage receipts)
  if(!fbConfigured() || !FB.ready){ return false; }
  const u = (firebase.auth().currentUser);
  if(!u) return false;
  const uid = u.uid;
  try{
    // 1. delete all entries (subcollection) in batches
    const entSnap = await FB.db.collection('users').doc(uid).collection('entries').get();
    let batch = FB.db.batch(); let n=0;
    for(const d of entSnap.docs){
      batch.delete(d.ref); n++;
      if(n%400===0){ await batch.commit(); batch = FB.db.batch(); }
    }
    await batch.commit();
    // 2. delete meta doc
    try{ await FB.db.collection('users').doc(uid).collection('app').doc('meta').delete(); }catch(e){}
    // 3. delete receipt photos in Storage (one per entry id we know about)
    try{
      const stor = firebase.storage();
      for(const e of (S.entries||[])){
        try{ await stor.ref(`receipts/${uid}/${e.id}.jpg`).delete(); }catch(_){}
      }
    }catch(e){}
    return true;
  }catch(err){ console.warn('cloud delete failed', err); return false; }
}

// Drag-to-dismiss on grab handles
function initSheetDrag(){
  document.querySelectorAll('.sheet').forEach(sheet=>{
    const grab = sheet.querySelector('.grab');
    if(!grab || grab.dataset.dragInit) return;
    grab.dataset.dragInit='1';
    let startY=0, curY=0, dragging=false;
    const onStart=e=>{ dragging=true; startY=(e.touches?e.touches[0].clientY:e.clientY); sheet.style.transition='none'; };
    const onMove=e=>{ if(!dragging)return; curY=(e.touches?e.touches[0].clientY:e.clientY); const dy=Math.max(0,curY-startY); sheet.style.transform='translateY('+dy+'px)'; };
    const onEnd=()=>{ if(!dragging)return; dragging=false; sheet.style.transition=''; const dy=curY-startY; if(dy>100){ const sb=sheet.closest('.sb'); if(sb){sb.classList.remove('open');document.body.classList.remove('sheet-open');} } sheet.style.transform=''; };
    grab.addEventListener('touchstart',onStart,{passive:true});
    grab.addEventListener('touchmove',onMove,{passive:true});
    grab.addEventListener('touchend',onEnd);
    grab.addEventListener('mousedown',onStart);
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onEnd);
  });
}

function genCode(){

    await db.collection('partnerships').doc(code).set({

    });

function subscribeSync(code, bizId){
  if(FB.subs[code]) return;
  FB.subs[code] = true; // 鎖住避免重複訂閱
  ensureAuth().then(u=>{
    const db = FB.db;
    if(!u || !db){ delete FB.subs[code]; return; }
    const unsubs = [];
    unsubs.push(db.collection('partnerships').doc(code).onSnapshot(doc=>{
      const d = doc.data(); if(!d) return;
      const b = bizById(bizId);
      if(b && d.name && b.name !== d.name){ b.name = d.name; save(); render(); }
    }, ()=>{}));
    unsubs.push(db.collection('partnerships').doc(code).collection('entries').onSnapshot(snap=>{
      const remote = [];
      snap.forEach(x=>remote.push(x.data()));
      S.entries = S.entries.filter(e=>e.bizId!==bizId).concat(remote);
      save(); render();
    }, ()=>{}));
    FB.subs[code] = unsubs;
  });
}

function userRoot(uid){ return FB.db.collection('users').doc(uid); }

async function startUserSync(u){
  if(CLOUD.metaUnsub) return;
  const uid = u.uid;
  await loadTrialFromCloud(uid); // ← trial logic
  try{
    /* 1 ── 初次合併:雲端有嘅補入本地(以 id 去重) */
    const metaDoc = await userRoot(uid).collection('app').doc('meta').get();
    const entSnap = await userRoot(uid).collection('entries').get();
    if(metaDoc.exists){
      const m = metaDoc.data();
      (m.businesses||[]).forEach(rb=>{ if(!bizById(rb.id)) S.businesses.push(rb); });
      (m.folders||[]).forEach(rf=>{ if(!folderById(rf.id)) S.folders.push(rf); });
      // per-business custom + active categories (merge by business id)
      if(m.customCats && typeof m.customCats==='object'){
        Object.keys(m.customCats).forEach(bid=>{
          if(!S.customCats[bid]) S.customCats[bid] = m.customCats[bid];
        });
      }
      if(m.activeCats && typeof m.activeCats==='object'){
        Object.keys(m.activeCats).forEach(bid=>{
          if(!S.activeCats[bid]) S.activeCats[bid] = m.activeCats[bid];
        });
      }
      Object.keys(m.yearData||{}).forEach(y=>{ S.yearData[y] = Object.assign({}, S.yearData[y]||{}, m.yearData[y]); });
      if(m.settings && m.settings.pro) S.settings.pro = true;
    }
    const localIds = new Set(S.entries.map(e=>e.id));
    entSnap.forEach(d=>{ const re=d.data(); if(re && !localIds.has(re.id)) S.entries.push(re); });
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}

    /* 2 ── 推合併結果上雲 */
    await pushUserState(uid, true);

    /* 3 ── 實時訂閱(其他裝置改嘢即時反映) */
    CLOUD.metaUnsub = userRoot(uid).collection('app').doc('meta').onSnapshot(doc=>{
      const m = doc.data(); if(!m || CLOUD.applying) return;
      if(Date.now() - CLOUD.localEditAt < 15000) return;  // 本機啱啱改過 → 唔好俾雲端覆蓋
      CLOUD.applying = true;
      if(Array.isArray(m.businesses)) S.businesses = m.businesses;
      if(Array.isArray(m.folders)) S.folders = m.folders;
      if(m.customCats && typeof m.customCats==='object' && !Array.isArray(m.customCats.income)) S.customCats = m.customCats;
      if(m.activeCats && typeof m.activeCats==='object' && !Array.isArray(m.activeCats.income)) S.activeCats = m.activeCats;
      if(m.yearData) S.yearData = m.yearData;
      if(m.settings && typeof m.settings.pro==='boolean') S.settings.pro = m.settings.pro;
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}
      CLOUD.applying = false;
      render();
      S.businesses.filter(b=>b.syncCode).forEach(b=>subscribeSync(b.syncCode, b.id));
    }, ()=>{});
    CLOUD.entUnsub = userRoot(uid).collection('entries').onSnapshot(snap=>{
      if(CLOUD.applying) return;
      // 本機 15 秒內啱啱改過嘢 → 唔好俾雲端快照覆蓋
      if(Date.now() - CLOUD.localEditAt < 15000) return;
      CLOUD.applying = true;
      const remote = []; snap.forEach(d=>remote.push(d.data()));
      const partnerBiz = new Set(S.businesses.filter(b=>b.syncCode).map(b=>b.id));
      const partnerEntries = S.entries.filter(e=>partnerBiz.has(e.bizId));
      S.entries = remote.filter(e=>!partnerBiz.has(e.bizId)).concat(partnerEntries);
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){}
      CLOUD.applying = false;
      render();
    }, ()=>{});

    S.businesses.filter(b=>b.syncCode).forEach(b=>subscribeSync(b.syncCode, b.id));
    render();
  }catch(e){ console.warn('user sync failed', e); }
}
function stopUserSync(){
  if(CLOUD.metaUnsub){ try{CLOUD.metaUnsub();}catch(e){} CLOUD.metaUnsub=null; }
  if(CLOUD.entUnsub){ try{CLOUD.entUnsub();}catch(e){} CLOUD.entUnsub=null; }
  CLOUD.lastPushed='';
}
async function pushUserState(uid, force){
  if(!FB.ready) return;
  if(!uid){ const cu = cloudUser(); if(!cu) return; uid = cu.uid; }
  const partnerBiz = new Set(S.businesses.filter(b=>b.syncCode).map(b=>b.id));
  const meta = { businesses:S.businesses, folders:S.folders, customCats:S.customCats, activeCats:S.activeCats,
                 yearData:S.yearData, settings:{pro:!!S.settings.pro}, updatedAt:Date.now() };
  const mine = S.entries.filter(e=>!partnerBiz.has(e.bizId));
  const payload = JSON.stringify([meta.businesses,meta.folders,meta.customCats,meta.activeCats,meta.yearData,meta.settings]) + '|' + JSON.stringify(mine);
  if(!force && payload === CLOUD.lastPushed) return;
  try{
    await userRoot(uid).collection('app').doc('meta').set(meta);
    const entSnap = await userRoot(uid).collection('entries').get();
    const remoteIds = new Set(); entSnap.forEach(d=>remoteIds.add(d.id));
    const localIds = new Set(mine.map(e=>e.id));
    const batch = FB.db.batch();
    mine.forEach(e=>batch.set(userRoot(uid).collection('entries').doc(e.id), e));
    remoteIds.forEach(id=>{ if(!localIds.has(id)) batch.delete(userRoot(uid).collection('entries').doc(id)); });
    await batch.commit();
    CLOUD.lastPushed = payload;   // 只喺成功後先記低，失敗會重試
  }catch(e){
    console.warn('cloud push failed', e);
    const code = (e && e.code) || '';
    // 權限錯誤（多數係舊 partnership / syncCode 殘留）→ 靜靜哋停，唔好叫用戶登出
    if(code==='permission-denied' || code==='unauthenticated' || /unauth/i.test(code)){
      CLOUD.lastPushed='__AUTH_ERR__';
      return;
    }
    // 其他（網絡等暫時性）錯誤 → 清空並 3 秒後重試一次
    CLOUD.lastPushed = '';
    clearTimeout(CLOUD.pushTimer);
    CLOUD.pushTimer = setTimeout(()=>pushUserState(uid, true), 5000);
  }
}
function scheduleCloudPush(){
  if(!cloudUser() || CLOUD.applying) return;
  CLOUD.localEditAt = Date.now();   // 記錄本機啱啱改咗嘢
  clearTimeout(CLOUD.pushTimer);
  CLOUD.pushTimer = setTimeout(()=>pushUserState(), 1200);
}

/* ═══════════ Mileage vs Actual Expenses ═══════════ */
function calcMileage(yr){
  const miles = Number(yd().mileage)||0;
  const mcfg = TAXCFG[yr] || TAXCFG['2026-27'];
  const r1 = mcfg.mileageRate1 || 0.45, r2 = mcfg.mileageRate2 || 0.25;
  const milesClaim = Math.min(miles,10000)*r1 + Math.max(miles-10000,0)*r2;
  // 只計 sole trader 嘅 vehicle + travel 開支
  const soleBizIds = S.businesses.filter(b=>b.structure==='sole').map(b=>b.id);
  const vehicleExp = entriesFor(yr,null,'expense')
    .filter(e=>soleBizIds.includes(e.bizId) && (e.cat==='vehicle'||e.cat==='travel'))
    .reduce((s,e)=>s+effExact(e),0);
  const diff = milesClaim - vehicleExp;
  const better = Math.abs(diff)<0.5 ? 'equal' : diff>0 ? 'mileage' : 'actual';
  return {miles, milesClaim, vehicleExp, diff:Math.abs(diff), better};
}

/* ═══════════ SA103 / SA104 Form Reference ═══════════ */
const CAT_TO_BOX = {
  stock:19, home:22, insure:22, repair:23, office:24,
  vehicle:25, travel:26, market:27, fees:33,
  phone:35, equip:35, other:35
};

function saBoxRow(box, desc, val, isTick, isExp){
  // HMRC SA: 整數英鎊 — 收入向下取整，開支向上取整
  function saRound(n){ return isExp ? Math.ceil(Math.abs(n)) : Math.floor(Math.abs(n)); }
  const rounded = typeof val==='number' ? (val<0?-1:1)*saRound(val) : val;
  const dispNum = typeof rounded==='number'
    ? (rounded<0?'−':'')+'£'+Math.abs(rounded).toLocaleString('en-GB')
    : String(rounded);
  const disp = isTick ? (val?'✓ Tick this box':'Leave unticked') : dispNum;
  const copyVal = isTick ? '' : (typeof rounded==='number' ? String(Math.abs(rounded)) : String(rounded));
  const copyBtn = !isTick && copyVal
    ? '<button data-v="'+copyVal+'" onclick="saCopy(this)" style="background:var(--brand-soft);color:var(--brand-deep);border:0;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">'+t('sa.copy')+'</button>'
    : '';
  return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">'
    +'<div style="width:38px;flex-shrink:0;font-size:11px;font-weight:800;color:var(--muted);background:var(--bg);border-radius:6px;padding:3px 5px;text-align:center">'+t('sa.box')+' '+box+'</div>'
    +'<div style="flex:1;min-width:0"><div style="font-size:13px;color:var(--ink)">'+desc+'</div></div>'
    +'<div style="font-size:13px;font-weight:800;white-space:nowrap;color:'+(isTick?(val?'var(--brand-deep)':'var(--muted)'):'var(--ink)')+'">'+disp+'</div>'
    +copyBtn+'</div>';
}

function saCopy(btn){
  const val=btn.getAttribute('data-v')||'';
  navigator.clipboard && navigator.clipboard.writeText(val).then(()=>{
    const orig = btn.textContent;
    btn.textContent = t('sa.copied');
    btn.style.background = 'var(--brand-soft)';
    setTimeout(()=>{ btn.textContent=orig; },1500);
  }).catch(()=>{});
}

function bizFiguresRaw(b,yr){
  const inc = entriesFor(yr,b.id,'income').reduce((s,e)=>s+Math.max(0,e.amount),0);
  const exp = entriesFor(yr,b.id,'expense').reduce((s,e)=>s+Math.max(0,effExact(e)),0);
  return {income:inc, expenses:exp, profit:inc-exp};
}

      entriesFor(yr,b.id,'expense').forEach(e=>{
